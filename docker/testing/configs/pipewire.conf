# Custom PipeWire configuration for audio capture testing
# This configuration enables application-specific audio capture

context.properties = {
    default.clock.rate = 48000
    default.clock.quantum = 1024
    default.clock.min-quantum = 32
    default.clock.max-quantum = 2048
    default.video.width = 640
    default.video.height = 480
    default.video.rate.num = 25
    default.video.rate.denom = 1
    
    # Enable debug logging for testing
    log.level = 2
    
    # Core settings
    core.daemon = true
    core.name = pipewire-0
    
    # Settings for audio capture
    settings = {
        check.quantum = false
        check.rate = false
    }
}

context.spa-libs = {
    audio.convert.* = audioconvert/libspa-audioconvert
    api.alsa.*      = alsa/libspa-alsa
    api.v4l2.*      = v4l2/libspa-v4l2
    api.libcamera.* = libcamera/libspa-libcamera
    api.bluez5.*    = bluez5/libspa-bluez5
    api.vulkan.*    = vulkan/libspa-vulkan
    api.jack.*      = jack/libspa-jack
    support.*       = support/libspa-support
}

context.modules = [
    # Core modules
    { name = libpipewire-module-rt
        args = {
            nice.level   = -11
            rt.prio      = 88
            rt.time.soft = 200000
            rt.time.hard = 200000
        }
        flags = [ ifexists nofail ]
    }
    { name = libpipewire-module-protocol-native }
    { name = libpipewire-module-profiler }
    { name = libpipewire-module-metadata }
    { name = libpipewire-module-spa-device-factory }
    { name = libpipewire-module-spa-node-factory }
    { name = libpipewire-module-client-node }
    { name = libpipewire-module-client-device }
    { name = libpipewire-module-portal
        flags = [ ifexists nofail ]
    }
    { name = libpipewire-module-access
        args = {
            access.allowed = [
                "pw-cli"
                "pw-dump"
                "pw-mon"
                "pw-cat"
                "pw-play"
                "pw-record"
                "firefox"
                "vlc"
                "rsac"
                "pipewire_test"
                "app_capture_test"
                "dynamic_vlc_capture"
            ]
            access.rejected = [ ]
            access.restricted = [ ]
            access.force = false
        }
    }
    { name = libpipewire-module-adapter }
    { name = libpipewire-module-link-factory }
    { name = libpipewire-module-session-manager }
]

context.objects = [
    # A default dummy driver. This handles nodes marked with the "node.always-driver"
    # property when no other driver is currently active. JACK clients need this.
    { factory = spa-node-factory
        args = {
            factory.name    = support.node.driver
            node.name       = Dummy-Driver
            node.group      = pipewire.dummy
            priority.driver = 20000
            node.always-driver = true
        }
    }
    { factory = spa-node-factory
        args = {
            factory.name    = support.node.driver
            node.name       = Freewheel-Driver
            priority.driver = 19000
            node.group      = pipewire.freewheel
            node.freewheel  = true
        }
    }
    # This creates a new Source node. It will have input ports
    # that you can link to.
    { factory = adapter
        args = {
            factory.name     = support.null-audio-sink
            node.name        = "my-mic"
            node.description = "Microphone"
            media.class      = "Audio/Source/Virtual"
            audio.position   = "FL,FR"
        }
    }
    # This creates a single PCM source device for the given
    # alsa device path hw:0. You can change source to sink
    # to make a sink in the same way.
    { factory = adapter
        args = {
            factory.name    = api.alsa.pcm.source
            node.name       = "alsa-source"
            node.description = "PCM Source"
            media.class     = Audio/Source
            api.alsa.path   = "hw:0"
            api.alsa.period-size   = 1024
            api.alsa.headroom      = 0
            api.alsa.start-delay   = 0
            api.alsa.disable-mmap  = false
            api.alsa.disable-batch = false
            audio.format    = "S16LE"
            audio.rate      = 48000
            audio.channels  = 2
            audio.position  = "FL,FR"
        }
    }
]

context.exec = [
    { path = "pactl"        args = "info" }
    #{ path = "/usr/bin/pipewire" args = "-c pipewire-pulse.conf" }
]
