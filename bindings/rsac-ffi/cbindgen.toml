# cbindgen configuration for rsac-ffi
# Generate C header: cbindgen --config cbindgen.toml --crate rsac-ffi --output rsac.h

language = "C"
include_guard = "RSAC_H"
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Do not modify manually. */"
tab_width = 4
style = "both"  # Generate both tag and typedef names

[defines]
# Map Rust cfg to C preprocessor defines
"target_os = windows" = "_WIN32"
"target_os = macos" = "__APPLE__"
"target_os = linux" = "__linux__"

[export]
prefix = "Rsac"
include = []
exclude = []
renaming_overrides_prefixing = true

[export.rename]
"RsacError" = "rsac_error_t"
"RsacDeviceKind" = "rsac_device_kind_t"
"RsacCaptureTargetKind" = "rsac_capture_target_kind_t"
"RsacRecoverability" = "rsac_recoverability_t"
"RsacErrorKind" = "rsac_error_kind_t"

[fn]
prefix = ""
postfix = ""
args = "auto"
rename_args = "None"

[enum]
rename_variants = "None"
prefix_with_name = false

[parse]
parse_deps = false
clean = false

[parse.expand]
crates = []
