# Pinned Rust toolchain for rsac.
#
# Bumping this file is deliberate: a PR that changes the channel also
# surfaces any new clippy lints in that PR's CI run, so we catch
# toolchain-bump breakage in review rather than in a random unrelated
# PR a week later.
#
# When bumping:
# 1. Change `channel` to the new version.
# 2. Run `cargo clippy --all-targets -- -D warnings` locally with that
#    toolchain.
# 3. Fix any new lint errors before pushing.
#
# Rationale for pinning rather than floating on `stable`: a floating
# channel means a new stable release can introduce new clippy lints that
# break `-D warnings` CI on unrelated PRs overnight. Pinning makes the
# breakage land in the (deliberate) bump PR instead.
[toolchain]
channel = "1.95.0"
components = ["rustfmt", "clippy"]
