[package]
name = "rsac"
version = "0.1.0"
edition = "2021"

[dependencies]
# Core dependencies
hound = "3.5.1"
sysinfo = "0.33.0"
clap = { version = "4.5.23", features = ["derive"] }
inquire = "0.7.5"
indicatif = "0.17.9"
color-eyre = "0.6.3"
ctrlc = "3.4.5"

# Platform-specific audio capture
[target.'cfg(target_os = "windows")'.dependencies]
wasapi = "0.15.0"

[target.'cfg(target_os = "linux")'.dependencies]
libpulse-binding = "2.28.1"
libpulse-simple-binding = "2.28.1"
pipewire = "0.7.2"

[target.'cfg(target_os = "macos")'.dependencies]
coreaudio-rs = "0.11.3"

# Error handling
thiserror = "2.0.6"

[dev-dependencies]
criterion = "0.5.1" # Benchmarking
tempfile = "3.14.0" # Temporary files for tests

[[example]]
name = "wav_demo"
path = "examples/wav_demo.rs"

[[example]]
name = "test_windows"
path = "examples/test_windows.rs"

[[example]]
name = "test_pulseaudio"
path = "examples/test_pulseaudio.rs"

[[example]]
name = "test_coreaudio"
path = "examples/test_coreaudio.rs"

[[example]]
name = "test_coreaudio_app"
path = "examples/test_coreaudio_app.rs"

[workspace]
members = []
