[package]
name = "rsac"
version = "0.1.0"
edition = "2021"

[dependencies]
wasapi = "0.15.0"
hound = "3.5.1"
sysinfo = "0.33.0"
clap = { version = "4.5.23", features = ["derive"] }
inquire = "0.7.5"
indicatif = "0.17.9"
color-eyre = "0.6.3"
ctrlc = "3.4.5"

# ML/Audio Processing
burn = { version = "0.15.0", features = ["train", "wgpu", "ndarray"] }
burn-autodiff = "0.15.0"
burn-tensor = "0.15.0"
burn-tch = "0.15.0"
ndarray = { version = "0.16.1", features = ["serde"] }
rustfft = "6.2.0"                                                      # FFT for audio processing
rand = "0.8.5"                                                         # Random number generation
rayon = "1.10.0"                                                       # Parallel processing
thiserror = "2.0.6"                                                    # Error handling
rubato = "0.16.1"                                                      # Audio resampling

# Speech Processing
sherpa-rs = "0.5.1"
whisper-rs = "0.13.2"

# Async/Concurrent
tokio = { version = "1.42.0", features = ["full"] }
async-trait = "0.1.83"

# HuggingFace Hub
reqwest = { version = "0.12.9", features = ["json"] }
dirs = "5.0.1"                                        # For finding home directory for cache

# Serialization
serde = { version = "1.0.216", features = ["derive"] }
serde_json = "1.0.133"
sha256 = "1.5.0"

[dev-dependencies]
criterion = "0.5.1" # Benchmarking
tempfile = "3.14.0" # Temporary files for tests

[[example]]
name = "wav_demo"
path = "examples/wav_demo.rs"

[[example]]
name = "test_whisper"
path = "examples/test_whisper.rs"

[[example]]
name = "test_transcription"
path = "examples/test_transcription.rs"

[[example]]
name = "test_whisper_minimal"
path = "examples/test_whisper_minimal.rs"

[[bin]]
name = "download-test-files"
path = "scripts/download_test_files.rs"

[workspace]
members = []
