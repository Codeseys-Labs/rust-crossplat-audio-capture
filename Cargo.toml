[package]
name = "rsac"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[dependencies]
# Core dependencies
hound = "3.5.1"
sysinfo = "0.35.2"
clap = { version = "4.5.39", features = ["derive"] }
inquire = "0.7.5"
indicatif = "0.17.11"
color-eyre = "0.6.5"
ctrlc = "3.4.7"
rodio = "0.20.1"

# Platform-specific audio capture
[target.'cfg(target_os = "windows")'.dependencies]
wasapi = "0.18.0"
windows = { version = "0.61.1", features = [
    "Win32_System_Com",
    "Win32_Media_Audio",
    "Win32_Media_Audio_Endpoints",
    "Win32_Media_MediaFoundation",
    "Win32_Foundation",
    "Win32_System_Threading",
    "Win32_Devices_FunctionDiscovery",
    "Win32_UI_Shell_PropertiesSystem",
    "Win32_System_Com_StructuredStorage",
] }

[target.'cfg(target_os = "linux")'.dependencies]
# libasound2-dev && libpipewire-0.3-dev && pkg-config && build-essential && clang && libclang-dev && llvm-dev
libpulse-binding = "2.28.2"
libpulse-simple-binding = "2.28.1"
pipewire = "0.8.0"

[target.'cfg(target_os = "macos")'.dependencies]
coreaudio-rs = "0.13.0"

# Error handling
thiserror = "2.0.12"

[dev-dependencies]
criterion = "0.6.0" # Benchmarking
tempfile = "3.20.0" # Temporary files for tests

[build-dependencies]
pkg-config = "0.3"

[[example]]
name = "wav_demo"
path = "examples/wav_demo.rs"

[[example]]
name = "test_windows"
path = "examples/test_windows.rs"

[[example]]
name = "test_pulseaudio"
path = "examples/test_pulseaudio.rs"

[[example]]
name = "test_coreaudio"
path = "examples/test_coreaudio.rs"

[[example]]
name = "test_coreaudio_app"
path = "examples/test_coreaudio_app.rs"

[[example]]
name = "test_tone"
path = "examples/test_tone.rs"

[workspace]
members = []
