name: macOS Build Check

on:
  workflow_call:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-13
          - arch: arm64
            runner: macos-latest
    env:
      DEBUG: ${{ inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          rustc --version --verbose
          cargo --version --verbose
          system_profiler SPAudioDataType

      - name: Build library
        run: cargo build --lib --no-default-features --features feat_macos

      - name: Build examples
        run: cargo build --examples --no-default-features --features feat_macos

      - name: Run unit tests
        run: cargo test --lib --no-default-features --features feat_macos

      - name: Build binaries
        run: |
          cargo build --bin dynamic_vlc_capture --no-default-features --features feat_macos || echo "Binary build skipped (may require additional dependencies)"

