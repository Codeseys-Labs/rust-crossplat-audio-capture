name: macOS Build Check

on:
  workflow_call:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # Note: macOS implementation is incomplete (ProcessTap requires macOS 14.4+)
  # These jobs are allowed to fail until the implementation is complete
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    continue-on-error: true  # Allow failure - implementation incomplete
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-13
          - arch: arm64
            runner: macos-latest
    env:
      DEBUG: ${{ inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          rustc --version --verbose
          cargo --version --verbose
          system_profiler SPAudioDataType

      - name: Check library compilation
        run: cargo check --lib --no-default-features --features feat_macos

