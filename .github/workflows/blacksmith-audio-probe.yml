# One-shot diagnostic: probe whether Blacksmith runners have audio device support.
# Trigger manually via workflow_dispatch, SSH in on failure to debug.
# Delete this workflow once audio support is confirmed/denied.

name: Blacksmith Audio Device Probe

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux ──────────────────────────────────────────────────────────
  probe-linux:
    name: "Linux | Audio Probe"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: System audio info
        run: |
          echo "===== Kernel modules (snd) ====="
          lsmod | grep -i snd || echo "No snd modules loaded"

          echo ""
          echo "===== ALSA devices ====="
          cat /proc/asound/cards 2>/dev/null || echo "No /proc/asound/cards"
          aplay -l 2>/dev/null || echo "aplay not found or no devices"

          echo ""
          echo "===== PulseAudio ====="
          pulseaudio --check 2>/dev/null && echo "PulseAudio running" || echo "PulseAudio not running"
          pactl info 2>/dev/null || echo "pactl not available"

          echo ""
          echo "===== PipeWire ====="
          pw-cli info 0 2>/dev/null || echo "PipeWire not running"
          systemctl --user status pipewire.service 2>/dev/null || echo "pipewire.service not found"

      - name: Install PipeWire and create virtual sink
        run: |
          sudo add-apt-repository -y ppa:pipewire-debian/pipewire-upstream
          sudo apt-get update
          sudo apt-get install -y \
            pipewire pipewire-bin pipewire-audio-client-libraries \
            pipewire-pulse libpipewire-0.3-dev libspa-0.2-dev \
            wireplumber pulseaudio-utils sox libclang-dev

          echo ""
          echo "===== Setting up XDG_RUNTIME_DIR ====="
          export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
          echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
          sudo mkdir -p "$XDG_RUNTIME_DIR"
          sudo chmod 700 "$XDG_RUNTIME_DIR"
          sudo chown "$(id -u):$(id -g)" "$XDG_RUNTIME_DIR"

          echo ""
          echo "===== Starting PipeWire (manual launch) ====="
          pulseaudio --kill 2>/dev/null || true
          pipewire &
          sleep 1
          wireplumber &
          sleep 1
          pipewire-pulse &
          sleep 2

          echo ""
          echo "===== PipeWire status after install ====="
          pw-cli info 0 || echo "pw-cli info failed"
          pw-cli list-objects Node 2>/dev/null || echo "No PipeWire nodes"

          echo ""
          echo "===== Creating virtual null sink ====="
          pactl load-module module-null-sink \
            sink_name=probe_sink \
            sink_properties=device.description="Blacksmith_Probe_Sink" \
            rate=48000 channels=2 format=float32le || echo "Failed to create null sink"
          pactl set-default-sink probe_sink 2>/dev/null || true

          echo ""
          echo "===== Final device list ====="
          pactl list short sinks 2>/dev/null || echo "No sinks"
          pactl list short sources 2>/dev/null || echo "No sources"
          pw-cli list-objects Node 2>/dev/null || echo "No PipeWire nodes"

      - name: Keep alive for SSH debug (on failure)
        if: failure()
        run: |
          echo "===== PROBE FAILED ====="
          echo "SSH into this runner to debug. Connection info is in the 'Setup runner' step above."
          echo "Keeping VM alive for 20 minutes..."
          sleep 1200

  # ── Windows ────────────────────────────────────────────────────────
  # Option D: Try to bootstrap the entire Windows audio stack from scratch.
  # Blacksmith Windows VMs (Firecracker) don't have AudioSrv or audio
  # drivers. We attempt: install Windows audio features, enable test
  # signing, install SysVAD or VB-CABLE, start audio services.
  probe-windows:
    name: "Windows | Audio Probe (Option D)"
    runs-on: blacksmith-4vcpu-windows-2025
    timeout-minutes: 30
    steps:
      - name: "Step 1: Baseline audio stack diagnostics"
        shell: pwsh
        run: |
          Write-Host "===== Windows Version ====="
          [System.Environment]::OSVersion | Format-List
          systeminfo | Select-String "OS Name|OS Version|System Type"

          Write-Host ""
          Write-Host "===== Audio Services (baseline) ====="
          $svcNames = @("AudioSrv", "AudioEndpointBuilder", "Audiosrv")
          foreach ($svc in $svcNames) {
            $s = Get-Service -Name $svc -ErrorAction SilentlyContinue
            if ($s) {
              Write-Host "  $svc : Status=$($s.Status) StartType=$($s.StartType)"
            } else {
              Write-Host "  $svc : NOT FOUND"
            }
          }

          Write-Host ""
          Write-Host "===== Audio-related Windows features ====="
          Get-WindowsOptionalFeature -Online -ErrorAction SilentlyContinue |
            Where-Object { $_.FeatureName -match "Audio|Media|Sound" } |
            Format-Table FeatureName, State -AutoSize

          Write-Host ""
          Write-Host "===== Windows Server features (audio/media) ====="
          Get-WindowsFeature -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match "Audio|Media|Desktop|Server-Media" } |
            Format-Table Name, InstallState -AutoSize

          Write-Host ""
          Write-Host "===== Audio registry keys ====="
          $audioKeys = @(
            "HKLM:\SYSTEM\CurrentControlSet\Services\AudioSrv",
            "HKLM:\SYSTEM\CurrentControlSet\Services\AudioEndpointBuilder",
            "HKLM:\SYSTEM\CurrentControlSet\Services\Audiosrv"
          )
          foreach ($key in $audioKeys) {
            if (Test-Path $key) {
              Write-Host "  EXISTS: $key"
              Get-ItemProperty $key -ErrorAction SilentlyContinue | Format-List Start, Type, ImagePath
            } else {
              Write-Host "  MISSING: $key"
            }
          }

          Write-Host ""
          Write-Host "===== Audio DLLs in System32 ====="
          $audioDlls = @("AudioSes.dll", "AudioEndpointBuilder.dll", "Audiodg.exe",
                         "MMDevAPI.dll", "Windows.Media.Audio.dll")
          foreach ($dll in $audioDlls) {
            $path = "C:\Windows\System32\$dll"
            if (Test-Path $path) {
              $info = Get-Item $path
              Write-Host "  EXISTS: $dll ($($info.Length) bytes)"
            } else {
              Write-Host "  MISSING: $dll"
            }
          }

      - name: "Step 2: Install Desktop Experience / media features"
        shell: pwsh
        run: |
          Write-Host "===== Attempting to install Desktop Experience ====="
          # Windows Server Core may not have audio. Try installing media features.
          Install-WindowsFeature Server-Media-Foundation -ErrorAction SilentlyContinue
          Install-WindowsFeature Desktop-Experience -ErrorAction SilentlyContinue

          # Also try optional features
          Enable-WindowsOptionalFeature -Online -FeatureName "MediaPlayback" -NoRestart -ErrorAction SilentlyContinue
          Enable-WindowsOptionalFeature -Online -FeatureName "WindowsMediaPlayer" -NoRestart -ErrorAction SilentlyContinue

          # Try DISM for multimedia
          dism /online /enable-feature /featurename:MediaPlayback /norestart 2>&1 | Write-Host
          dism /online /enable-feature /featurename:WindowsMediaPlayer /norestart 2>&1 | Write-Host

          Write-Host ""
          Write-Host "===== Re-check audio services after feature install ====="
          Get-Service -Name "AudioSrv", "AudioEndpointBuilder" -ErrorAction SilentlyContinue |
            Format-Table Name, Status, StartType -AutoSize

      - name: "Step 3: Try to create and start audio services manually"
        shell: pwsh
        run: |
          Write-Host "===== Checking if AudioEndpointBuilder service exists ====="
          $aeb = Get-Service -Name "AudioEndpointBuilder" -ErrorAction SilentlyContinue
          if (-not $aeb) {
            Write-Host "AudioEndpointBuilder not found. Attempting to create it..."
            $dll = "C:\Windows\System32\AudioEndpointBuilder.dll"
            if (Test-Path $dll) {
              sc.exe create AudioEndpointBuilder `
                type= share `
                start= demand `
                binpath= "C:\Windows\System32\svchost.exe -k LocalSystemNetworkRestricted" `
                displayname= "Windows Audio Endpoint Builder" 2>&1 | Write-Host
            } else {
              Write-Host "AudioEndpointBuilder.dll not found — cannot create service"
            }
          }

          Write-Host ""
          Write-Host "===== Checking if AudioSrv service exists ====="
          $asrv = Get-Service -Name "AudioSrv" -ErrorAction SilentlyContinue
          if (-not $asrv) {
            Write-Host "AudioSrv not found. Attempting to create it..."
            $dll = "C:\Windows\System32\Audiosrv.dll"
            if (Test-Path $dll) {
              sc.exe create Audiosrv `
                type= share `
                start= demand `
                binpath= "C:\Windows\System32\svchost.exe -k LocalServiceNetworkRestricted" `
                displayname= "Windows Audio" 2>&1 | Write-Host
            } else {
              Write-Host "Audiosrv.dll not found — cannot create service"
            }
          }

          Write-Host ""
          Write-Host "===== Attempting to start audio services ====="
          Start-Service -Name "AudioEndpointBuilder" -ErrorAction SilentlyContinue
          Start-Service -Name "AudioSrv" -ErrorAction SilentlyContinue
          Get-Service -Name "AudioSrv", "AudioEndpointBuilder" -ErrorAction SilentlyContinue |
            Format-Table Name, Status, StartType -AutoSize

      - name: "Step 4: Enable test signing + install SysVAD virtual audio"
        shell: pwsh
        run: |
          Write-Host "===== Enable test signing ====="
          bcdedit /set testsigning on 2>&1 | Write-Host
          # Note: normally requires reboot, but we try without

          Write-Host ""
          Write-Host "===== Download and install Scream virtual audio ====="
          $ScreamDir = "$env:TEMP\scream"
          New-Item -ItemType Directory -Path $ScreamDir -Force | Out-Null
          # Download Scream 4.0 pre-signed driver
          Invoke-WebRequest -Uri "https://github.com/duncanthrax/scream/releases/download/4.0/Scream4.0.zip" `
            -OutFile "$ScreamDir\Scream4.0.zip"
          Expand-Archive "$ScreamDir\Scream4.0.zip" -DestinationPath "$ScreamDir\scream"

          Write-Host "Scream contents:"
          Get-ChildItem "$ScreamDir\scream" -Recurse | Format-Table FullName, Length

          Write-Host ""
          Write-Host "===== Install Scream driver via pnputil ====="
          $inf = Get-ChildItem "$ScreamDir\scream" -Filter "Scream.inf" -Recurse | Select-Object -First 1
          if ($inf) {
            Write-Host "Found INF: $($inf.FullName)"
            pnputil /add-driver $inf.FullName /install 2>&1 | Write-Host
          } else {
            Write-Host "Scream.inf not found"
          }

          Write-Host ""
          Write-Host "===== Also try VB-CABLE ====="
          $VBDir = "$env:TEMP\vbcable"
          New-Item -ItemType Directory -Path $VBDir -Force | Out-Null
          Invoke-WebRequest -Uri "https://download.vb-audio.com/Download_CABLE/VBCABLE_Driver_Pack43.zip" `
            -OutFile "$VBDir\VBCABLE_Driver_Pack43.zip"
          Expand-Archive "$VBDir\VBCABLE_Driver_Pack43.zip" -DestinationPath "$VBDir\driver"
          Start-Process -FilePath "$VBDir\driver\VBCABLE_Setup_x64.exe" -ArgumentList "-i","-h" `
            -Wait -NoNewWindow -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 3

      - name: "Step 5: Final audio check"
        shell: pwsh
        run: |
          Write-Host "===== Final: Audio Services ====="
          Get-Service -Name "AudioSrv", "AudioEndpointBuilder" -ErrorAction SilentlyContinue |
            Format-Table Name, Status, StartType -AutoSize

          Write-Host ""
          Write-Host "===== Final: Audio Devices (PnP) ====="
          Get-PnpDevice -ErrorAction SilentlyContinue |
            Where-Object { $_.Class -eq "AudioEndpoint" -or $_.Class -eq "MEDIA" -or
              $_.FriendlyName -like "*Scream*" -or $_.FriendlyName -like "*VB*" -or
              $_.FriendlyName -like "*CABLE*" -or $_.FriendlyName -like "*Virtual*" } |
            Format-Table FriendlyName, Status, Class -AutoSize

          Write-Host ""
          Write-Host "===== Final: All audio endpoints ====="
          Get-PnpDevice -Class AudioEndpoint -ErrorAction SilentlyContinue |
            Format-Table FriendlyName, Status, InstanceId -AutoSize

          Write-Host ""
          Write-Host "===== Final: WMI Sound Devices ====="
          Get-WmiObject Win32_SoundDevice -ErrorAction SilentlyContinue |
            Format-Table Name, Status, Manufacturer -AutoSize

          Write-Host ""
          Write-Host "===== Final: WASAPI device enumeration test ====="
          # Quick PowerShell COM check for WASAPI devices
          try {
            Add-Type -TypeDefinition @"
            using System;
            using System.Runtime.InteropServices;

            [ComImport]
            [Guid("BCDE0395-E52F-467C-8E3D-C4579291692E")]
            public class MMDeviceEnumerator {}

            [ComImport]
            [Guid("A95664D2-9614-4F35-A746-DE8DB63617E6")]
            [InterfaceType(ComInterfaceType.InterfaceIsIUnknown)]
            public interface IMMDeviceEnumerator {
              int EnumAudioEndpoints(int dataFlow, int stateMask, out IntPtr devices);
              int GetDefaultAudioEndpoint(int dataFlow, int role, out IntPtr device);
            }
          "@ -ErrorAction SilentlyContinue

            $enumerator = New-Object MMDeviceEnumerator
            $iface = [System.Runtime.InteropServices.Marshal]::QueryInterface(
              [System.Runtime.InteropServices.Marshal]::GetIUnknownForObject($enumerator),
              [Guid]::Parse("A95664D2-9614-4F35-A746-DE8DB63617E6"),
              [ref]$null)
            Write-Host "MMDeviceEnumerator COM object created successfully (hr=$iface)"
          } catch {
            Write-Host "WASAPI COM enumeration failed: $_"
          }

      - name: Keep alive for SSH debug (on failure)
        if: failure()
        shell: pwsh
        run: |
          Write-Host "===== PROBE FAILED ====="
          Write-Host "SSH into this runner to debug. Connection info is in the 'Setup runner' step above."
          Write-Host "Keeping VM alive for 10 minutes..."
          Start-Sleep -Seconds 600

  # ── macOS ──────────────────────────────────────────────────────────
  probe-macos:
    name: "macOS | Audio Probe"
    runs-on: blacksmith-6vcpu-macos-15
    timeout-minutes: 30
    steps:
      - name: System audio info
        run: |
          echo "===== macOS Version ====="
          sw_vers

          echo ""
          echo "===== Audio Devices (system_profiler) ====="
          system_profiler SPAudioDataType 2>/dev/null || echo "No audio profiler available"

          echo ""
          echo "===== CoreAudio daemon ====="
          ps aux | grep -i coreaudio || echo "No coreaudio processes"

          echo ""
          echo "===== Audio device list (ioreg) ====="
          ioreg -l | grep -i "IOAudioEngine\|IOAudioDevice" | head -20 || echo "No IOAudio entries"

      - name: Install BlackHole virtual audio
        run: |
          echo "===== Installing BlackHole ====="
          brew install blackhole-2ch || echo "BlackHole installation failed"

          echo ""
          echo "===== Restarting coreaudiod ====="
          sudo killall coreaudiod 2>/dev/null || true
          sleep 5

          echo ""
          echo "===== Audio Devices after BlackHole ====="
          system_profiler SPAudioDataType 2>/dev/null || echo "No audio profiler available"

      - name: Keep alive for SSH debug (on failure)
        if: failure()
        run: |
          echo "===== PROBE FAILED ====="
          echo "SSH into this runner to debug. Connection info is in the 'Setup runner' step above."
          echo "Keeping VM alive for 20 minutes..."
          sleep 1200

  # ── Summary ────────────────────────────────────────────────────────
  summary:
    name: "Audio Probe Summary"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: always()
    needs: [probe-linux, probe-windows, probe-macos]
    steps:
      - name: Results
        run: |
          echo "============================================"
          echo "  Blacksmith Audio Device Probe — Results"
          echo "============================================"
          echo ""
          echo "  Linux:   ${{ needs.probe-linux.result }}"
          echo "  Windows: ${{ needs.probe-windows.result }}"
          echo "  macOS:   ${{ needs.probe-macos.result }}"
          echo ""
          echo "If any job failed, enable SSH access in Blacksmith"
          echo "settings and re-run to debug interactively."
          echo "============================================"
