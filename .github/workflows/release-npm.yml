# Tag/manual npm release workflow for @rsac/audio (Node.js bindings).
#
# Mirrors .github/workflows/release.yml for the crates.io flow:
#   1. verify-napi-build — matrix builds per napi-rs target, uploads .node
#   2. publish-npm       — merges artifacts, runs `napi prepublish -t npm`,
#                          publishes main + platform sub-packages to npm
#
# Triggered by semver-shaped tags (vMAJOR.MINOR.PATCH) from push --tags,
# or manually via workflow_dispatch with publish=true + a matching X.Y.Z
# version input. Bump bindings/rsac-napi/package.json version in lockstep
# with the root Cargo.toml before publishing (see docs/RELEASE_PROCESS.md).
#
# Authentication: npm Trusted Publishing (OIDC, GA 2025) — NO long-lived
# secret. The publish-npm job requests `id-token: write`; the npm CLI
# (upgraded to >= 11.5.1 at publish time) auto-detects the GitHub OIDC
# environment, authenticates with a short-lived token, and generates
# provenance automatically. The previous NPM_TOKEN repo secret is no longer
# used. A Trusted Publisher must be configured on npmjs.com for the main
# @rsac/audio package AND every @rsac/audio-<platform> sub-package, each
# pointing at this repo + release-npm.yml (npmjs.com → package Settings →
# Trusted publisher; see docs/RELEASE_PROCESS.md §"npm Trusted Publishing
# setup"). Until every sub-package has one, publishing falls back to a token
# for any package that lacks a publisher — track this in the setup doc.
#
# Security note: this workflow is tag-triggered only. No untrusted
# event payloads (issue bodies, PR titles, commit messages, etc.) are
# interpolated into run: steps. Only `secrets.*` and static matrix
# values are consumed.

name: Release npm

on:
  push:
    tags:
      # Stable semver tags only; pre-release shapes (v0.2.0-rc.1, etc.)
      # must not trigger real npm publishes. See docs/RELEASE_PROCESS.md.
      - 'v*.*.*'
      - '!v*-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to verify against bindings/rsac-napi/package.json before publishing (for example: 0.4.0)'
        type: string
        required: false
        default: ''
      publish:
        description: 'Publish to npm. Leave false to build/smoke artifacts only.'
        type: boolean
        required: false
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Least privilege by default; the publish job needs nothing from the repo
# beyond read, and npm provenance uses its own OIDC token requested below.
permissions:
  contents: read

jobs:
  # verify-napi-build: per-target native builds.
  # napi-rs 8-target matrix. Each job produces a
  # rsac-audio.<triple>.node artifact consumed by the publish job.
  #
  # Core 5 targets (proven, required): macOS x64/arm64, linux-x64-gnu,
  # linux-arm64-gnu, windows-x64-msvc. Must all pass for publish to run.
  #
  # Expansion 3 targets (speculative, continue-on-error): linux-x64-musl,
  # linux-arm64-musl, linux-armv7-gnueabihf. rsac links libpipewire-0.3 +
  # libspa-0.2 via pkg-config on Linux; these system libs are not
  # straightforward to satisfy in cross-compiled musl/armv7 sysroots
  # (Alpine uses different pkg-config paths; napi-cross does not ship
  # PipeWire headers). A single target failure must not block the publish
  # of the 5 supported platforms — `continue-on-error: true` gates them.
  # Pattern mirrors napi-rs/package-template (cargo-zigbuild for musl,
  # --use-napi-cross for armv7-gnueabihf).
  #
  # Cross-compile toolchain choice (armv7 GCC vs musl Zig):
  #
  # armv7-unknown-linux-gnueabihf uses `gcc-arm-linux-gnueabihf` +
  # napi-rs's `--use-napi-cross` flag. GCC is native on Ubuntu
  # runners and the sysroot is apt-gettable. Zig would also work,
  # but napi-rs's pre-existing `--use-napi-cross` path bakes GCC
  # assumptions; switching armv7 to Zig would require a broader
  # napi-rs upgrade, not just a flag flip.
  #
  # musl targets (x86_64/aarch64-unknown-linux-musl) use
  # `mlugg/setup-zig@v2` + `cargo-zigbuild`. napi-cross has no
  # musl support, and Zig produces musl binaries more reliably
  # than GCC musl cross toolchains (no sysroot hunting).
  # cargo-zigbuild handles the interp/libc switch cleanly.
  #
  # Do not unify these without the above context — the split is
  # load-bearing, not accidental.
  verify-napi-build:
    name: Build napi (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: blacksmith-6vcpu-macos-15
            napi-target: darwin-x64
            install_deps: false
            # macos-15 Blacksmith runners are Apple Silicon (arm64); a
            # darwin-x64 .node cannot be require()'d under the arm64 host
            # node, so this row is NOT host-smoke-tested (cross-built).
          - target: aarch64-apple-darwin
            os: blacksmith-6vcpu-macos-15
            napi-target: darwin-arm64
            install_deps: false
            native_smoke: true
          - target: x86_64-unknown-linux-gnu
            os: blacksmith-4vcpu-ubuntu-2404
            napi-target: linux-x64-gnu
            install_deps: true
            native_smoke: true
          - target: aarch64-unknown-linux-gnu
            os: blacksmith-4vcpu-ubuntu-2404
            napi-target: linux-arm64-gnu
            install_deps: true
            cross: true
          - target: x86_64-pc-windows-msvc
            os: blacksmith-4vcpu-windows-2025
            napi-target: win32-x64-msvc
            install_deps: false
            native_smoke: true
          # Speculative targets — experimental: true allows failure.
          # See header comment for the PipeWire sysroot caveat.
          # NOTE: these rows (and aarch64-gnu above) are CROSS-BUILT; their
          # .node cannot be loaded on the build host, so they receive NO
          # native smoke test. They ship unvalidated at runtime — first
          # real load happens on the consumer's machine.
          - target: x86_64-unknown-linux-musl
            os: blacksmith-4vcpu-ubuntu-2404
            napi-target: linux-x64-musl
            install_deps: true
            zigbuild: true
            experimental: true
          - target: aarch64-unknown-linux-musl
            os: blacksmith-4vcpu-ubuntu-2404
            napi-target: linux-arm64-musl
            install_deps: true
            zigbuild: true
            experimental: true
          - target: armv7-unknown-linux-gnueabihf
            os: blacksmith-4vcpu-ubuntu-2404
            napi-target: linux-arm-gnueabihf
            install_deps: true
            armv7_cross: true
            napi_cross: true
            experimental: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental == true }}
    defaults:
      run:
        working-directory: bindings/rsac-napi
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ matrix.target }}

      - uses: useblacksmith/rust-cache@81d053bdb0871dcd3f10763c8cc60d0adc41762b # v1 branch head (no v1 tag exists upstream)
        with:
          workspaces: bindings/rsac-napi -> target

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # rsac-e652: pin an exact Bun version (not `latest`) so a Bun release
      # can't silently change lockfile-resolution/install behavior out from
      # under a release build. Keep this in lockstep with ci.yml/
      # ci-audio-tests.yml's setup-bun steps — bump all three together.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'
          # Cache poisoning hardening (privileged/publish workflow): no shared
          # Actions cache restore.
          no-cache: true

      - name: Install PipeWire dev libraries (Linux)
        if: matrix.install_deps
        working-directory: .
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Install aarch64 cross-compile toolchain (Linux)
        if: matrix.cross
        working-directory: .
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install armv7 cross-compile toolchain (Linux)
        if: matrix.armv7_cross
        working-directory: .
        run: sudo apt-get install -y gcc-arm-linux-gnueabihf

      # Provenance recording (rsac-8d55(c)): snapshot the toolchain + the OS
      # package versions this Linux leg installed (PipeWire + any cross
      # toolchain) into the job log and a per-target build-info file uploaded
      # below. Linux legs only (macOS/Windows install no apt packages).
      # Best-effort — never fails the build.
      - name: Record build info (toolchain + OS package versions)
        if: matrix.install_deps
        working-directory: ${{ github.workspace }}
        run: bash scripts/record-build-info.sh "build-info-${{ matrix.napi-target }}.txt" gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf

      - name: Upload build-info artifact (Linux legs)
        if: matrix.install_deps
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-info-napi-${{ matrix.napi-target }}
          path: build-info-${{ matrix.napi-target }}.txt
          if-no-files-found: warn

      - name: Setup Zig (musl targets)
        if: matrix.zigbuild
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild (musl targets)
        if: matrix.zigbuild
        uses: taiki-e/install-action@873c7452cadb7c034694a1282227095d93fbdf92 # v2
        with:
          tool: cargo-zigbuild

      # rsac-e652: no unfrozen fallback — a stale bun.lock (drifted from
      # package.json) FAILS loudly instead of silently re-resolving and
      # publishing with unpinned dependency versions. The explicit `test -f`
      # guard is load-bearing: bun install --frozen-lockfile silently
      # REGENERATES a missing lockfile instead of failing (verified locally,
      # bun 1.3.14), so without it a deleted bun.lock would pass this step
      # silently and publish anyway.
      - name: bun install --frozen-lockfile
        run: |
          test -f bun.lock || { echo "::error::bindings/rsac-napi/bun.lock is missing — commit a lockfile (bun install)."; exit 1; }
          bun install --frozen-lockfile

      - name: napi build
        # Build path selection:
        #   zigbuild=true     → cargo-zigbuild (musl cross via Zig).
        #   napi_cross=true   → napi-rs bundled cross sysroot (armv7-gnueabihf).
        #   otherwise         → native build for the current host target.
        run: |
          if [ "${{ matrix.zigbuild }}" = "true" ]; then
            bunx @napi-rs/cli build --platform --release --target ${{ matrix.target }} -x
          elif [ "${{ matrix.napi_cross }}" = "true" ]; then
            bunx @napi-rs/cli build --platform --release --target ${{ matrix.target }} --use-napi-cross
          else
            bunx @napi-rs/cli build --platform --release --target ${{ matrix.target }}
          fi
        shell: bash

      # Native-artifact smoke test: actually load the freshly built .node
      # and call a device-free export (platformCapabilities) so a broken
      # native module fails the build instead of publishing green. Runs
      # ONLY on rows whose .node matches the host arch (native_smoke=true);
      # cross-built rows (musl/aarch64/armv7) are skipped — they cannot be
      # require()'d on the build host. napi build emits the binary as
      # rsac-audio.<napi-target>.node (see index.js loader).
      - name: Smoke test native .node (device-free)
        if: matrix.native_smoke
        shell: bash
        run: |
          node -e "const a = require('./rsac-audio.${{ matrix.napi-target }}.node'); const caps = a.platformCapabilities(); console.log('exports:', Object.keys(a)); console.log('backend:', caps.backendName);"

      - name: Upload .node artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bindings-${{ matrix.napi-target }}
          path: bindings/rsac-napi/*.node
          if-no-files-found: error

  # publish-npm: merge artifacts + publish platform sub-packages.
  publish-npm:
    name: Publish to npm
    needs: verify-napi-build
    # Guard against forks publishing to the @rsac npm scope.
    if: github.repository == 'Codeseys-Labs/rust-crossplat-audio-capture' && (github.event_name != 'workflow_dispatch' || inputs.publish)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      # npm Trusted Publishing (GA 2025): the npm CLI (>= 11.5.1) auto-detects
      # the GitHub OIDC environment and authenticates with a short-lived token
      # instead of a long-lived NPM_TOKEN — and generates provenance
      # attestations automatically. Requires id-token: write. A Trusted
      # Publisher must be configured on npmjs.com for the main @rsac/audio
      # package AND every @rsac/audio-<platform> sub-package (see
      # docs/RELEASE_PROCESS.md §"npm Trusted Publishing setup").
      id-token: write
    defaults:
      run:
        working-directory: bindings/rsac-napi
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      # Tag↔manifest version guard: the pushed tag must match the version
      # in package.json before we publish to npm. Tag events only.
      - name: Verify tag matches package.json version
        working-directory: bindings/rsac-napi
        shell: bash
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION='${{ inputs.version }}'
          fi
          if [ -z "${VERSION}" ]; then
            echo "::error::Manual npm publish requires the workflow_dispatch version input"
            exit 1
          fi
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Requested version '${VERSION}' is not a stable X.Y.Z semver version"
            exit 1
          fi
          MANIFEST="$(node -p "require('./package.json').version")"
          echo "requested version: ${VERSION}  manifest version: ${MANIFEST}"
          if [ "${VERSION}" != "${MANIFEST}" ]; then
            echo "::error::Requested version (${VERSION}) does not match package.json version (${MANIFEST})"
            exit 1
          fi

      # Full cross-manifest version-lockstep gate (rsac-e06e). The step above
      # only checks the tag/dispatch version against rsac-napi's package.json;
      # this asserts that EVERY lockstep manifest + the rsac-ffi internal dep
      # pin agree (hard-fail on any divergence) BEFORE `napi prepublish`
      # publishes the platform sub-packages to npm. Same script the ci.yml
      # version-lockstep job runs. Pinned to the workspace root because this
      # job's default working-directory is bindings/rsac-napi.
      - name: Verify version lockstep across all manifests
        working-directory: ${{ github.workspace }}
        run: bash scripts/check-version-lockstep.sh

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          # Cache poisoning hardening: this job holds id-token: write and
          # publishes — never restore a shared Actions cache a branch build
          # could have poisoned (GitHub's own guidance for privileged jobs).
          package-manager-cache: false

      # npm Trusted Publishing needs npm CLI >= 11.5.1 for OIDC auto-detection
      # + automatic provenance. Node 20 ships npm 10.x, which predates it, so
      # upgrade the system npm here. Both `napi prepublish` (sub-packages) and
      # the main-package publish below shell out to this npm on PATH, so the
      # upgrade covers the whole publish path. Pinned to a known-good 11.x.
      - name: Upgrade npm to a Trusted-Publishing-capable version
        working-directory: ${{ github.workspace }}
        run: |
          npm install -g npm@11.5.1
          echo "npm version: $(npm --version)"

      # rsac-e652: pin an exact Bun version (not `latest`) so a Bun release
      # can't silently change lockfile-resolution/install behavior out from
      # under a release build. Keep this in lockstep with ci.yml/
      # ci-audio-tests.yml's setup-bun steps — bump all three together.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'
          # Cache poisoning hardening (privileged/publish workflow): no shared
          # Actions cache restore.
          no-cache: true

      # rsac-e652: no unfrozen fallback — a stale bun.lock (drifted from
      # package.json) FAILS loudly instead of silently re-resolving and
      # publishing with unpinned dependency versions. The explicit `test -f`
      # guard is load-bearing: bun install --frozen-lockfile silently
      # REGENERATES a missing lockfile instead of failing (verified locally,
      # bun 1.3.14), so without it a deleted bun.lock would pass this step
      # silently and publish anyway.
      - name: bun install --frozen-lockfile
        run: |
          test -f bun.lock || { echo "::error::bindings/rsac-napi/bun.lock is missing — commit a lockfile (bun install)."; exit 1; }
          bun install --frozen-lockfile

      - name: Download all .node artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: bindings/rsac-napi/artifacts

      # rsac#21: belt-and-suspenders gate. The `needs: verify-napi-build`
      # dependency blocks publish when any core (non-experimental) matrix
      # row fails. This explicit presence-check is a second line of
      # defense: if a core row silently produced no .node file (e.g.
      # compile warning-as-error swallowed by `if-no-files-found: error`
      # regression), we abort before calling `napi prepublish`.
      # Artifact dir names use the napi-target value from the matrix
      # (e.g. `bindings-darwin-x64`), not the Rust target triple — the
      # upload step in verify-napi-build uses `name: bindings-${{
      # matrix.napi-target }}`, so these strings must match napi-target.
      - name: Verify core platform artifacts are present
        working-directory: bindings/rsac-napi
        run: |
          missing=0
          for platform in \
            "darwin-x64" \
            "darwin-arm64" \
            "win32-x64-msvc" \
            "linux-x64-gnu" \
            "linux-arm64-gnu"; do
            if ! ls artifacts/bindings-${platform}/*.node 2>/dev/null | head -1 > /dev/null; then
              echo "::error::Missing core .node artifact for bindings-${platform}"
              missing=1
            else
              echo "OK: found core artifact for bindings-${platform}"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::One or more core napi artifacts are missing — refusing to publish a partial release"
            exit 1
          fi

      - name: Move artifacts into place
        run: bunx @napi-rs/cli artifacts --dir artifacts

      # rsac-e93b: `napi prepublish -t npm` does more than "generate" the
      # platform packages — it PUBLISHES each @rsac/audio-<platform>
      # sub-package to npm by shelling out to `npm publish` (the system npm on
      # PATH, upgraded to a Trusted-Publishing-capable version above). Under
      # Trusted Publishing (GA 2025) that npm auto-detects the OIDC environment
      # and authenticates with a short-lived token — NO NPM_TOKEN needed. Every
      # @rsac/audio-<platform> sub-package must therefore have its own Trusted
      # Publisher configured on npmjs.com (see docs/RELEASE_PROCESS.md).
      # We keep this explicit step (rather than relying on package.json's
      # `prepublishOnly` lifecycle hook) so we control --skip-gh-release —
      # GitHub Releases are created by release-tag.yml/release.yml, and this
      # job's token has no contents:write scope anyway.
      - name: napi prepublish (publish platform sub-packages)
        run: bunx @napi-rs/cli prepublish -t npm --skip-gh-release

      # --ignore-scripts is load-bearing: package.json declares
      # `"prepublishOnly": "napi prepublish -t npm"`, so a bare `npm publish`
      # would re-run the prepublish step above and try to publish every
      # platform sub-package a second time (E403 already-published), failing
      # the release after a partial publish. The sub-packages were published
      # by the explicit step above; this step publishes ONLY the main package.
      # Uses the system npm (>= 11.5.1) directly — NOT `bunx npm` — so npm's
      # OIDC auto-detection runs under the real npm CLI. Under Trusted
      # Publishing, provenance is generated automatically, so the explicit
      # --provenance flag is no longer required (harmless to omit).
      - name: Publish main package (sub-packages already published above)
        run: npm publish --access public --ignore-scripts
