# Tag-triggered npm release workflow for @rsac/audio (Node.js bindings).
#
# Mirrors .github/workflows/release.yml for the crates.io flow:
#   1. verify-napi-build — matrix builds per napi-rs target, uploads .node
#   2. publish-npm       — merges artifacts, runs `napi prepublish -t npm`,
#                          publishes main + platform sub-packages to npm
#
# Triggered by semver-shaped tags (vMAJOR.MINOR.PATCH) from push --tags.
# Bump bindings/rsac-napi/package.json version in lockstep with the root
# Cargo.toml before tagging (see docs/RELEASE_PROCESS.md).
#
# Required GitHub secret:
#   NPM_TOKEN — npm automation token with publish rights on @rsac scope.
#               Create at https://www.npmjs.com/settings/<user>/tokens
#               (type: Automation). Add via Settings → Secrets and
#               variables → Actions → New repository secret.
#
# Security note: this workflow is tag-triggered only. No untrusted
# event payloads (issue bodies, PR titles, commit messages, etc.) are
# interpolated into run: steps. Only `secrets.*` and static matrix
# values are consumed.

name: Release npm

on:
  push:
    tags:
      # Stable semver tags only; pre-release shapes (v0.2.0-rc.1, etc.)
      # must not trigger real npm publishes. See docs/RELEASE_PROCESS.md.
      - 'v*.*.*'
      - '!v*-*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # verify-napi-build: per-target native builds.
  # napi-rs 8-target matrix. Each job produces a
  # rsac-audio.<triple>.node artifact consumed by the publish job.
  #
  # Core 5 targets (proven, required): macOS x64/arm64, linux-x64-gnu,
  # linux-arm64-gnu, windows-x64-msvc. Must all pass for publish to run.
  #
  # Expansion 3 targets (speculative, continue-on-error): linux-x64-musl,
  # linux-arm64-musl, linux-armv7-gnueabihf. rsac links libpipewire-0.3 +
  # libspa-0.2 via pkg-config on Linux; these system libs are not
  # straightforward to satisfy in cross-compiled musl/armv7 sysroots
  # (Alpine uses different pkg-config paths; napi-cross does not ship
  # PipeWire headers). A single target failure must not block the publish
  # of the 5 supported platforms — `continue-on-error: true` gates them.
  # Pattern mirrors napi-rs/package-template (cargo-zigbuild for musl,
  # --use-napi-cross for armv7-gnueabihf).
  #
  # Cross-compile toolchain choice (armv7 GCC vs musl Zig):
  #
  # armv7-unknown-linux-gnueabihf uses `gcc-arm-linux-gnueabihf` +
  # napi-rs's `--use-napi-cross` flag. GCC is native on Ubuntu
  # runners and the sysroot is apt-gettable. Zig would also work,
  # but napi-rs's pre-existing `--use-napi-cross` path bakes GCC
  # assumptions; switching armv7 to Zig would require a broader
  # napi-rs upgrade, not just a flag flip.
  #
  # musl targets (x86_64/aarch64-unknown-linux-musl) use
  # `mlugg/setup-zig@v2` + `cargo-zigbuild`. napi-cross has no
  # musl support, and Zig produces musl binaries more reliably
  # than GCC musl cross toolchains (no sysroot hunting).
  # cargo-zigbuild handles the interp/libc switch cleanly.
  #
  # Do not unify these without the above context — the split is
  # load-bearing, not accidental.
  verify-napi-build:
    name: Build napi (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: blacksmith-6vcpu-macos-15
            napi-target: darwin-x64
            install_deps: false
          - target: aarch64-apple-darwin
            os: blacksmith-6vcpu-macos-15
            napi-target: darwin-arm64
            install_deps: false
          - target: x86_64-unknown-linux-gnu
            os: blacksmith-4vcpu-ubuntu-2404
            napi-target: linux-x64-gnu
            install_deps: true
          - target: aarch64-unknown-linux-gnu
            os: blacksmith-4vcpu-ubuntu-2404
            napi-target: linux-arm64-gnu
            install_deps: true
            cross: true
          - target: x86_64-pc-windows-msvc
            os: blacksmith-4vcpu-windows-2025
            napi-target: win32-x64-msvc
            install_deps: false
          # Speculative targets — experimental: true allows failure.
          # See header comment for the PipeWire sysroot caveat.
          - target: x86_64-unknown-linux-musl
            os: blacksmith-4vcpu-ubuntu-2404
            napi-target: linux-x64-musl
            install_deps: true
            zigbuild: true
            experimental: true
          - target: aarch64-unknown-linux-musl
            os: blacksmith-4vcpu-ubuntu-2404
            napi-target: linux-arm64-musl
            install_deps: true
            zigbuild: true
            experimental: true
          - target: armv7-unknown-linux-gnueabihf
            os: blacksmith-4vcpu-ubuntu-2404
            napi-target: linux-arm-gnueabihf
            install_deps: true
            armv7_cross: true
            napi_cross: true
            experimental: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental == true }}
    defaults:
      run:
        working-directory: bindings/rsac-napi
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/rsac-napi -> target

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install PipeWire dev libraries (Linux)
        if: matrix.install_deps
        working-directory: .
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Install aarch64 cross-compile toolchain (Linux)
        if: matrix.cross
        working-directory: .
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install armv7 cross-compile toolchain (Linux)
        if: matrix.armv7_cross
        working-directory: .
        run: sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Setup Zig (musl targets)
        if: matrix.zigbuild
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild (musl targets)
        if: matrix.zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: bun install
        run: bun install --frozen-lockfile || bun install

      - name: napi build
        # Build path selection:
        #   zigbuild=true     → cargo-zigbuild (musl cross via Zig).
        #   napi_cross=true   → napi-rs bundled cross sysroot (armv7-gnueabihf).
        #   otherwise         → native build for the current host target.
        run: |
          if [ "${{ matrix.zigbuild }}" = "true" ]; then
            bunx @napi-rs/cli build --platform --release --target ${{ matrix.target }} -x
          elif [ "${{ matrix.napi_cross }}" = "true" ]; then
            bunx @napi-rs/cli build --platform --release --target ${{ matrix.target }} --use-napi-cross
          else
            bunx @napi-rs/cli build --platform --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Upload .node artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.napi-target }}
          path: bindings/rsac-napi/*.node
          if-no-files-found: error

  # publish-npm: merge artifacts + publish platform sub-packages.
  publish-npm:
    name: Publish to npm
    needs: verify-napi-build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: bindings/rsac-napi
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        run: bun install --frozen-lockfile || bun install

      - name: Download all .node artifacts
        uses: actions/download-artifact@v4
        with:
          path: bindings/rsac-napi/artifacts

      # rsac#21: belt-and-suspenders gate. The `needs: verify-napi-build`
      # dependency blocks publish when any core (non-experimental) matrix
      # row fails. This explicit presence-check is a second line of
      # defense: if a core row silently produced no .node file (e.g.
      # compile warning-as-error swallowed by `if-no-files-found: error`
      # regression), we abort before calling `napi prepublish`.
      - name: Verify core platform artifacts are present
        working-directory: bindings/rsac-napi
        run: |
          missing=0
          for platform in \
            "x86_64-apple-darwin" \
            "aarch64-apple-darwin" \
            "x86_64-pc-windows-msvc" \
            "x86_64-unknown-linux-gnu" \
            "aarch64-unknown-linux-gnu"; do
            if ! ls artifacts/bindings-${platform}/*.node 2>/dev/null | head -1 > /dev/null; then
              echo "::error::Missing core .node artifact for ${platform}"
              missing=1
            else
              echo "OK: found core artifact for ${platform}"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::One or more core napi artifacts are missing — refusing to publish a partial release"
            exit 1
          fi

      - name: Move artifacts into place
        run: bunx @napi-rs/cli artifacts --dir artifacts

      - name: napi prepublish (generate platform packages)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx @napi-rs/cli prepublish -t npm --skip-gh-release

      - name: Publish main package + platform sub-packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bunx npm publish --access public --provenance
