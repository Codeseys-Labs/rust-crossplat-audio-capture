      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-device-capture-logs
          path: ci-audio-output.log
          retention-days: 14

  linux-process:
    name: "Linux | Process Capture"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    # `bash` keyword shell (`-eo pipefail`) so cargo failures aren't masked by tee.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-audio

      - name: Install PipeWire and audio dependencies
        run: |
          sudo add-apt-repository -y ppa:pipewire-debian/pipewire-upstream
          sudo apt-get update
          sudo apt-get install -y \
            pipewire pipewire-bin pipewire-audio-client-libraries \
            pipewire-pulse libpipewire-0.3-dev libspa-0.2-dev \
            wireplumber pulseaudio-utils sox libclang-dev

      - name: Start PipeWire
        run: |
          export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
          echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
          sudo mkdir -p "$XDG_RUNTIME_DIR"
          sudo chmod 700 "$XDG_RUNTIME_DIR"
          sudo chown "$(id -u):$(id -g)" "$XDG_RUNTIME_DIR"
          pulseaudio --kill 2>/dev/null || true
          pipewire &
          sleep 1
          wireplumber &
