  # =============================================================================
  # Windows tiers — VB-CABLE virtual audio driver — FIRST-CLASS (hard-gated)
  # NOTE: Blacksmith Windows VMs (Firecracker) have no audio subsystem at all
  # (AudioSrv, AudioEndpointBuilder, AudioSes.dll are all absent).
  # We use GitHub-hosted windows-latest for audio integration tests, which
  # has a full Windows audio stack. Blacksmith handles compilation/unit tests.
  #
  # rsac M5: Windows is a first-class tier. These jobs deliberately have NO
  # continue-on-error. Only the system-capture job sets
  # RSAC_CI_AUDIO_DETERMINISTIC=1 because it verifies VB-CABLE as the active
  # default playback endpoint before cargo runs; device/process tiers remain
  # hard-gated for build/start/panic regressions but keep content assertions
  # soft. The summary job's failure gate includes all Windows jobs.
  # =============================================================================

  windows-system:
    name: "Windows | System Capture"
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-audio

      - name: Install virtual audio (VB-CABLE via LABSN)
        uses: LABSN/sound-ci-helpers@v1

      - name: Set VB-CABLE as default audio device
        shell: pwsh
        run: |
          # rsac#24: LABSN installs the VB-CABLE driver via devcon but
          # does NOT set it as the default playback endpoint — we have
          # to do that explicitly with AudioDeviceCmdlets
          # (https://github.com/frgnca/AudioDeviceCmdlets). On
          # windows-latest VB-CABLE's playback endpoint is named
          # "Speakers (VB-Audio Virtual Cable)", not "CABLE Input ...",
          # so the name filter has to accept either form.
          Install-Module -Name AudioDeviceCmdlets -Force -Scope CurrentUser 2>$null
          Import-Module AudioDeviceCmdlets -ErrorAction Stop

          Write-Host "=== All Audio Devices ==="
          $devices = Get-AudioDevice -List
          $devices | Format-Table Index, Type, Name, Default -AutoSize

          $cable = $devices | Where-Object {
            $_.Type -eq "Playback" -and (
              $_.Name -like "*CABLE Input*" -or
              $_.Name -like "*VB-Audio*" -or
              $_.Name -like "*VB-CABLE*"
            )
          } | Select-Object -First 1

          if ($cable) {
            Write-Host "Setting VB-CABLE as default playback device: $($cable.Name) (Index=$($cable.Index))"
            Set-AudioDevice -Index $cable.Index -DefaultOnly
          } else {
            Write-Error "No VB-CABLE playback device found — LABSN install likely failed"
            exit 1
          }

      - name: Verify VB-CABLE is the active default playback
        # rsac#24: if the default playback isn't VB-CABLE, the test
        # tone goes to the wrong endpoint and system-capture loopback
        # sees zero buffers. Fail loudly here instead of wasting 15
        # minutes on cargo compile + tests that cannot possibly pass.
        shell: pwsh
        run: |
          Import-Module AudioDeviceCmdlets -ErrorAction Stop
          $playback = Get-AudioDevice -Playback
          Write-Host "Default playback: $($playback.Name) (Default=$($playback.Default), Type=$($playback.Type))"
          $isCable = ($playback.Name -like "*VB-Audio*") -or
                     ($playback.Name -like "*CABLE*") -or
                     ($playback.Name -like "*VB-CABLE*")
          if (-not $isCable) {
            Write-Error "Default playback is NOT VB-CABLE (got: '$($playback.Name)'). System capture loopback cannot succeed."
            exit 1
          }
          Write-Host "OK: VB-CABLE is the default playback endpoint."

      - name: Verify audio devices
        id: verify_audio
        shell: pwsh
        run: |
          Write-Host "=== Audio Devices ==="
          $devices = Get-PnpDevice -ErrorAction SilentlyContinue | Where-Object {
            $_.FriendlyName -like "*VB-Audio*" -or
            $_.FriendlyName -like "*CABLE*" -or
            $_.Class -eq "AudioEndpoint" -or
            $_.Class -eq "MEDIA"
          }
          if ($devices) {
            $devices | Format-List FriendlyName, Status
            echo "RSAC_CI_AUDIO_AVAILABLE=1" >> $env:GITHUB_ENV
            # rsac M5: VB-CABLE is installed AND verified as the active default
            # playback endpoint by the hard gate two steps above. That makes
            # system-capture loopback deterministic — the test tone provably
            # routes to the captured endpoint — so enable the hard
            # non-silence/tone asserts for this system-capture tier.
            echo "RSAC_CI_AUDIO_DETERMINISTIC=1" >> $env:GITHUB_ENV
          } else {
            Write-Host "No audio devices found"
            echo "RSAC_CI_AUDIO_AVAILABLE=0" >> $env:GITHUB_ENV
          }

      - name: Compilation check
        run: cargo check --no-default-features --features feat_windows

      - name: Run system capture tests
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio system_capture `
            --no-default-features --features feat_windows `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-output.log

      - name: Run platform capabilities tests
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio platform_caps `
            --no-default-features --features feat_windows `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-output-caps.log

      - name: Run stream lifecycle tests
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio stream_lifecycle `
            --no-default-features --features feat_windows `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-output-lifecycle.log

      # Terminal read-behavior + request_stop() end-to-end on the real WASAPI
      # bridge. `lifecycle_terminal` matches ONLY this module (not
      # `stream_lifecycle`). Hard-gated with the rest of the Windows system tier.
      - name: Run terminal-read / request_stop lifecycle tests
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio lifecycle_terminal `
            --no-default-features --features feat_windows `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-output-terminal.log

      - name: Diagnostics on failure
        if: failure()
        shell: pwsh
        run: |
          Get-Service -Name "AudioSrv", "AudioEndpointBuilder" -ErrorAction SilentlyContinue | Format-List Name, Status
          Get-PnpDevice -ErrorAction SilentlyContinue | Where-Object { $_.Class -eq "AudioEndpoint" -or $_.Class -eq "MEDIA" } | Format-List FriendlyName, Status
          Import-Module AudioDeviceCmdlets -ErrorAction SilentlyContinue
          Get-AudioDevice -List | Format-Table Index, Type, Name, Default -AutoSize
          Get-AudioDevice -Playback | Format-List Name, Default, ID

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-system-capture-logs
          path: ci-audio-output*.log
          retention-days: 14

  windows-device:
    name: "Windows | Device Capture"
    runs-on: windows-latest
    # rsac M5: first-class, hard-gated (no continue-on-error). NOTE: we do NOT
    # set RSAC_CI_AUDIO_DETERMINISTIC here. The deterministic hard-asserts in
    # tests/ci_audio/device_capture.rs are written against the Linux null-sink
    # *monitor* (which always carries the 440 Hz tone). On windows-latest the
    # device-capture path opens VB-CABLE's capture endpoint directly with no
    # tone guaranteed to be routed to it, so a deterministic non-silence assert
    # would false-RED. The job still hard-fails on build/start/panic regressions
    # (a genuine WASAPI device-open regression), which is the M5 goal.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-audio

      - name: Install virtual audio (VB-CABLE via LABSN)
        uses: LABSN/sound-ci-helpers@v1

      - name: Set VB-CABLE as default audio device
        shell: pwsh
        run: |
          Install-Module -Name AudioDeviceCmdlets -Force -Scope CurrentUser 2>$null
          Import-Module AudioDeviceCmdlets -ErrorAction SilentlyContinue
          try {
            $devices = Get-AudioDevice -List
            $cable = $devices | Where-Object { $_.Name -like "*CABLE Input*" -and $_.Type -eq "Playback" }
            if (-not $cable) { $cable = $devices | Where-Object { $_.Name -like "*VB-Audio*" -and $_.Type -eq "Playback" } }
            if ($cable) { Set-AudioDevice -Index $cable[0].Index; Write-Host "Default playback: $($cable[0].Name)" }
          } catch { Write-Host "Skipping default device setup: $_" }

      - name: Verify audio devices
        shell: pwsh
        run: |
          $devices = Get-PnpDevice -ErrorAction SilentlyContinue | Where-Object {
            $_.FriendlyName -like "*VB-Audio*" -or $_.FriendlyName -like "*CABLE*"
          }
          if ($devices) {
            echo "RSAC_CI_AUDIO_AVAILABLE=1" >> $env:GITHUB_ENV
          } else {
            echo "RSAC_CI_AUDIO_AVAILABLE=0" >> $env:GITHUB_ENV
          }

      - name: Compilation check
        run: cargo check --no-default-features --features feat_windows

      - name: Run device capture tests
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio device_capture `
            --no-default-features --features feat_windows `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-output.log

      - name: Run device enumeration tests
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio device_enumeration `
            --no-default-features --features feat_windows `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-output-enum.log

      - name: Diagnostics on failure
        if: failure()
        shell: pwsh
        run: |
          Get-Service -Name "AudioSrv", "AudioEndpointBuilder" -ErrorAction SilentlyContinue | Format-List Name, Status
          Get-PnpDevice -ErrorAction SilentlyContinue | Where-Object { $_.Class -eq "AudioEndpoint" -or $_.Class -eq "MEDIA" } | Format-List FriendlyName, Status

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-device-capture-logs
          path: ci-audio-output*.log
          retention-days: 14

  windows-process:
    name: "Windows | Process Capture"
    runs-on: windows-latest
    # rsac M5: first-class, hard-gated (no continue-on-error). As with the
    # device tier, RSAC_CI_AUDIO_DETERMINISTIC is intentionally NOT set: the
    # per-process loopback tone is generated by a child player whose routing is
    # not as tightly verified as the system-default endpoint, so a deterministic
    # non-silence assert risks a false RED. Build/start/panic regressions in the
    # WASAPI Process Loopback path still hard-fail the job (the M5 goal).
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-audio

      - name: Start Windows Audio services
        shell: pwsh
        run: |
          Start-Service -Name "AudioEndpointBuilder" -ErrorAction SilentlyContinue
          Start-Service -Name "AudioSrv" -ErrorAction SilentlyContinue

      - name: Install virtual audio (VB-CABLE via LABSN)
        uses: LABSN/sound-ci-helpers@v1

      - name: Set VB-CABLE as default audio device
        shell: pwsh
        run: |
          Install-Module -Name AudioDeviceCmdlets -Force -Scope CurrentUser 2>$null
          Import-Module AudioDeviceCmdlets -ErrorAction SilentlyContinue
          try {
            $devices = Get-AudioDevice -List
            $cable = $devices | Where-Object { $_.Name -like "*CABLE Input*" -and $_.Type -eq "Playback" }
            if (-not $cable) { $cable = $devices | Where-Object { $_.Name -like "*VB-Audio*" -and $_.Type -eq "Playback" } }
            if ($cable) { Set-AudioDevice -Index $cable[0].Index; Write-Host "Default playback: $($cable[0].Name)" }
          } catch { Write-Host "Skipping default device setup: $_" }

      - name: Verify audio devices
        shell: pwsh
        run: |
          $devices = Get-PnpDevice -ErrorAction SilentlyContinue | Where-Object {
            $_.FriendlyName -like "*VB-Audio*" -or $_.FriendlyName -like "*CABLE*"
          }
          if ($devices) {
            echo "RSAC_CI_AUDIO_AVAILABLE=1" >> $env:GITHUB_ENV
          } else {
            echo "RSAC_CI_AUDIO_AVAILABLE=0" >> $env:GITHUB_ENV
          }

      - name: Compilation check
        run: cargo check --no-default-features --features feat_windows

      - name: Generate test WAV file
        shell: pwsh
        run: |
          # Generate a simple WAV file for audio playback tests
          $sampleRate = 48000; $channels = 2; $durationSecs = 5; $frequency = 440.0; $amplitude = 0.8
          $numSamples = $sampleRate * $durationSecs
          $wavPath = "$env:TEMP\test_440hz.wav"
          $stream = [System.IO.File]::Create($wavPath)
          $writer = New-Object System.IO.BinaryWriter($stream)
          $dataSize = $numSamples * $channels * 4
          $writer.Write([System.Text.Encoding]::ASCII.GetBytes("RIFF"))
          $writer.Write([int]($dataSize + 36))
          $writer.Write([System.Text.Encoding]::ASCII.GetBytes("WAVE"))
          $writer.Write([System.Text.Encoding]::ASCII.GetBytes("fmt "))
          $writer.Write([int]16); $writer.Write([int16]3); $writer.Write([int16]$channels)
          $writer.Write([int]$sampleRate); $writer.Write([int]($sampleRate * $channels * 4))
          $writer.Write([int16]($channels * 4)); $writer.Write([int16]32)
          $writer.Write([System.Text.Encoding]::ASCII.GetBytes("data"))
          $writer.Write([int]$dataSize)
          for ($i = 0; $i -lt $numSamples; $i++) {
            $sample = [float]($amplitude * [Math]::Sin(2.0 * [Math]::PI * $frequency * ($i / $sampleRate)))
            for ($ch = 0; $ch -lt $channels; $ch++) { $writer.Write([float]$sample) }
          }
          $writer.Close(); $stream.Close()
          Write-Host "Test WAV: $((Get-Item $wavPath).Length) bytes"

      - name: Run application capture tests
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio app_capture `
            --no-default-features --features feat_windows `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-output.log

      - name: Run process tree capture tests
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio process_tree_capture `
            --no-default-features --features feat_windows `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-output-proctree.log

      # Windows-specific ApplicationByName coverage (WASAPI sysinfo→PID→process
      # loopback). The cross-platform `application_by_name` module is
      # `#![cfg(target_os = "macos")]`; the Windows path had no integration
      # coverage until this module. The `application_by_name_windows` filter
      # matches ONLY this module (not the macOS `application_by_name` module,
      # whose name is a strict prefix but whose tests are cfg'd out here).
      - name: Run ApplicationByName (Windows) tests
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio application_by_name_windows `
            --no-default-features --features feat_windows `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-output-appbyname.log

      - name: Diagnostics on failure
        if: failure()
        shell: pwsh
        run: |
          Get-Service -Name "AudioSrv", "AudioEndpointBuilder" -ErrorAction SilentlyContinue | Format-List Name, Status
          Get-PnpDevice -ErrorAction SilentlyContinue | Where-Object { $_.Class -eq "AudioEndpoint" -or $_.Class -eq "MEDIA" } | Format-List FriendlyName, Status

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-process-capture-logs
          path: ci-audio-output*.log
          retention-days: 14

  # =============================================================================
  # macOS tiers — CoreAudio + BlackHole
  # =============================================================================

  macos-system:
    name: "macOS | System Capture"
    runs-on: blacksmith-6vcpu-macos-15
    # rsac#26 resolution: `CaptureTarget::SystemDefault` on macOS 14.4+ uses
    # `AudioHardwareCreateProcessTap` (via CATapDescription's
    # `initStereoGlobalTapButExcludeProcesses:`) — the SAME TCC-gated API
    # used by Application / ProcessTree. The earlier claim that "System
    # Capture doesn't need TCC on macOS" was wrong: on a headless runner
    # without `kTCCServiceAudioCapture`, the call hangs for 10–18 minutes
    # before erroring. BlackHole as a default-output virtual device does
    # NOT change this — taps are orthogonal to the default output route.
    #
    # For CI, tests that target SystemDefault skip-early via
    # `require_system_capture!()` (same TCC gate as Process Tap tests).
    # `platform_caps` and `stream_lifecycle` are TCC-free and still run.
    # BlackHole is retained only as a future hook for a non-TCC "BlackHole
    # as input" path; the current build doesn't yet expose that target.
    # `continue-on-error: true` is belt-and-braces until 1-2 green runs
    # confirm the skip-gate prevents hangs on a real macOS runner.
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-audio

      - name: Install BlackHole (non-TCC input path hook) + coreutils
        run: |
          brew install blackhole-2ch
          brew install coreutils   # gtimeout belt-and-braces for TCC-free jobs
          sudo killall coreaudiod 2>/dev/null || true
          sleep 5
          if system_profiler SPAudioDataType 2>/dev/null | grep -qi "output"; then
            echo "RSAC_CI_AUDIO_AVAILABLE=1" >> $GITHUB_ENV
          fi

      - name: Compilation check
        run: cargo check --no-default-features --features feat_macos

      # rsac#26: `system_capture::` tests skip-early on macOS without
      # `RSAC_CI_MACOS_TCC_GRANTED=1` — `SystemDefault` uses Process Tap,
      # which cannot be exercised on managed runners. The skip happens
      # before `.start()` fires `AudioHardwareCreateProcessTap`, so there
      # is no CoreAudio hang. `gtimeout 120` is a hard belt if a future
      # regression slips past the gate.
      - name: Run system capture tests (skip-early without TCC)
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          gtimeout --preserve-status 120 \
            cargo test --test ci_audio "system_capture::" \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee ci-audio-output.log

      # platform_caps and stream_lifecycle don't exercise `SystemDefault`
      # and are TCC-free — they run normally.
      - name: Run platform capabilities tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          gtimeout --preserve-status 120 \
            cargo test --test ci_audio platform_caps \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      - name: Run stream lifecycle tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          gtimeout --preserve-status 180 \
            cargo test --test ci_audio stream_lifecycle \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      # Terminal-read / request_stop tests gate on require_system_capture!(), so
      # on a runner without RSAC_CI_MACOS_TCC_GRANTED they skip-early BEFORE any
      # Process Tap call (no CoreAudio hang). gtimeout is the belt-and-braces cap.
      - name: Run terminal-read / request_stop lifecycle tests (skip-early without TCC)
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          gtimeout --preserve-status 180 \
            cargo test --test ci_audio lifecycle_terminal \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      - name: Diagnostics on failure
        if: failure()
        run: |
          system_profiler SPAudioDataType 2>/dev/null || true
          ps aux | grep -i coreaudio || true
          sw_vers || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-system-capture-logs
          path: ci-audio-output.log
          retention-days: 14

  macos-device:
    name: "macOS | Device Capture"
    runs-on: blacksmith-6vcpu-macos-15
    # rsac#26: on a headless macOS runner with BlackHole as the only audio
    # device, AUHAL `.start()` on BlackHole-as-input hangs 10-11 minutes
    # before erroring OSStatus 2003332927 ('what' = kAudio_UnimplementedError).
    # CoreAudio appears to be waiting for a functional output audio path
    # that doesn't exist in headless VMs. Test code handles the error
    # gracefully, but the hang wastes CI budget — `gtimeout 120` caps it.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-audio

      - name: Check audio and install BlackHole
        run: |
          brew install blackhole-2ch || echo "BlackHole installation failed (expected in CI)"
          brew install coreutils || echo "coreutils install failed"
          sudo killall coreaudiod 2>/dev/null || true
          sleep 5
          if system_profiler SPAudioDataType 2>/dev/null | grep -qi "output"; then
            echo "RSAC_CI_AUDIO_AVAILABLE=1" >> $GITHUB_ENV
          fi

      - name: Compilation check
        run: cargo check --no-default-features --features feat_macos

      - name: Run device capture tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          gtimeout --preserve-status 120 \
            cargo test --test ci_audio device_capture \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee ci-audio-output.log

      - name: Run device enumeration tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          gtimeout --preserve-status 60 \
            cargo test --test ci_audio device_enumeration \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      - name: Diagnostics on failure
        if: failure()
        run: |
          system_profiler SPAudioDataType 2>/dev/null || true
          sw_vers || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-device-capture-logs
          path: ci-audio-output.log
          retention-days: 14

  macos-process:
    name: "macOS | Process Capture"
    runs-on: blacksmith-6vcpu-macos-15
    # rsac#26: Process Tap (`CaptureTarget::Application` / `::ProcessTree`)
    # needs `kTCCServiceAudioCapture` (distinct from `kTCCServiceScreenCapture`
    # — `tccutil` can only REVOKE, not GRANT; SIP-protected TCC.db cannot be
    # edited on managed runners). Tests skip early via
    # `require_app_capture!()` / `require_process_capture!()` unless
    # `RSAC_CI_MACOS_TCC_GRANTED=1` is set. `gtimeout` + `continue-on-error`
    # are belt-and-braces safety nets.
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-audio

      - name: Check audio and install BlackHole
        run: |
          brew install blackhole-2ch || echo "BlackHole installation failed (expected in CI)"
          # rsac#25: coreutils provides `gtimeout` used to bound cargo test steps.
          brew install coreutils || echo "coreutils install failed"
          sudo killall coreaudiod 2>/dev/null || true
          sleep 5
          if system_profiler SPAudioDataType 2>/dev/null | grep -qi "output"; then
            echo "RSAC_CI_AUDIO_AVAILABLE=1" >> $GITHUB_ENV
          fi

      - name: Generate test WAV file
        run: |
          if command -v sox &>/dev/null; then
            sox -n -r 48000 -c 2 -b 32 -e floating-point /tmp/test_440hz.wav synth 5 sine 440
          else
            brew install sox || true
            sox -n -r 48000 -c 2 -b 32 -e floating-point /tmp/test_440hz.wav synth 5 sine 440 2>/dev/null || true
          fi

      - name: Compilation check
        run: cargo check --no-default-features --features feat_macos

      # rsac#25: RSAC_CI_MACOS_TCC_GRANTED is intentionally NOT set. The capture
      # tests skip early on the TCC gate; the ApplicationId/ApplicationByName
      # error-path filters below fail before Process Tap creation and are
      # TCC-free. `gtimeout` remains the hard safety net.
      - name: Run application capture tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          gtimeout --preserve-status 180 \
            cargo test --test ci_audio app_capture \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee ci-audio-output.log

      - name: Run ApplicationId parse test (TCC-free)
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          gtimeout --preserve-status 120 \
            cargo test --test ci_audio select_by_non_numeric_id_returns_application_not_found \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      - name: Run ApplicationByName error-path tests (TCC-free)
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          gtimeout --preserve-status 120 \
            cargo test --test ci_audio select_by_missing_name_returns_error \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log
          gtimeout --preserve-status 120 \
            cargo test --test ci_audio substring_match_returns_error \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      - name: Run process tree capture tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          gtimeout --preserve-status 180 \
            cargo test --test ci_audio process_tree_capture \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      - name: Diagnostics on failure
        if: failure()
        run: |
          system_profiler SPAudioDataType 2>/dev/null || true
          ps aux | grep -i coreaudio || true
          sw_vers || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-process-capture-logs
          path: ci-audio-output.log
          retention-days: 14

  # =============================================================================
  # Summary — reports overall status; fails if any Linux OR Windows
  # (first-class) job fails. macOS stays advisory (TCC cannot be granted on
  # managed runners — see the per-job rsac#26 notes).
  # =============================================================================

  summary:
    name: "Audio Test Summary"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: always()
    needs:
      - linux-system
      - linux-device
      - linux-process
      - windows-system
      - windows-device
      - windows-process
      - macos-system
      - macos-device
      - macos-process
    steps:
      - name: Write CI gap report seed
        run: |
          cat > ci-audio-gap-report.md <<'EOF'
          # Audio CI Coverage Gap Report

          This artifact records first-class coverage claims, current CI gaps, and seeds that need platform evidence before they become hard gates.

          ## Job Results

          | Platform tier | Result |
          |---|---|
          | Linux system | ${{ needs.linux-system.result }} |
          | Linux device | ${{ needs.linux-device.result }} |
          | Linux process | ${{ needs.linux-process.result }} |
          | Windows system | ${{ needs.windows-system.result }} |
          | Windows device | ${{ needs.windows-device.result }} |
          | Windows process | ${{ needs.windows-process.result }} |
          | macOS system | ${{ needs.macos-system.result }} |
          | macOS device | ${{ needs.macos-device.result }} |
          | macOS process | ${{ needs.macos-process.result }} |

          ## Deferred Seeds

          | Seed | Why it is not a hard gate yet | Evidence needed before implementation |
          |---|---|---|
          | Linux hard content assertions | Blacksmith's dbus-less PipeWire startup can expose a sink and monitor while `SystemDefault` still yields 0 buffers. Hard non-silence assertions would risk false REDs. | A green run showing `ci_test_sink.monitor` carries the 440 Hz fixture through rsac capture, then set `RSAC_CI_AUDIO_DETERMINISTIC=1` for the affected Linux tiers. |
          | Linux `ApplicationByName` happy-path filter | The backend supports it, but a low-risk test needs the exact `application.name`/binary reported by `pw-play` or `paplay` on the runner. Guessing that name would be flaky. | Capture `pw-dump --no-colors` for the spawned player and pin the observed stable field before adding the filter. |
          | Windows device/process content assertions | The jobs hard-gate build/start/panic coverage, but the per-device and per-process tone route is not proven like the system VB-CABLE default route. | Prove the child player feeds the targeted endpoint/process loopback deterministically, then enable `RSAC_CI_AUDIO_DETERMINISTIC=1` for those jobs. |
          | macOS first-class managed-runner capture | Process Tap requires `kTCCServiceAudioCapture`, which cannot be granted non-interactively on managed runners. | Use a self-hosted macOS runner with pre-granted Audio Capture permission and set `RSAC_CI_MACOS_TCC_GRANTED=1`. |
          EOF
          cat ci-audio-gap-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Report results
        run: |
          echo "============================================================"
          echo "  Audio Integration Tests — Summary"
          echo "============================================================"
          echo ""
          echo "Linux:"
          echo "  System Capture:  ${{ needs.linux-system.result }}"
          echo "  Device Capture:  ${{ needs.linux-device.result }}"
          echo "  Process Capture: ${{ needs.linux-process.result }}"
          echo ""
          echo "Windows (VB-CABLE, first-class — hard-gated):"
          echo "  System Capture:  ${{ needs.windows-system.result }}"
          echo "  Device Capture:  ${{ needs.windows-device.result }}"
          echo "  Process Capture: ${{ needs.windows-process.result }}"
          echo ""
          echo "macOS (BlackHole, advisory — TCC ungrantable on runners):"
          echo "  System Capture:  ${{ needs.macos-system.result }}"
          echo "  Device Capture:  ${{ needs.macos-device.result }}"
          echo "  Process Capture: ${{ needs.macos-process.result }}"
          echo ""
          echo "============================================================"

          # rsac M5: fail if any Linux (primary) OR Windows (first-class) job
          # failed. macOS is intentionally excluded from the gate because
          # kTCCServiceAudioCapture cannot be granted on a managed runner, so
          # its capture jobs skip-early / run under continue-on-error; gating on
          # them would wedge CI on an unfixable environment limitation. macOS is
          # validated on real hardware (see the per-job rsac#26 notes).
          FAILED=0
          for result in \
            "${{ needs.linux-system.result }}" \
            "${{ needs.linux-device.result }}" \
            "${{ needs.linux-process.result }}"; do
            if [ "$result" != "success" ]; then
              echo "FAILED: Linux job returned '$result'"
              FAILED=1
            fi
          done

          # Windows is a first-class tier. A 'skipped' result is allowed only
          # when the whole workflow path-filter excluded the job; any
          # 'failure'/'cancelled' is a real regression and fails the gate.
          for result in \
            "${{ needs.windows-system.result }}" \
            "${{ needs.windows-device.result }}" \
            "${{ needs.windows-process.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "FAILED: Windows job returned '$result'"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Linux + Windows are first-class platforms — failures must be investigated."
            exit 1
          else
            echo "All Linux + Windows (first-class) jobs passed."
          fi

      - name: Upload CI gap report seed
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-audio-gap-report-seed
          path: ci-audio-gap-report.md
          retention-days: 30
