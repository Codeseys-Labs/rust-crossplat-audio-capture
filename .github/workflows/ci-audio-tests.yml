          # buffers (see helpers / per-test skip paths) rather than false-pass.
          echo "Linux CI: capture content asserts are SOFT (see note above)."

      - name: Run application capture tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio app_capture \
            --no-default-features --features feat_linux \
            -- --test-threads=1 --nocapture 2>&1 | tee ci-audio-output.log

      - name: Run process tree capture tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio process_tree_capture \
            --no-default-features --features feat_linux \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      # The `process_tree` public-API module (introspection round-trips,
      # capability/builder contract, PID=0) was never matched by any filter.
      # The `process_tree::` prefix matches ONLY that module's test paths,
      # not `process_tree_capture::*`, so the two steps don't overlap.
      #
      # NOTE on application_by_name / application_by_pid: those modules are
      # `#![cfg(target_os = "macos")]` and every test is `#[ignore]` (they
      # need macOS 14.4+ Process Tap + TCC audio permission). They cannot run
      # on Linux or on a headless macOS runner, so they are intentionally not
      # invoked here. A Linux ApplicationByName path does not exist in the
      # backend, so there is nothing low-risk to add for Linux.
      - name: Run process tree public-API tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio "process_tree::" \
            --no-default-features --features feat_linux \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      - name: Diagnostics on failure
        if: failure()
        run: |
          systemctl --user status pipewire.service || true
          pw-cli list-objects Node || true
          pactl list short sinks || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
