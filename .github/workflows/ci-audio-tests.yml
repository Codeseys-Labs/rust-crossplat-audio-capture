name: Audio Integration Tests

# =============================================================================
# Cross-platform audio integration tests for rsac.
#
# Structured as platform × tier matrix for granular CI visibility.
# Each job is independently identifiable in GitHub Actions.
#
# Platform status:
#   ✅ Linux (PipeWire)  — PRIMARY lifecycle/API tier on Blacksmith. The jobs
#                           pin ci_test_sink as the default, PROVE the
#                           tone→sink→monitor route end-to-end at the OS level
#                           (scripts/ci-linux-audio-route.sh, a hard setup
#                           gate), and then run with
#                           RSAC_CI_AUDIO_DETERMINISTIC=1 — content assertions
#                           hard-fail on silence (rsac-b106 / rsac-6efb).
#   ✅ Windows (WASAPI)  — FIRST-CLASS on GitHub-hosted windows-latest +
#                           LABSN/VB-CABLE. All three tiers run DETERMINISTIC:
#                           the shared endpoint gate
#                           (scripts/ci-windows-audio-default.ps1) sets and
#                           hard-verifies VB-CABLE as the default playback
#                           endpoint, which every tier's tone route flows
#                           through (rsac-0f33).
#   ⏳ macOS (CoreAudio) — advisory on managed CI. Process Tap based system,
#                           application, and process-tree capture require
#                           kTCCServiceAudioCapture, which cannot be granted
#                           non-interactively on Blacksmith/GitHub-hosted runners.
#                           Full capture validation still requires real hardware
#                           or a self-hosted, pre-consented macOS runner.
# =============================================================================

on:
  push:
    branches: [main, master, 'release/**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/ci-linux-audio-route.sh'
      - 'scripts/ci-windows-audio-default.ps1'
      - '.github/workflows/ci-audio-tests.yml'
  pull_request:
    branches: [main, master, 'release/**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/ci-linux-audio-route.sh'
      - 'scripts/ci-windows-audio-default.ps1'
      - '.github/workflows/ci-audio-tests.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LOG: rsac=debug

# =============================================================================
# Linux tiers
# =============================================================================

jobs:
  linux-system:
    name: "Linux | System Capture"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    # Use the `bash` keyword shell (`-eo pipefail`) instead of the Actions
    # default (`bash -e`, no pipefail) so a failing `cargo test` propagates
    # through the `| tee log` pipe instead of being masked by tee's exit 0.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: linux-audio

      - name: Install PipeWire and audio dependencies
        run: |
          sudo add-apt-repository -y ppa:pipewire-debian/pipewire-upstream
          sudo apt-get update
          sudo apt-get install -y \
            pipewire pipewire-bin pipewire-audio-client-libraries \
            pipewire-pulse libpipewire-0.3-dev libspa-0.2-dev \
            wireplumber pulseaudio-utils sox libclang-dev

      - name: Start PipeWire
        run: |
          # Blacksmith Firecracker microVMs lack a D-Bus user session, so
          # systemctl --user services won't start. Launch daemons manually.
          export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
          echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
          sudo mkdir -p "$XDG_RUNTIME_DIR"
          sudo chmod 700 "$XDG_RUNTIME_DIR"
          sudo chown "$(id -u):$(id -g)" "$XDG_RUNTIME_DIR"

          # Kill any pre-existing PulseAudio
          pulseaudio --kill 2>/dev/null || true

          # wireplumber 0.4 EXITS at startup without a D-Bus session bus
          # ("Error acquiring bus address: Cannot autolaunch D-Bus without
          # X11 $DISPLAY" -> on_disconnected; evidence run 28904373406) -
          # and without the session manager NO STREAM IS EVER LINKED, so
          # every capture sees silence (streams appeared in wpctl status
          # but zero samples flowed, even with pw-play --target). Give the
          # stack a private session bus; no X11/systemd needed.
          export DBUS_SESSION_BUS_ADDRESS="unix:path=$XDG_RUNTIME_DIR/bus"
          dbus-daemon --session --address="$DBUS_SESSION_BUS_ADDRESS" --nopidfile --fork
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> "$GITHUB_ENV"

          # Launch PipeWire stack manually
          pipewire &
          sleep 1
          wireplumber &
          sleep 1
          pipewire-pulse &

          # Verify the PipeWire core is accepting commands. A fixed sleep can
          # race slow startup and later present as false audio-test silence.
          for _ in $(seq 1 20); do
            pw-cli info 0 >/dev/null 2>&1 && break
            sleep 1
          done
          pw-cli info 0 >/dev/null 2>&1 || { echo "ERROR: PipeWire core not ready"; exit 1; }
          pw-cli info 0

          # The session manager must SURVIVE startup - a dead wireplumber
          # means no links ever form and every capture is silence.
          sleep 2
          if ! pgrep -x wireplumber >/dev/null; then
            echo "ERROR: wireplumber (session manager) is not running"
            exit 1
          fi
          echo "OK: wireplumber alive (pid $(pgrep -x wireplumber))"

      - name: Create and verify virtual audio sink
        run: |
          # Fail-fast on sink creation (no `|| true`): a missing sink used to
          # masquerade as "audio available" because RSAC_CI_AUDIO_AVAILABLE was
          # hardcoded later. Now we create, then VERIFY, then export the env.
          #
          # Wait for the pipewire-pulse Pulse socket to actually accept pactl
          # before loading the sink.
          for _ in $(seq 1 20); do
            pactl info >/dev/null 2>&1 && break
            sleep 1
          done
          pactl info >/dev/null 2>&1 || { echo "ERROR: pipewire-pulse (pactl) not ready"; exit 1; }
          pactl load-module module-null-sink \
            sink_name=ci_test_sink \
            sink_properties=device.description="CI_Test_Sink" \
            rate=48000 channels=2 format=float32le
          # Under the manually-bootstrapped PipeWire in CI there is no dbus
          # session: `pactl set-default-sink` returns "Not supported" and
          # pw-metadata cannot connect. Keep the command as a best effort and
          # record the actual routing state below; content assertions stay soft
          # until routing is proven deterministic on the runner.
          pactl set-default-sink ci_test_sink 2>/dev/null || true
          sleep 1

          # Hard gate: the sink MUST exist. The old `|| true` masked a missing
          # sink and let capture silently see silence (a false green).
          if ! pactl list short sinks | grep -q "ci_test_sink"; then
            echo "ERROR: ci_test_sink not present in 'pactl list short sinks'"
            pactl list short sinks || true
            exit 1
          fi
          for _ in $(seq 1 10); do
            pactl list short sources | grep -q "ci_test_sink.monitor" && break
            sleep 1
          done
          if ! pactl list short sources | grep -q "ci_test_sink.monitor"; then
            echo "ERROR: ci_test_sink.monitor not present in 'pactl list short sources'"
            pactl list short sources || true
            exit 1
          fi

          # Probe the default sink for diagnostics; the routing gate below is
          # what actually proves (and hardens) the route.
          DEFAULT_SINK="$(pactl get-default-sink 2>/dev/null || echo unknown)"
          SINK_COUNT="$(pactl list short sinks | grep -c .)"
          echo "default sink='${DEFAULT_SINK}' sink_count=${SINK_COUNT}"
          echo "RSAC_CI_AUDIO_AVAILABLE=1" >> "$GITHUB_ENV"

      # rsac-b106 / rsac-6efb: prove the tone → ci_test_sink → monitor route
      # END-TO-END at the OS level (pw-play → parecord + sox RMS/frequency
      # analysis), pin ci_test_sink as the default sink, and only then export
      # RSAC_CI_AUDIO_DETERMINISTIC=1 + PULSE_SINK so the capture tests'
      # content assertions hard-fail on silence instead of soft-warning.
      # HARD GATE by design: a broken route fails HERE, at setup, with routing
      # diagnostics — never later as confusing test silence, and never as a
      # soft-warned false green.
      - name: Prove deterministic routing (hard gate, enables deterministic mode)
        run: bash scripts/ci-linux-audio-route.sh

      # rsac-0a1f: every cargo invocation in this job uses
      # `feat_linux,compose` so the ci_audio test binary (and the lib rlib) is
      # compiled ONCE for the whole job. `compose` is additive and
      # platform-independent; it only unlocks tests/ci_audio/compose.rs
      # (`#![cfg(feature = "compose")]`) for the compose:: steps below.
      - name: Run system capture tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio system_capture \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee ci-audio-output.log

      # G8 overrun coverage: stalls the consumer and asserts the ring buffer
      # overflows under the deterministic source. Previously this module had
      # no CI invocation at all.
      - name: Run overrun tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio overrun \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      # G7 subscribe coverage: the `subscribe` module was never matched by any
      # CI filter. The `subscribe` substring matches only this module.
      - name: Run subscribe tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio subscribe \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      - name: Run platform capabilities tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio platform_caps \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      - name: Run stream lifecycle tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio stream_lifecycle \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      # Terminal read-behavior + request_stop() end-to-end on the real bridge:
      # request_stop drives the stream terminal (fatal StreamEnded per ADR-0003),
      # unblocks a parked blocking read promptly, and the stop() vs request_stop()
      # handle-ownership distinction holds. The `lifecycle_terminal` substring
      # matches ONLY this module, not `stream_lifecycle`.
      - name: Run terminal-read / request_stop lifecycle tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio lifecycle_terminal \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      # Covers the VISION.md "multi-source" pillar: two captures at
      # once must not starve each other, and stopping one must not
      # halt the other. See tests/ci_audio/multi_source.rs.
      - name: Run multi-source capture tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio multi_source \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      # rsac-0a1f: composed multi-source capture (`compose` feature) — a
      # mono-mixdown group + a keep-channels group over system audio through
      # the composition pipeline. The `compose::` prefix matches ONLY
      # tests/ci_audio/compose.rs. Content assertions follow the Linux
      # soft-assert policy (see the sink setup NOTE above): hard on
      # layout/lifecycle/panics, soft on non-silence until the null-sink
      # routing is proven deterministic.
      - name: Run composed capture tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio "compose::" \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      # Wiring existence check (mirrors the grep-based guards in ci.yml's
      # test-macos job): assert the compose:: module is discoverable by the
      # harness, so a module rename or a cfg/feature change can't silently
      # reduce the step above to a zero-test filter (a false green).
      - name: Verify compose tests are wired up
        run: |
          cargo test --test ci_audio --no-default-features --features feat_linux,compose \
            -- --list 2>&1 | tee ci-audio-compose-list.log
          grep -q "compose::" ci-audio-compose-list.log || {
            echo "FAIL: compose:: tests not discovered in ci_audio test list"
            exit 1
          }
          echo "OK: compose:: integration tests are wired up"

      # CI-4: enumeration_matrix's "no silent empty list" (audit L4) assertion
      # only has teeth when audio_available() is true. RSAC_CI_AUDIO_AVAILABLE=1
      # is exported in the setup step above, so running it HERE (on a runner with
      # a real virtual sink) is the only place that arm actually executes — the
      # default unit-test matrix runs it headless, where it correctly self-skips.
      - name: Run enumeration_matrix against real devices (L4 non-empty assertion)
        run: |
          cargo test --test enumeration_matrix \
            --no-default-features --features feat_linux,compose \
            -- --nocapture 2>&1 | tee -a ci-audio-output.log

      - name: Diagnostics on failure
        if: failure()
        run: |
          systemctl --user status pipewire.service || true
          systemctl --user status pipewire-pulse.service || true
          pw-cli list-objects Node || true
          pactl list short sinks || true
          journalctl --user -u pipewire.service --no-pager -n 50 || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-system-capture-logs
          path: |
            ci-audio-output.log
            /tmp/rsac_route_probe_pwdump.json
          retention-days: 14

