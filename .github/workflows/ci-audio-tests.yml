          # session: set-default-sink is "Not supported" and pw-metadata can't
          # connect. With ci_test_sink as the ONLY sink, default routing lands
          # on it anyway.
          pactl set-default-sink ci_test_sink 2>/dev/null || true
          sleep 1
          if ! pactl list short sinks | grep -q "ci_test_sink"; then
