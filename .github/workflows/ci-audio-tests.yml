      # rsac-b106 / rsac-6efb: OS-level route proof + deterministic-mode flip
      # (see the linux-system job's copy of this step for the full rationale).
      - name: Prove deterministic routing (hard gate, enables deterministic mode)
        run: bash scripts/ci-linux-audio-route.sh

      - name: Run device capture tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio device_capture \
            --no-default-features --features feat_linux \
            -- --test-threads=1 --nocapture 2>&1 | tee ci-audio-output.log

      - name: Run device enumeration tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio device_enumeration \
            --no-default-features --features feat_linux \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      - name: Diagnostics on failure
        if: failure()
        run: |
          systemctl --user status pipewire.service || true
          pw-cli list-objects Node || true
          pactl list short sinks || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-device-capture-logs
          path: ci-audio-output.log
          retention-days: 14

