          sudo chmod 700 "$XDG_RUNTIME_DIR"
          sudo chown "$(id -u):$(id -g)" "$XDG_RUNTIME_DIR"
          pulseaudio --kill 2>/dev/null || true
          pipewire &
          sleep 1
          wireplumber &
          sleep 1
          pipewire-pulse &
          sleep 2
          pw-cli info 0 || echo "WARNING: pw-cli info failed"

      - name: Create and verify virtual audio sink
        run: |
          # Wait for the pipewire-pulse Pulse socket before loading the sink
