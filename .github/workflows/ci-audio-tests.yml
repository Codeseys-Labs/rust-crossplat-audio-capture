name: Audio Integration Tests

# =============================================================================
# Cross-platform audio integration tests for rsac.
#
# Structured as ONE job per platform, each running the three capture tiers
# (system / device / process) as sequential steps that share a single
# checkout + toolchain + cache + audio bootstrap + compile. This replaced the
# former 3-OS x 3-tier (9-job) matrix, which recompiled the ci_audio binary and
# re-ran the ~90-line PipeWire bootstrap once per tier. Per-tier pass/fail is
# exported as a job output (`tier_system`/`tier_device`/`tier_process`) so the
# `summary` job below can report per-tier results even though (rsac-fba6) the
# tiers now hard-fail the job on the first failing tier, same as every other
# platform.
#
# Platform status:
#   ✅ Linux (PipeWire)  — PRIMARY lifecycle/API tier on Blacksmith. The job
#                           pins ci_test_sink as the default, PROVES the
#                           tone→sink→monitor route end-to-end at the OS level
#                           (scripts/ci-linux-audio-route.sh, a hard setup
#                           gate), and then runs with
#                           RSAC_CI_AUDIO_DETERMINISTIC=1 — content assertions
#                           hard-fail on silence (rsac-b106 / rsac-6efb).
#   ✅ Windows (WASAPI)  — FIRST-CLASS on GitHub-hosted windows-latest +
#                           LABSN/VB-CABLE. All three tiers run DETERMINISTIC:
#                           the shared endpoint gate
#                           (scripts/ci-windows-audio-default.ps1) sets and
#                           hard-verifies VB-CABLE as the default playback
#                           endpoint, which every tier's tone route flows
#                           through (rsac-0f33).
#   ⏳ macOS (CoreAudio) — gated on managed CI (rsac-fba6). Process Tap based
#                           system, application, and process-tree capture
#                           require kTCCServiceAudioCapture, which cannot be
#                           granted non-interactively on Blacksmith/GitHub-hosted
#                           runners, so those code paths skip-early via
#                           require_*!() gates rather than exercising real
#                           capture — but a panic/build break in any tier now
#                           fails the job AND the summary gate, same as Linux
#                           and Windows. Full capture validation still requires
#                           real hardware or a self-hosted, pre-consented macOS
#                           runner.
#
#   Runs on stable tags (advisory, not a release.yml gate — see rsac-75bf).
# =============================================================================

on:
  push:
    # release/** intentionally dropped from the push filter (KEPT in
    # pull_request below): every release-branch commit lands via a PR, so
    # push+pull_request double-fired this audio matrix (mirrors the same fix
    # in ci.yml). The existing path filter is unchanged.
    branches: [main, master]
    # Also run on stable semver tags so a release actually re-proves the audio
    # matrix at the tag (not just whatever the last master-push run happened
    # to cover) — mirrors ci.yml's tags: trigger. Per GitHub semantics,
    # paths/paths-ignore are NOT evaluated for tag pushes, so this fires
    # unconditionally on v*.*.* regardless of the paths: filter below.
    # Pre-release shapes (v*-rc.1) are excluded, same as ci.yml.
    tags:
      - 'v*.*.*'
      - '!v*-*'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - 'bindings/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/ci-linux-audio-route.sh'
      - 'scripts/ci-linux-tone-loop.sh'
      - 'scripts/ci-windows-audio-default.ps1'
      - '.github/workflows/ci-audio-tests.yml'
      - '.github/actions/**'
  pull_request:
    branches: [main, master, 'release/**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - 'bindings/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/ci-linux-audio-route.sh'
      - 'scripts/ci-linux-tone-loop.sh'
      - 'scripts/ci-windows-audio-default.ps1'
      - '.github/workflows/ci-audio-tests.yml'
      - '.github/actions/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LOG: rsac=debug

# Cancel superseded runs on the same ref (mirrors ci.yml). Without this a rapid
# sequence of pushes to the same PR branch ran every prior in-flight audio
# matrix to completion (nothing cancelled it), wasting ~14 job-min per
# superseded run. cancel-in-progress only on pull_request so a real push to
# main/master is never cancelled mid-flight.
concurrency:
  group: audio-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# PR-controlled code (tests, local composite actions) runs after checkout —
# keep the token read-only and out of the persisted git credentials.
permissions:
  contents: read

jobs:
  # ===========================================================================
  # Linux (PipeWire) — system + device + process tiers in one job.
  # Setup (checkout/toolchain/cache/PipeWire bootstrap/null-sink/route gate/
  # compile) runs ONCE; the three tiers then run as continue-on-error steps
  # against the single already-compiled ci_audio binary. The route gate is a
  # HARD setup step (not continue-on-error): a broken virtual route fails the
  # whole job at setup with diagnostics, exactly as before.
  # ===========================================================================
  linux-audio:
    name: "Linux Audio (system+device+process)"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # Budget: setup/compile + the three tier step caps (15+15+15) + margin —
    # a hung early tier must never eat later tiers' budget (review PR #56).
    # matching the former per-tier job timeouts). Real runs finish in minutes.
    timeout-minutes: 55
    # `bash` keyword shell (`-eo pipefail`) so a failing `cargo test` propagates
    # through the `| tee log` pipe instead of being masked by tee's exit 0.
    defaults:
      run:
        shell: bash
    outputs:
      tier_system: ${{ steps.record.outputs.tier_system }}
      tier_device: ${{ steps.record.outputs.tier_device }}
      tier_process: ${{ steps.record.outputs.tier_process }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-key: linux-audio

      # Install PipeWire (daemon package set), bootstrap the manual daemon stack,
      # create + verify ci_test_sink, and run the deterministic-routing HARD GATE
      # (scripts/ci-linux-audio-route.sh) — all in one composite (daemon: true).
      # The route gate inside is NOT continue-on-error: a broken virtual route
      # fails the whole job at setup with diagnostics, and the composite's
      # $GITHUB_ENV exports (XDG_RUNTIME_DIR, DBUS_SESSION_BUS_ADDRESS,
      # RSAC_CI_AUDIO_AVAILABLE, and RSAC_CI_AUDIO_DETERMINISTIC + PULSE_SINK from
      # the route script) persist to the tier steps below, exactly as when these
      # were inline job steps.
      - name: Set up PipeWire + prove deterministic routing (hard gate)
        uses: ./.github/actions/pipewire-setup
        with:
          daemon: "true"

      # rsac-0a1f: compile the ci_audio test binary ONCE for the whole job with
      # `feat_linux,compose`. `compose` is additive and platform-independent; it
      # only unlocks tests/ci_audio/compose.rs (`#![cfg(feature = "compose")]`)
      # for the compose:: filter (system tier). The device/process tiers below
      # reuse this SAME feature set so cargo does not recompile — their filters
      # simply never match the compose:: tests (audit-confirmed inert).
      - name: Build ci_audio test binary (compile once)
        run: cargo test --test ci_audio --no-run --no-default-features --features feat_linux,compose

      # ── System tier ─────────────────────────────────────────────────────
      - name: System capture tier
        id: tier_system
        continue-on-error: true
        timeout-minutes: 15
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          # G8 overrun + G7 subscribe modules were previously unmatched by any
          # filter; each substring below matches only its own module.
          cargo test --test ci_audio system_capture \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee ci-audio-system.log
          cargo test --test ci_audio overrun \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-system.log
          cargo test --test ci_audio subscribe \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-system.log
          cargo test --test ci_audio platform_caps \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-system.log
          cargo test --test ci_audio stream_lifecycle \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-system.log
          # `lifecycle_terminal` matches ONLY this module, not `stream_lifecycle`.
          cargo test --test ci_audio lifecycle_terminal \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-system.log
          cargo test --test ci_audio multi_source \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-system.log
          # composed multi-source capture — `compose::` matches ONLY compose.rs.
          cargo test --test ci_audio "compose::" \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-system.log
          # Wiring existence check: a renamed/cfg'd-out compose module would make
          # the filter above match zero tests and pass vacuously.
          cargo test --test ci_audio --no-default-features --features feat_linux,compose \
            -- --list 2>&1 | tee ci-audio-compose-list.log
          grep -q "compose::" ci-audio-compose-list.log || {
            echo "FAIL: compose:: tests not discovered in ci_audio test list"
            exit 1
          }
          echo "OK: compose:: integration tests are wired up"
          # CI-4: enumeration_matrix's "no silent empty list" assertion only has
          # teeth when RSAC_CI_AUDIO_AVAILABLE=1 (exported in setup above), so
          # this is the only place that arm actually executes.
          cargo test --test enumeration_matrix \
            --no-default-features --features feat_linux,compose \
            -- --nocapture 2>&1 | tee -a ci-audio-system.log

      # ── Device tier ─────────────────────────────────────────────────────
      - name: Device capture tier
        id: tier_device
        continue-on-error: true
        timeout-minutes: 15
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio device_capture \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee ci-audio-device.log
          cargo test --test ci_audio device_enumeration \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-device.log
          cargo test --test ci_audio device_watch \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-device.log

      # ── Process tier ────────────────────────────────────────────────────
      - name: Process capture tier
        id: tier_process
        continue-on-error: true
        timeout-minutes: 15
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio app_capture \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee ci-audio-process.log
          cargo test --test ci_audio application_by_name_linux \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-process.log
          cargo test --test ci_audio process_tree_capture \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-process.log
          # `process_tree::` matches ONLY the public-API module, not
          # `process_tree_capture::*`, so the two do not overlap.
          cargo test --test ci_audio "process_tree::" \
            --no-default-features --features feat_linux,compose \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-process.log

      - name: Record tier outcomes
        id: record
        if: always()
        run: |
          {
            echo "tier_system=${{ steps.tier_system.outcome }}"
            echo "tier_device=${{ steps.tier_device.outcome }}"
            echo "tier_process=${{ steps.tier_process.outcome }}"
          } >> "$GITHUB_OUTPUT"

      - name: Diagnostics on failure
        if: ${{ failure() || steps.tier_system.outcome == 'failure' || steps.tier_device.outcome == 'failure' || steps.tier_process.outcome == 'failure' }}
        run: |
          systemctl --user status pipewire.service || true
          systemctl --user status pipewire-pulse.service || true
          pw-cli list-objects Node || true
          pactl list short sinks || true
          journalctl --user -u pipewire.service --no-pager -n 50 || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-audio-logs
          path: |
            ci-audio-system.log
            ci-audio-device.log
            ci-audio-process.log
            /tmp/rsac_route_probe_pwdump.json
          retention-days: 14
          if-no-files-found: ignore

  # ===========================================================================
  # Windows tiers — VB-CABLE virtual audio driver — FIRST-CLASS (hard-gated)
  # NOTE: Blacksmith Windows VMs (Firecracker) have no audio subsystem at all
  # (AudioSrv, AudioEndpointBuilder, AudioSes.dll are all absent).
  # We use GitHub-hosted windows-latest for audio integration tests, which
  # has a full Windows audio stack. Blacksmith handles compilation/unit tests.
  #
  # rsac M5: Windows is a first-class tier. Every tier step's real pass/fail is
  # exported as a job output and gated by the summary job. The shared endpoint
  # gate (scripts/ci-windows-audio-default.ps1) verifies VB-CABLE as the active
  # default playback endpoint before any tier runs and enables deterministic
  # mode; the process tier's per-PID Application step opts back out inline (see
  # its comment).
  # ===========================================================================
  windows-audio:
    name: "Windows Audio (system+device+process)"
    runs-on: windows-latest
    # Backstop only: each tier carries its own step-level timeout-minutes (20,
    # matching the former per-tier job timeouts).
    timeout-minutes: 70
    outputs:
      tier_system: ${{ steps.record.outputs.tier_system }}
      tier_device: ${{ steps.record.outputs.tier_device }}
      tier_process: ${{ steps.record.outputs.tier_process }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-key: windows-audio

      # Formerly only in the windows-process job; harmless + idempotent for all
      # tiers (windows-latest normally has these running already).
      - name: Start Windows Audio services
        shell: pwsh
        run: |
          Start-Service -Name "AudioEndpointBuilder" -ErrorAction SilentlyContinue
          Start-Service -Name "AudioSrv" -ErrorAction SilentlyContinue

      - name: Install virtual audio (VB-CABLE via LABSN)
        uses: LABSN/sound-ci-helpers@d08c889a7bba7d9b1b059f8f76dac4672ea3a9cf # v1 (v1 tag == v1.0.4, resolved via git ls-remote)

      # rsac-0f33: shared deterministic-endpoint gate (set VB-CABLE as the
      # default playback endpoint with retries, HARD-verify it, then export
      # RSAC_CI_AUDIO_AVAILABLE=1 + RSAC_CI_AUDIO_DETERMINISTIC=1). HARD setup
      # step (not continue-on-error) — see the script header for why the
      # deterministic flip is sound per tier.
      - name: Set + verify VB-CABLE default endpoint (hard gate, enables deterministic mode)
        shell: pwsh
        run: ./scripts/ci-windows-audio-default.ps1

      # Compile the ci_audio test binary ONCE (feat_windows,compose superset) so
      # all three tiers share it instead of the former 3x `cargo check`.
      - name: Build ci_audio test binary (compile once)
        run: cargo test --test ci_audio --no-run --no-default-features --features feat_windows,compose

      # ── System tier ─────────────────────────────────────────────────────
      - name: System capture tier
        id: tier_system
        continue-on-error: true
        timeout-minutes: 20
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          # $LASTEXITCODE after EVERY cargo pipe (PR #56 outside-diff review):
          # a later successful cargo call overwrites the exit code, so without
          # per-invocation checks an early tier failure is silently masked.
          cargo test --test ci_audio system_capture `
            --no-default-features --features feat_windows,compose `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-system.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo test --test ci_audio platform_caps `
            --no-default-features --features feat_windows,compose `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-system-caps.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo test --test ci_audio stream_lifecycle `
            --no-default-features --features feat_windows,compose `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-system-lifecycle.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          # `lifecycle_terminal` matches ONLY this module (not `stream_lifecycle`).
          cargo test --test ci_audio lifecycle_terminal `
            --no-default-features --features feat_windows,compose `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-system-terminal.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          # Composed multi-source capture on the deterministic VB-CABLE default
          # endpoint — first HARD tone-content verification of the compose engine.
          cargo test --test ci_audio "compose::" `
            --no-default-features --features feat_windows,compose `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-system-compose.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          # Wiring existence check: a renamed/cfg'd-out compose module would make
          # the filter above match zero tests and pass vacuously.
          $list = cargo test --test ci_audio `
            --no-default-features --features feat_windows,compose `
            -- --list 2>&1 | Out-String
          if ($list -notmatch "compose::") {
            Write-Error "compose:: tests missing from the ci_audio test list — module rename or feature-gating regression"
            exit 1
          }
          Write-Host "OK: compose:: tests present in the ci_audio binary."

      # ── Device tier ─────────────────────────────────────────────────────
      - name: Device capture tier
        id: tier_device
        continue-on-error: true
        timeout-minutes: 20
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          # $LASTEXITCODE after every cargo pipe (PR #56 outside-diff review).
          cargo test --test ci_audio device_capture `
            --no-default-features --features feat_windows,compose `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-device.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo test --test ci_audio device_enumeration `
            --no-default-features --features feat_windows,compose `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-device-enum.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          # CI-4 (Windows arm): enumeration_matrix's "no silent empty list"
          # assertion only executes where RSAC_CI_AUDIO_AVAILABLE=1 — this tier
          # has real WASAPI endpoints (VB-CABLE).
          cargo test --test enumeration_matrix `
            --no-default-features --features feat_windows,compose `
            -- --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-device-enum-matrix.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # Formerly only in the windows-process job; needed before the process tier.
      - name: Generate test WAV file (process tier)
        shell: pwsh
        run: |
          # Generate a simple WAV file for audio playback tests
          $sampleRate = 48000; $channels = 2; $durationSecs = 5; $frequency = 440.0; $amplitude = 0.8
          $numSamples = $sampleRate * $durationSecs
          $wavPath = "$env:TEMP\test_440hz.wav"
          $stream = [System.IO.File]::Create($wavPath)
          $writer = New-Object System.IO.BinaryWriter($stream)
          $dataSize = $numSamples * $channels * 4
          $writer.Write([System.Text.Encoding]::ASCII.GetBytes("RIFF"))
          $writer.Write([int]($dataSize + 36))
          $writer.Write([System.Text.Encoding]::ASCII.GetBytes("WAVE"))
          $writer.Write([System.Text.Encoding]::ASCII.GetBytes("fmt "))
          $writer.Write([int]16); $writer.Write([int16]3); $writer.Write([int16]$channels)
          $writer.Write([int]$sampleRate); $writer.Write([int]($sampleRate * $channels * 4))
          $writer.Write([int16]($channels * 4)); $writer.Write([int16]32)
          $writer.Write([System.Text.Encoding]::ASCII.GetBytes("data"))
          $writer.Write([int]$dataSize)
          for ($i = 0; $i -lt $numSamples; $i++) {
            $sample = [float]($amplitude * [Math]::Sin(2.0 * [Math]::PI * $frequency * ($i / $sampleRate)))
            for ($ch = 0; $ch -lt $channels; $ch++) { $writer.Write([float]$sample) }
          }
          $writer.Close(); $stream.Close()
          Write-Host "Test WAV: $((Get-Item $wavPath).Length) bytes"

      # ── Process tier ────────────────────────────────────────────────────
      - name: Process capture tier
        id: tier_process
        continue-on-error: true
        timeout-minutes: 20
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          # Evidence exception (rsac-0f33): per-PID Application capture has NEVER
          # delivered content on windows-latest (the spawned player's session is
          # not found for its PID), while ProcessTree loopback of the SAME player
          # captures the tone (RMS≈0.53). This ONE invocation opts out of the
          # job-wide deterministic mode; the process-tree step below stays hard.
          # Build/start/panic regressions here still fail the tier.
          $env:RSAC_CI_AUDIO_DETERMINISTIC = "0"
          # $LASTEXITCODE after every cargo pipe (PR #56 outside-diff review).
          cargo test --test ci_audio app_capture `
            --no-default-features --features feat_windows,compose `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-process.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $env:RSAC_CI_AUDIO_DETERMINISTIC = "1"
          cargo test --test ci_audio process_tree_capture `
            --no-default-features --features feat_windows,compose `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-process-proctree.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          # Windows-specific ApplicationByName coverage (WASAPI sysinfo→PID→
          # process loopback). The `application_by_name_windows` filter matches
          # ONLY this module (the macOS `application_by_name` module is cfg'd out).
          cargo test --test ci_audio application_by_name_windows `
            --no-default-features --features feat_windows,compose `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-process-appbyname.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Record tier outcomes
        id: record
        if: always()
        shell: bash
        run: |
          {
            echo "tier_system=${{ steps.tier_system.outcome }}"
            echo "tier_device=${{ steps.tier_device.outcome }}"
            echo "tier_process=${{ steps.tier_process.outcome }}"
          } >> "$GITHUB_OUTPUT"

      - name: Diagnostics on failure
        if: ${{ failure() || steps.tier_system.outcome == 'failure' || steps.tier_device.outcome == 'failure' || steps.tier_process.outcome == 'failure' }}
        shell: pwsh
        run: |
          Get-Service -Name "AudioSrv", "AudioEndpointBuilder" -ErrorAction SilentlyContinue | Format-List Name, Status
          Get-PnpDevice -ErrorAction SilentlyContinue | Where-Object { $_.Class -eq "AudioEndpoint" -or $_.Class -eq "MEDIA" } | Format-List FriendlyName, Status
          Import-Module AudioDeviceCmdlets -ErrorAction SilentlyContinue
          Get-AudioDevice -List | Format-Table Index, Type, Name, Default -AutoSize
          Get-AudioDevice -Playback | Format-List Name, Default, ID

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-audio-logs
          path: ci-audio-*.log
          retention-days: 14
          if-no-files-found: ignore

  # ===========================================================================
  # macOS tiers — CoreAudio + BlackHole (advisory: excluded from the gate)
  #
  # Process Tap capture (system/application/process-tree) needs
  # kTCCServiceAudioCapture, which cannot be granted non-interactively on
  # managed runners, so tests skip-early via the require_*!() gates — a
  # graceful skip returns Ok/ignored, not a hard test failure. rsac-fba6: all
  # three tiers used to be continue-on-error (so the whole tier suite ran
  # regardless of outcome, and macOS was excluded from the summary gate below).
  # That masked real panics/build breaks behind the TCC-skip rationale. Tiers
  # now hard-fail like every other platform's tiers; the summary job gates on
  # macOS too (2 green runs observed pre-change: 29564636523, 29564289847).
  # ===========================================================================
  macos-audio:
    name: "macOS Audio (system+device+process)"
    runs-on: blacksmith-6vcpu-macos-15
    # Backstop only: each tier carries its own step-level timeout-minutes
    # (system 15 / device 10 / process 20 — matching the former per-tier jobs),
    # and every cargo invocation is additionally bounded by gtimeout.
    timeout-minutes: 55
    # `bash` keyword shell (`-eo pipefail`), mirroring linux-audio: without it
    # the steps run under GitHub's default `bash -e` (NO pipefail), so a
    # `cargo test … | tee log` pipe reports tee's exit 0 and MASKS a real test
    # panic/build break — which would silently defeat this job's summary gate
    # (rsac-fba6 makes macOS gating). pipefail makes genuine failures propagate;
    # the device tier below explicitly tolerates the one KNOWN environmental
    # hang (AUHAL `.start()` on BlackHole, killed by gtimeout) so pipefail does
    # not turn that documented timeout into a spurious RED.
    defaults:
      run:
        shell: bash
    outputs:
      tier_system: ${{ steps.record.outputs.tier_system }}
      tier_device: ${{ steps.record.outputs.tier_device }}
      tier_process: ${{ steps.record.outputs.tier_process }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-key: macos-audio

      - name: Install BlackHole (non-TCC input path hook) + coreutils
        run: |
          # BlackHole is a future hook for a non-TCC "BlackHole as input" path;
          # the current build doesn't yet expose that target. coreutils provides
          # `gtimeout`, the hard belt bounding each cargo test invocation below.
          brew install blackhole-2ch || echo "BlackHole installation failed (expected in CI)"
          brew install coreutils || echo "coreutils install failed"
          sudo killall coreaudiod 2>/dev/null || true
          sleep 5
          if system_profiler SPAudioDataType 2>/dev/null | grep -qi "output"; then
            echo "RSAC_CI_AUDIO_AVAILABLE=1" >> $GITHUB_ENV
          fi

      # Compile the ci_audio test binary ONCE (feat_macos) so all three tiers
      # share it instead of the former 3x `cargo check`.
      - name: Build ci_audio test binary (compile once)
        run: cargo test --test ci_audio --no-run --no-default-features --features feat_macos

      # ── System tier ─────────────────────────────────────────────────────
      # rsac#26: `SystemDefault` on macOS 14.4+ uses AudioHardwareCreateProcessTap
      # (TCC-gated). `system_capture::` tests skip-early without
      # RSAC_CI_MACOS_TCC_GRANTED=1 (before .start() fires the tap, so no
      # CoreAudio hang); `gtimeout` is the hard belt. platform_caps and
      # stream_lifecycle are TCC-free and run normally.
      - name: System capture tier (skip-early without TCC)
        id: tier_system
        timeout-minutes: 15
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          gtimeout --preserve-status 120 \
            cargo test --test ci_audio "system_capture::" \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee ci-audio-system.log
          gtimeout --preserve-status 120 \
            cargo test --test ci_audio platform_caps \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-system.log
          gtimeout --preserve-status 180 \
            cargo test --test ci_audio stream_lifecycle \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-system.log
          # Terminal-read / request_stop tests gate on require_system_capture!(),
          # so they skip-early BEFORE any Process Tap call (no CoreAudio hang).
          gtimeout --preserve-status 180 \
            cargo test --test ci_audio lifecycle_terminal \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-system.log

      # ── Device tier ─────────────────────────────────────────────────────
      # rsac#26: AUHAL `.start()` on BlackHole-as-input hangs 10-11 min before
      # erroring on a headless runner; test code handles the error gracefully
      # and `gtimeout 120` caps the hang.
      - name: Device capture tier
        id: tier_device
        timeout-minutes: 10
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          # device_capture drives a real `.start()` on the BlackHole input
          # device (supports_device_selection=true on macOS, so the
          # require_device_selection!() gate does NOT skip). On a headless
          # managed runner that AUHAL start hangs until `gtimeout` kills it at
          # the 120s boundary (observed: runs 29564636523 / 29564289847). Under
          # the job's `-eo pipefail` shell that gtimeout kill would otherwise
          # abort the step and — now that macOS is a summary gate — flip every
          # PR red. So tolerate ONLY exit 124 via PIPESTATUS: WITHOUT
          # --preserve-status gtimeout reports its own timeout as exactly 124,
          # so a real signal death (unrelated SIGTERM/SIGKILL → 143/137) or a
          # test failure/panic still propagates and fails the tier.
          set +e
          gtimeout 120 \
            cargo test --test ci_audio device_capture \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee ci-audio-device.log
          rc=${PIPESTATUS[0]}
          set -e
          case "$rc" in
            0) ;;
            124)
              echo "::notice::device_capture hit the documented gtimeout kill (rc=$rc) — tolerated (AUHAL .start() hang on headless BlackHole).";;
            *)
              echo "::error::device_capture failed with exit $rc (not a gtimeout kill) — real regression."
              exit "$rc";;
          esac
          gtimeout --preserve-status 60 \
            cargo test --test ci_audio device_enumeration \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-device.log
          # rsac-fba6 rider: mirrors windows-audio's device tier (~L383-386) —
          # RSAC_CI_AUDIO_AVAILABLE=1 (exported above when BlackHole provides an
          # output device) gives this real teeth here too.
          gtimeout --preserve-status 60 \
            cargo test --test enumeration_matrix \
            --no-default-features --features feat_macos \
            -- --nocapture 2>&1 | tee -a ci-audio-device.log

      - name: Generate test WAV file (process tier)
        run: |
          if command -v sox &>/dev/null; then
            sox -n -r 48000 -c 2 -b 32 -e floating-point /tmp/test_440hz.wav synth 5 sine 440
          else
            brew install sox || true
            sox -n -r 48000 -c 2 -b 32 -e floating-point /tmp/test_440hz.wav synth 5 sine 440 2>/dev/null || true
          fi

      # ── Process tier ────────────────────────────────────────────────────
      # rsac#25: RSAC_CI_MACOS_TCC_GRANTED is intentionally NOT set. The capture
      # tests skip early on the TCC gate; the ApplicationId/ApplicationByName
      # error-path filters fail before Process Tap creation and are TCC-free.
      # `gtimeout` remains the hard safety net.
      - name: Process capture tier
        id: tier_process
        timeout-minutes: 20
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          gtimeout --preserve-status 180 \
            cargo test --test ci_audio app_capture \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee ci-audio-process.log
          gtimeout --preserve-status 120 \
            cargo test --test ci_audio select_by_non_numeric_id_returns_application_not_found \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-process.log
          gtimeout --preserve-status 120 \
            cargo test --test ci_audio select_by_missing_name_returns_error \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-process.log
          gtimeout --preserve-status 120 \
            cargo test --test ci_audio substring_match_returns_error \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-process.log
          gtimeout --preserve-status 180 \
            cargo test --test ci_audio process_tree_capture \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-process.log

      - name: Record tier outcomes
        id: record
        if: always()
        run: |
          {
            echo "tier_system=${{ steps.tier_system.outcome }}"
            echo "tier_device=${{ steps.tier_device.outcome }}"
            echo "tier_process=${{ steps.tier_process.outcome }}"
          } >> "$GITHUB_OUTPUT"

      - name: Diagnostics on failure
        if: ${{ failure() || steps.tier_system.outcome == 'failure' || steps.tier_device.outcome == 'failure' || steps.tier_process.outcome == 'failure' }}
        run: |
          system_profiler SPAudioDataType 2>/dev/null || true
          ps aux | grep -i coreaudio || true
          sw_vers || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-audio-logs
          path: ci-audio-*.log
          retention-days: 14
          if-no-files-found: ignore

  # ===========================================================================
  # Linux binding-level SystemDefault capture smokes (rsac-3635).
  # Parallel to linux-audio: own PipeWire bootstrap + deterministic-route HARD
  # GATE (shares the composite actions), then Python/Node/Go smokes on the same
  # RSAC_CI_AUDIO_DETERMINISTIC=1 + PULSE_SINK the Rust tiers use. Each smoke
  # spawns a looping tone player (scripts/ci-linux-tone-loop.sh) and kills it.
  #
  # A separate job (not steps in linux-audio) so the three heavy binding builds
  # (maturin develop / napi build / rsac-ffi + cgo) run CONCURRENTLY with the
  # Rust tiers instead of serializing onto that job's critical path; it reuses
  # the two composite actions and gets its own Swatinem cache key. The summary
  # job below fans this in via a fourth `needs:` entry + one gate block.
  # ===========================================================================
  linux-audio-bindings:
    name: "Linux Audio Bindings (python+node+go)"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45
    # `bash` keyword shell (`-eo pipefail`) so a failing binding smoke propagates
    # through the `| tee log` pipe instead of being masked by tee's exit 0.
    defaults:
      run:
        shell: bash
    outputs:
      binding_python: ${{ steps.record.outputs.binding_python }}
      binding_node:   ${{ steps.record.outputs.binding_node }}
      binding_go:     ${{ steps.record.outputs.binding_go }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-key: linux-audio-bindings
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5
        with:
          go-version: '1.22'

      # daemon:true installs the full audio stack + dev headers (libpipewire/
      # libspa/libclang), bootstraps PipeWire, creates ci_test_sink, and runs
      # the route HARD GATE that exports RSAC_CI_AUDIO_DETERMINISTIC=1 +
      # PULSE_SINK (and XDG_RUNTIME_DIR/DBUS_SESSION_BUS_ADDRESS) to $GITHUB_ENV,
      # which propagate to the binding smoke child processes below.
      - name: Set up PipeWire + prove deterministic routing (hard gate)
        uses: ./.github/actions/pipewire-setup
        with:
          daemon: "true"

      # ── Build each binding once ──────────────────────────────────────────
      - name: Build Python binding (maturin develop)
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: |
          python3 -m venv .venv-cap
          . .venv-cap/bin/activate
          pip install --quiet maturin
          maturin develop -m bindings/rsac-python/Cargo.toml

      - name: Build Node binding (napi build --release)
        working-directory: bindings/rsac-napi
        run: |
          npm install --no-fund --no-audit
          npm run build

      # (The Go staticlib is built by the `make test-e2e` target in the Go smoke.)

      # ── Smokes (continue-on-error → per-language outputs, summary-gated) ──
      - name: Python capture smoke
        id: smoke_python
        continue-on-error: true
        timeout-minutes: 8
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          PLAYER_PID="$(bash scripts/ci-linux-tone-loop.sh)"
          trap 'kill -- "-$PLAYER_PID" 2>/dev/null || true' EXIT  # negative PID = whole setsid group (reaps the looping player)
          . .venv-cap/bin/activate
          python bindings/rsac-python/tests/capture_smoke.py 2>&1 | tee ci-bindings-python.log

      - name: Node capture smoke
        id: smoke_node
        continue-on-error: true
        timeout-minutes: 8
        working-directory: bindings/rsac-napi
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          PLAYER_PID="$(bash ../../scripts/ci-linux-tone-loop.sh)"
          trap 'kill -- "-$PLAYER_PID" 2>/dev/null || true' EXIT  # negative PID = whole setsid group (reaps the looping player)
          node --test tests/capture_smoke.mjs 2>&1 | tee ../../ci-bindings-node.log

      - name: Go capture smoke
        id: smoke_go
        continue-on-error: true
        timeout-minutes: 12
        working-directory: bindings/rsac-go
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          PLAYER_PID="$(bash ../../scripts/ci-linux-tone-loop.sh)"
          trap 'kill -- "-$PLAYER_PID" 2>/dev/null || true' EXIT  # negative PID = whole setsid group (reaps the looping player)
          make test-e2e 2>&1 | tee ../../ci-bindings-go.log

      - name: Record binding outcomes
        id: record
        if: always()
        run: |
          {
            echo "binding_python=${{ steps.smoke_python.outcome }}"
            echo "binding_node=${{ steps.smoke_node.outcome }}"
            echo "binding_go=${{ steps.smoke_go.outcome }}"
          } >> "$GITHUB_OUTPUT"

      - name: Diagnostics on failure
        if: ${{ failure() || steps.smoke_python.outcome == 'failure' || steps.smoke_node.outcome == 'failure' || steps.smoke_go.outcome == 'failure' }}
        run: |
          pactl list short sinks || true
          pactl list short sources || true
          wpctl status || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-audio-bindings-logs
          path: ci-bindings-*.log
          retention-days: 14
          if-no-files-found: ignore

  # =============================================================================
  # Summary — the single gate. Fails if any Linux, Windows, or macOS
  # (first-class-lite) tier failed, or if a job's setup failed. rsac-fba6:
  # macOS used to be excluded here because kTCCServiceAudioCapture cannot be
  # granted on a managed runner — but its require_*!() skip-early gates mean a
  # tier failure here is a real panic/build break, not a TCC limitation, so it
  # now folds into the same gate the Windows block uses.
  # =============================================================================

  summary:
    name: "Audio Test Summary"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: always()
    needs:
      - linux-audio
      - windows-audio
      - macos-audio
      - linux-audio-bindings
    steps:
      - name: Write CI gap report seed
        env:
          LINUX_SYSTEM: ${{ needs.linux-audio.outputs.tier_system }}
          LINUX_DEVICE: ${{ needs.linux-audio.outputs.tier_device }}
          LINUX_PROCESS: ${{ needs.linux-audio.outputs.tier_process }}
          WINDOWS_SYSTEM: ${{ needs.windows-audio.outputs.tier_system }}
          WINDOWS_DEVICE: ${{ needs.windows-audio.outputs.tier_device }}
          WINDOWS_PROCESS: ${{ needs.windows-audio.outputs.tier_process }}
          MACOS_SYSTEM: ${{ needs.macos-audio.outputs.tier_system }}
          MACOS_DEVICE: ${{ needs.macos-audio.outputs.tier_device }}
          MACOS_PROCESS: ${{ needs.macos-audio.outputs.tier_process }}
          BIND_PYTHON: ${{ needs.linux-audio-bindings.outputs.binding_python }}
          BIND_NODE: ${{ needs.linux-audio-bindings.outputs.binding_node }}
          BIND_GO: ${{ needs.linux-audio-bindings.outputs.binding_go }}
        run: |
          cat > ci-audio-gap-report.md <<EOF
          # Audio CI Coverage Gap Report

          This artifact records first-class coverage claims, current CI gaps, and seeds that need platform evidence before they become hard gates.

          ## Job Results (per tier)

          | Platform tier | Result |
          |---|---|
          | Linux system | ${LINUX_SYSTEM:-n/a} |
          | Linux device | ${LINUX_DEVICE:-n/a} |
          | Linux process | ${LINUX_PROCESS:-n/a} |
          | Windows system | ${WINDOWS_SYSTEM:-n/a} |
          | Windows device | ${WINDOWS_DEVICE:-n/a} |
          | Windows process | ${WINDOWS_PROCESS:-n/a} |
          | macOS system | ${MACOS_SYSTEM:-n/a} |
          | macOS device | ${MACOS_DEVICE:-n/a} |
          | macOS process | ${MACOS_PROCESS:-n/a} |
          | Linux binding python | ${BIND_PYTHON:-n/a} |
          | Linux binding node | ${BIND_NODE:-n/a} |
          | Linux binding go | ${BIND_GO:-n/a} |

          ## Deferred Seeds

          | Seed | Why it is not a hard gate yet | Evidence needed before implementation |
          |---|---|---|
          | ~~Linux hard content assertions~~ SHIPPED | The deterministic route (\`RSAC_CI_AUDIO_DETERMINISTIC=1\`) hard-gates non-silence in the Rust system tier (\`system_capture.rs\`) and, since rsac-3635, in all three binding smokes (\`linux-audio-bindings\` job). | — (done; row kept for history) |
          | ~~Linux \`ApplicationByName\` happy-path filter~~ SHIPPED | \`application_by_name_linux.rs\` resolves the player's pinned \`application.name\` via pw-dump and hard-asserts tone content (PR #58). | — (done; row kept for history) |
          | Windows device/process content assertions | The jobs hard-gate build/start/panic coverage, but the per-device and per-process tone route is not proven like the system VB-CABLE default route. | Prove the child player feeds the targeted endpoint/process loopback deterministically, then enable \`RSAC_CI_AUDIO_DETERMINISTIC=1\` for those jobs. |
          | macOS first-class managed-runner capture | Process Tap requires \`kTCCServiceAudioCapture\`, which cannot be granted non-interactively on managed runners. | Use a self-hosted macOS runner with pre-granted Audio Capture permission and set \`RSAC_CI_MACOS_TCC_GRANTED=1\`. |
          EOF
          cat ci-audio-gap-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Report results
        env:
          LINUX_RESULT: ${{ needs.linux-audio.result }}
          LINUX_SYSTEM: ${{ needs.linux-audio.outputs.tier_system }}
          LINUX_DEVICE: ${{ needs.linux-audio.outputs.tier_device }}
          LINUX_PROCESS: ${{ needs.linux-audio.outputs.tier_process }}
          WINDOWS_RESULT: ${{ needs.windows-audio.result }}
          WINDOWS_SYSTEM: ${{ needs.windows-audio.outputs.tier_system }}
          WINDOWS_DEVICE: ${{ needs.windows-audio.outputs.tier_device }}
          WINDOWS_PROCESS: ${{ needs.windows-audio.outputs.tier_process }}
          MACOS_RESULT: ${{ needs.macos-audio.result }}
          MACOS_SYSTEM: ${{ needs.macos-audio.outputs.tier_system }}
          MACOS_DEVICE: ${{ needs.macos-audio.outputs.tier_device }}
          MACOS_PROCESS: ${{ needs.macos-audio.outputs.tier_process }}
          BIND_RESULT: ${{ needs.linux-audio-bindings.result }}
          BIND_PYTHON: ${{ needs.linux-audio-bindings.outputs.binding_python }}
          BIND_NODE: ${{ needs.linux-audio-bindings.outputs.binding_node }}
          BIND_GO: ${{ needs.linux-audio-bindings.outputs.binding_go }}
        run: |
          set -u
          echo "============================================================"
          echo "  Audio Integration Tests — Summary"
          echo "============================================================"
          echo ""
          echo "Linux (job=${LINUX_RESULT}):"
          echo "  System Capture:  ${LINUX_SYSTEM:-n/a}"
          echo "  Device Capture:  ${LINUX_DEVICE:-n/a}"
          echo "  Process Capture: ${LINUX_PROCESS:-n/a}"
          echo ""
          echo "Windows (VB-CABLE, first-class — job=${WINDOWS_RESULT}):"
          echo "  System Capture:  ${WINDOWS_SYSTEM:-n/a}"
          echo "  Device Capture:  ${WINDOWS_DEVICE:-n/a}"
          echo "  Process Capture: ${WINDOWS_PROCESS:-n/a}"
          echo ""
          echo "macOS (BlackHole, gated — job=${MACOS_RESULT}):"
          echo "  System Capture:  ${MACOS_SYSTEM:-n/a}"
          echo "  Device Capture:  ${MACOS_DEVICE:-n/a}"
          echo "  Process Capture: ${MACOS_PROCESS:-n/a}"
          echo ""
          echo "Linux bindings (deterministic route — job=${BIND_RESULT}):"
          echo "  Python: ${BIND_PYTHON:-n/a}"
          echo "  Node:   ${BIND_NODE:-n/a}"
          echo "  Go:     ${BIND_GO:-n/a}"
          echo ""
          echo "============================================================"

          FAILED=0

          # Linux is PRIMARY. A setup failure (job result != success, e.g. a
          # broken PipeWire route gate) OR any tier != success fails the gate.
          if [ "${LINUX_RESULT}" != "success" ]; then
            echo "FAILED: Linux audio job result '${LINUX_RESULT}' (setup/infra failure)"
            FAILED=1
          else
            for pair in "system:${LINUX_SYSTEM}" "device:${LINUX_DEVICE}" "process:${LINUX_PROCESS}"; do
              name="${pair%%:*}"; res="${pair#*:}"
              if [ "$res" != "success" ]; then
                echo "FAILED: Linux $name tier returned '${res:-<empty>}'"
                FAILED=1
              fi
            done
          fi

          # Windows is a first-class tier. A whole-job 'skipped' (path filter
          # excluded the workflow leg) is allowed; a setup failure or any failing
          # tier is a real regression.
          if [ "${WINDOWS_RESULT}" = "skipped" ]; then
            echo "Windows audio job skipped (path filter) — allowed."
          elif [ "${WINDOWS_RESULT}" != "success" ]; then
            echo "FAILED: Windows audio job result '${WINDOWS_RESULT}' (setup/infra failure)"
            FAILED=1
          else
            for pair in "system:${WINDOWS_SYSTEM}" "device:${WINDOWS_DEVICE}" "process:${WINDOWS_PROCESS}"; do
              name="${pair%%:*}"; res="${pair#*:}"
              if [ "$res" != "success" ] && [ "$res" != "skipped" ]; then
                echo "FAILED: Windows $name tier returned '${res:-<empty>}'"
                FAILED=1
              fi
            done
          fi

          # macOS is now first-class-lite: job setup failures / tier failures
          # gate, but 'skipped' (e.g. path-filter exclusion) is tolerated —
          # mirrors the Windows block above.
          if [ "${MACOS_RESULT}" = "skipped" ]; then
            echo "macOS audio job skipped (path filter) — allowed."
          elif [ "${MACOS_RESULT}" != "success" ]; then
            echo "FAILED: macOS audio job result '${MACOS_RESULT}' (setup/infra failure or a gated tier failed)"
            FAILED=1
          else
            for pair in "system:${MACOS_SYSTEM}" "device:${MACOS_DEVICE}" "process:${MACOS_PROCESS}"; do
              name="${pair%%:*}"; res="${pair#*:}"
              if [ "$res" != "success" ] && [ "$res" != "skipped" ]; then
                echo "FAILED: macOS $name tier returned '${res:-<empty>}'"
                FAILED=1
              fi
            done
          fi

          # Linux bindings are hard-gated (Linux is PRIMARY): the deterministic
          # PipeWire route gate runs at this job's setup, so a job result !=
          # success is a setup/route failure, and any binding smoke != success
          # is a real regression. 'skipped' (path filter excluded the workflow
          # leg) is tolerated per the per-language loop.
          if [ "${BIND_RESULT}" = "skipped" ]; then
            echo "Linux audio bindings job skipped (path filter) — allowed."
          elif [ "${BIND_RESULT}" != "success" ]; then
            echo "FAILED: linux-audio-bindings job result '${BIND_RESULT}' (setup/route gate failure)"
            FAILED=1
          else
            for pair in "python:${BIND_PYTHON}" "node:${BIND_NODE}" "go:${BIND_GO}"; do
              name="${pair%%:*}"; res="${pair#*:}"
              if [ "$res" != "success" ] && [ "$res" != "skipped" ]; then
                echo "FAILED: binding $name smoke returned '${res:-<empty>}'"
                FAILED=1
              fi
            done
          fi

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Linux + Windows + macOS + Linux bindings are gated platforms — failures must be investigated."
            exit 1
          else
            echo "All Linux + Windows + macOS tiers + Linux binding smokes passed."
          fi

