  # =============================================================================
  # Windows tiers — VB-CABLE virtual audio driver
  # =============================================================================

  windows-system:
    name: "Windows | System Capture"
    runs-on: blacksmith-4vcpu-windows-2025
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-audio

      - name: Start Windows Audio services
        shell: pwsh
        run: |
          Start-Service -Name "AudioEndpointBuilder" -ErrorAction SilentlyContinue
          Start-Service -Name "AudioSrv" -ErrorAction SilentlyContinue

      - name: Install VB-CABLE virtual audio driver
        uses: AlekseyMartynov/action-vbcable-win@main

      - name: Verify audio devices
        id: verify_audio
        shell: pwsh
        run: |
          Write-Host "=== Audio Devices ==="
          $devices = Get-PnpDevice -ErrorAction SilentlyContinue | Where-Object {
            $_.FriendlyName -like "*VB-Audio*" -or
            $_.FriendlyName -like "*CABLE*" -or
            $_.Class -eq "AudioEndpoint" -or
            $_.Class -eq "MEDIA"
          }
          if ($devices) {
            $devices | Format-List FriendlyName, Status
            echo "RSAC_CI_AUDIO_AVAILABLE=1" >> $env:GITHUB_ENV
          } else {
            Write-Host "No audio devices found"
            echo "RSAC_CI_AUDIO_AVAILABLE=0" >> $env:GITHUB_ENV
          }

      - name: Compilation check
        run: cargo check --no-default-features --features feat_windows

      - name: Run system capture tests
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio system_capture `
            --no-default-features --features feat_windows `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-output.log

      - name: Run platform capabilities tests
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio platform_caps `
            --no-default-features --features feat_windows `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-output-caps.log

      - name: Run stream lifecycle tests
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio stream_lifecycle `
            --no-default-features --features feat_windows `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-output-lifecycle.log

      - name: Diagnostics on failure
        if: failure()
        shell: pwsh
        run: |
          Get-Service -Name "AudioSrv", "AudioEndpointBuilder" -ErrorAction SilentlyContinue | Format-List Name, Status
          Get-PnpDevice -ErrorAction SilentlyContinue | Where-Object { $_.Class -eq "AudioEndpoint" -or $_.Class -eq "MEDIA" } | Format-List FriendlyName, Status

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-system-capture-logs
          path: ci-audio-output*.log
          retention-days: 14

  windows-device:
    name: "Windows | Device Capture"
    runs-on: blacksmith-4vcpu-windows-2025
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-audio

      - name: Start Windows Audio services
        shell: pwsh
        run: |
          Start-Service -Name "AudioEndpointBuilder" -ErrorAction SilentlyContinue
          Start-Service -Name "AudioSrv" -ErrorAction SilentlyContinue

      - name: Install VB-CABLE virtual audio driver
        uses: AlekseyMartynov/action-vbcable-win@main

      - name: Verify audio devices
        shell: pwsh
        run: |
          $devices = Get-PnpDevice -ErrorAction SilentlyContinue | Where-Object {
            $_.FriendlyName -like "*VB-Audio*" -or $_.FriendlyName -like "*CABLE*"
          }
          if ($devices) {
            echo "RSAC_CI_AUDIO_AVAILABLE=1" >> $env:GITHUB_ENV
          } else {
            echo "RSAC_CI_AUDIO_AVAILABLE=0" >> $env:GITHUB_ENV
          }

      - name: Compilation check
        run: cargo check --no-default-features --features feat_windows

      - name: Run device capture tests
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio device_capture `
            --no-default-features --features feat_windows `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-output.log

      - name: Run device enumeration tests
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio device_enumeration `
            --no-default-features --features feat_windows `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-output-enum.log

      - name: Diagnostics on failure
        if: failure()
        shell: pwsh
        run: |
          Get-Service -Name "AudioSrv", "AudioEndpointBuilder" -ErrorAction SilentlyContinue | Format-List Name, Status
          Get-PnpDevice -ErrorAction SilentlyContinue | Where-Object { $_.Class -eq "AudioEndpoint" -or $_.Class -eq "MEDIA" } | Format-List FriendlyName, Status

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-device-capture-logs
          path: ci-audio-output*.log
          retention-days: 14

  windows-process:
    name: "Windows | Process Capture"
    runs-on: blacksmith-4vcpu-windows-2025
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-audio

      - name: Start Windows Audio services
        shell: pwsh
        run: |
          Start-Service -Name "AudioEndpointBuilder" -ErrorAction SilentlyContinue
          Start-Service -Name "AudioSrv" -ErrorAction SilentlyContinue

      - name: Install VB-CABLE virtual audio driver
        uses: AlekseyMartynov/action-vbcable-win@main

      - name: Verify audio devices
        shell: pwsh
        run: |
          $devices = Get-PnpDevice -ErrorAction SilentlyContinue | Where-Object {
            $_.FriendlyName -like "*VB-Audio*" -or $_.FriendlyName -like "*CABLE*"
          }
          if ($devices) {
            echo "RSAC_CI_AUDIO_AVAILABLE=1" >> $env:GITHUB_ENV
          } else {
            echo "RSAC_CI_AUDIO_AVAILABLE=0" >> $env:GITHUB_ENV
          }

      - name: Compilation check
        run: cargo check --no-default-features --features feat_windows

      - name: Generate test WAV file
        shell: pwsh
        run: |
          # Generate a simple WAV file for audio playback tests
          $sampleRate = 48000; $channels = 2; $durationSecs = 5; $frequency = 440.0; $amplitude = 0.8
          $numSamples = $sampleRate * $durationSecs
          $wavPath = "$env:TEMP\test_440hz.wav"
          $stream = [System.IO.File]::Create($wavPath)
          $writer = New-Object System.IO.BinaryWriter($stream)
          $dataSize = $numSamples * $channels * 4
          $writer.Write([System.Text.Encoding]::ASCII.GetBytes("RIFF"))
          $writer.Write([int]($dataSize + 36))
          $writer.Write([System.Text.Encoding]::ASCII.GetBytes("WAVE"))
          $writer.Write([System.Text.Encoding]::ASCII.GetBytes("fmt "))
          $writer.Write([int]16); $writer.Write([int16]3); $writer.Write([int16]$channels)
          $writer.Write([int]$sampleRate); $writer.Write([int]($sampleRate * $channels * 4))
          $writer.Write([int16]($channels * 4)); $writer.Write([int16]32)
          $writer.Write([System.Text.Encoding]::ASCII.GetBytes("data"))
          $writer.Write([int]$dataSize)
          for ($i = 0; $i -lt $numSamples; $i++) {
            $sample = [float]($amplitude * [Math]::Sin(2.0 * [Math]::PI * $frequency * ($i / $sampleRate)))
            for ($ch = 0; $ch -lt $channels; $ch++) { $writer.Write([float]$sample) }
          }
          $writer.Close(); $stream.Close()
          Write-Host "Test WAV: $((Get-Item $wavPath).Length) bytes"

      - name: Run application capture tests
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio app_capture `
            --no-default-features --features feat_windows `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-output.log

      - name: Run process tree capture tests
        shell: pwsh
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio process_tree_capture `
            --no-default-features --features feat_windows `
            -- --test-threads=1 --nocapture `
            2>&1 | Tee-Object -FilePath ci-audio-output-proctree.log

      - name: Diagnostics on failure
        if: failure()
        shell: pwsh
        run: |
          Get-Service -Name "AudioSrv", "AudioEndpointBuilder" -ErrorAction SilentlyContinue | Format-List Name, Status
          Get-PnpDevice -ErrorAction SilentlyContinue | Where-Object { $_.Class -eq "AudioEndpoint" -or $_.Class -eq "MEDIA" } | Format-List FriendlyName, Status

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-process-capture-logs
          path: ci-audio-output*.log
          retention-days: 14

  # =============================================================================
  # macOS tiers — CoreAudio + BlackHole
  # =============================================================================

  macos-system:
    name: "macOS | System Capture"
    runs-on: blacksmith-6vcpu-macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-audio

      - name: Check audio and install BlackHole
        id: check_audio
        run: |
          system_profiler SPAudioDataType 2>/dev/null || true
          brew install blackhole-2ch || echo "BlackHole installation failed (expected in CI)"
          sudo killall coreaudiod 2>/dev/null || true
          sleep 5
          if system_profiler SPAudioDataType 2>/dev/null | grep -qi "output"; then
            echo "RSAC_CI_AUDIO_AVAILABLE=1" >> $GITHUB_ENV
          fi

      - name: Compilation check
        run: cargo check --no-default-features --features feat_macos

      - name: Run system capture tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio system_capture \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee ci-audio-output.log

      - name: Run platform capabilities tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio platform_caps \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      - name: Run stream lifecycle tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio stream_lifecycle \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      - name: Diagnostics on failure
        if: failure()
        run: |
          system_profiler SPAudioDataType 2>/dev/null || true
          ps aux | grep -i coreaudio || true
          sw_vers || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-system-capture-logs
          path: ci-audio-output.log
          retention-days: 14

  macos-device:
    name: "macOS | Device Capture"
    runs-on: blacksmith-6vcpu-macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-audio

      - name: Check audio and install BlackHole
        run: |
          brew install blackhole-2ch || echo "BlackHole installation failed (expected in CI)"
          sudo killall coreaudiod 2>/dev/null || true
          sleep 5
          if system_profiler SPAudioDataType 2>/dev/null | grep -qi "output"; then
            echo "RSAC_CI_AUDIO_AVAILABLE=1" >> $GITHUB_ENV
          fi

      - name: Compilation check
        run: cargo check --no-default-features --features feat_macos

      - name: Run device capture tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio device_capture \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee ci-audio-output.log

      - name: Run device enumeration tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio device_enumeration \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      - name: Diagnostics on failure
        if: failure()
        run: |
          system_profiler SPAudioDataType 2>/dev/null || true
          sw_vers || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-device-capture-logs
          path: ci-audio-output.log
          retention-days: 14

  macos-process:
    name: "macOS | Process Capture"
    runs-on: blacksmith-6vcpu-macos-15
    continue-on-error: true  # Process Tap expected to skip due to TCC in CI
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-audio

      - name: Check audio and install BlackHole
        run: |
          brew install blackhole-2ch || echo "BlackHole installation failed (expected in CI)"
          sudo killall coreaudiod 2>/dev/null || true
          sleep 5
          if system_profiler SPAudioDataType 2>/dev/null | grep -qi "output"; then
            echo "RSAC_CI_AUDIO_AVAILABLE=1" >> $GITHUB_ENV
          fi

      - name: Generate test WAV file
        run: |
          if command -v sox &>/dev/null; then
            sox -n -r 48000 -c 2 -b 32 -e floating-point /tmp/test_440hz.wav synth 5 sine 440
          else
            brew install sox || true
            sox -n -r 48000 -c 2 -b 32 -e floating-point /tmp/test_440hz.wav synth 5 sine 440 2>/dev/null || true
          fi

      - name: Compilation check
        run: cargo check --no-default-features --features feat_macos

      - name: Run application capture tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio app_capture \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee ci-audio-output.log

      - name: Run process tree capture tests
        env:
          RSAC_TEST_CAPTURE_TIMEOUT_SECS: "15"
        run: |
          cargo test --test ci_audio process_tree_capture \
            --no-default-features --features feat_macos \
            -- --test-threads=1 --nocapture 2>&1 | tee -a ci-audio-output.log

      - name: Diagnostics on failure
        if: failure()
        run: |
          system_profiler SPAudioDataType 2>/dev/null || true
          ps aux | grep -i coreaudio || true
          sw_vers || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-process-capture-logs
          path: ci-audio-output.log
          retention-days: 14

  # =============================================================================
  # Summary — reports overall status, fails only if Linux (primary) fails
  # =============================================================================

  summary:
    name: "Audio Test Summary"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: always()
    needs:
      - linux-system
      - linux-device
      - linux-process
      - windows-system
      - windows-device
      - windows-process
      - macos-system
      - macos-device
      - macos-process
    steps:
      - name: Report results
        run: |
          echo "============================================================"
          echo "  Audio Integration Tests — Summary"
          echo "============================================================"
          echo ""
          echo "Linux:"
          echo "  System Capture:  ${{ needs.linux-system.result }}"
          echo "  Device Capture:  ${{ needs.linux-device.result }}"
          echo "  Process Capture: ${{ needs.linux-process.result }}"
          echo ""
          echo "Windows (VB-CABLE, continue-on-error):"
          echo "  System Capture:  ${{ needs.windows-system.result }}"
          echo "  Device Capture:  ${{ needs.windows-device.result }}"
          echo "  Process Capture: ${{ needs.windows-process.result }}"
          echo ""
          echo "macOS (BlackHole):"
          echo "  System Capture:  ${{ needs.macos-system.result }}"
          echo "  Device Capture:  ${{ needs.macos-device.result }}"
          echo "  Process Capture: ${{ needs.macos-process.result }}"
          echo ""
          echo "============================================================"

          # Fail only if any Linux job failed (primary platform)
          FAILED=0
          for result in \
            "${{ needs.linux-system.result }}" \
            "${{ needs.linux-device.result }}" \
            "${{ needs.linux-process.result }}"; do
            if [ "$result" != "success" ]; then
              echo "FAILED: Linux job returned '$result'"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Linux is the primary platform — failures must be investigated."
            exit 1
          else
            echo "All Linux (primary) jobs passed."
          fi
