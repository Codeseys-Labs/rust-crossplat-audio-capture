name: macOS Audio Tests

on:
  workflow_call:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-macos:
    runs-on: macos-latest
    env:
      DEBUG: ${{ inputs.debug_enabled }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install BlackHole Audio Driver
        run: |
          # Install BlackHole virtual audio driver
          brew install blackhole-2ch
          
          # Wait for audio system to recognize new device
          sleep 5
          
          # List audio devices to verify installation
          system_profiler SPAudioDataType
        shell: bash

      - name: Configure Audio
        run: |
          # Get BlackHole device info
          BLACKHOLE_DEVICE=$(system_profiler SPAudioDataType | grep -A 5 "BlackHole 2ch:" || true)
          
          if [ -z "$BLACKHOLE_DEVICE" ]; then
            echo "BlackHole audio device not found"
            exit 1
          fi
          
          echo "Found BlackHole device:"
          echo "$BLACKHOLE_DEVICE"
          
          # Set BlackHole as default output device
          SwitchAudioSource -s "BlackHole 2ch"
          
          # Verify current audio device
          CURRENT_DEVICE=$(SwitchAudioSource -c)
          echo "Current audio device: $CURRENT_DEVICE"
          
          if [[ "$CURRENT_DEVICE" != *"BlackHole"* ]]; then
            echo "Failed to set BlackHole as default device"
            exit 1
          fi
        shell: bash

      - name: Debug Audio Setup
        if: inputs.debug_enabled
        run: |
          echo "Audio Device Information:"
          system_profiler SPAudioDataType
          
          echo "Audio Settings:"
          osascript -e 'get volume settings'
          
          echo "Current Audio Device:"
          SwitchAudioSource -c
        shell: bash

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose -- --nocapture

      - name: Test System-Wide Audio Capture
        run: |
          echo "Testing system-wide audio capture..."
          
          # Start test tone in background
          cargo run --example test_tone_robust > test_tone_system.log 2>&1 &
          TONE_PID=$!
          
          # Wait for tone to start
          sleep 3
          
          # Verify test tone is running
          if ! kill -0 $TONE_PID 2>/dev/null; then
            echo "Test tone failed to start"
            cat test_tone_system.log
            exit 1
          fi
          
          # Start system-wide audio capture
          CAPTURE_MODE=system cargo run --example test_capture_robust
          CAPTURE_EXIT=$?
          
          # Stop test tone
          kill $TONE_PID || true
          wait $TONE_PID || true
          
          # Check capture results
          if [ $CAPTURE_EXIT -ne 0 ]; then
            echo "System-wide audio capture failed"
            exit 1
          fi
          
          # Verify capture file
          if [ ! -f "test_capture_robust.wav" ]; then
            echo "System capture file not found"
            exit 1
          fi
          
          mv test_capture_robust.wav system_capture.wav
          
          # Check file size
          SYSTEM_CAPTURE_SIZE=$(stat -f%z "system_capture.wav")
          if [ "$SYSTEM_CAPTURE_SIZE" -eq 0 ]; then
            echo "System capture file is empty"
            exit 1
          fi
          
          echo "System-wide audio capture test completed successfully"
          echo "System capture file size: $SYSTEM_CAPTURE_SIZE bytes"

      - name: Test App-Specific Audio Capture
        run: |
          echo "Testing application-specific audio capture..."
          
          # Start test application (using test_tone as our test app)
          cargo run --example test_tone_robust > test_tone_app.log 2>&1 &
          APP_PID=$!
          
          # Wait for app to start
          sleep 3
          
          # Get the application name for capture
          APP_NAME="test_tone_robust"
          
          # Start app-specific audio capture
          CAPTURE_MODE=app CAPTURE_APP="$APP_NAME" cargo run --example test_capture_robust
          CAPTURE_EXIT=$?
          
          # Stop test app
          kill $APP_PID || true
          wait $APP_PID || true
          
          # Check capture results
          if [ $CAPTURE_EXIT -ne 0 ]; then
            echo "App-specific audio capture failed"
            exit 1
          fi
          
          # Verify capture file
          if [ ! -f "test_capture_robust.wav" ]; then
            echo "App capture file not found"
            exit 1
          fi
          
          mv test_capture_robust.wav app_capture.wav
          
          # Check file size
          APP_CAPTURE_SIZE=$(stat -f%z "app_capture.wav")
          if [ "$APP_CAPTURE_SIZE" -eq 0 ]; then
            echo "App capture file is empty"
            exit 1
          fi
          
          echo "App-specific audio capture test completed successfully"
          echo "App capture file size: $APP_CAPTURE_SIZE bytes"
        shell: bash

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: macos-audio-test-results
          path: |
            system_capture.wav
            app_capture.wav
            test_tone_system.log
            test_tone_app.log
            ~/Library/Logs/CoreAudio/*.log
            ~/Library/Logs/DiagnosticReports/coreaudiod*