name: Windows Audio Tests

on:
  workflow_call:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  test-windows:
    runs-on: windows-latest
    env:
      DEBUG: ${{ inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Windows SDK
        uses: microsoft/setup-msbuild@v1.3

      - name: Install Scream Virtual Audio Driver
        run: |
          Write-Host "Installing Scream Virtual Audio Driver for headless audio support..."

          # Enable test signing for driver installation
          Write-Host "Configuring system for driver installation..."
          try {
            # Enable test signing - required for Scream installation
            $result = & bcdedit /set testsigning on 2>&1
            Write-Host "Test signing result: $result"
            Write-Host "✅ Test signing enabled for driver installation"
          } catch {
            Write-Host "⚠️ Could not enable test signing: $_"
            throw "Test signing is required for Scream installation"
          }

          # Download the latest Scream driver
          $downloadUrl = "https://github.com/duncanthrax/scream/releases/download/4.0/Scream4.0.zip"
          $zipPath = "$env:TEMP\Scream.zip"
          $extractPath = "$env:TEMP\Scream"

          Write-Host "Downloading Scream Virtual Audio Driver..."
          Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath -UseBasicParsing

          Write-Host "Extracting Scream driver..."
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

          # Find the correct architecture folder and INF file
          $arch = if ([Environment]::Is64BitOperatingSystem) { "x64" } else { "x86" }
          $driverPath = Join-Path $extractPath "Install\driver\$arch"
          $infFile = Get-ChildItem -Path $driverPath -Filter "Scream.inf" -ErrorAction SilentlyContinue

          if (-not $infFile) {
            Write-Host "Available files in extract path:"
            Get-ChildItem -Path $extractPath -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }
            throw "Could not find Scream.inf file in driver package"
          }

          Write-Host "Installing Scream driver from: $($infFile.FullName)"

          # Install Scream driver using multiple methods for Windows Server compatibility
          Write-Host "Installing Scream driver using Windows Server compatible methods..."

          try {
            # Change to the driver directory (required for Scream installation)
            Push-Location $driverPath

            # Method 1: Try adding driver to store first (safer for headless environments)
            Write-Host "Method 1: Adding driver to Windows driver store..."
            $storeResult = & pnputil.exe /add-driver ".\Scream.inf" /force 2>&1
            Write-Host "Driver store result:"
            $storeResult | ForEach-Object { Write-Host "  $_" }

            # Method 2: Try DISM for driver installation (better for Windows Server)
            Write-Host "Method 2: Installing driver using DISM..."
            $dismResult = & dism.exe /online /add-driver /driver:".\Scream.inf" /forceunsigned 2>&1
            Write-Host "DISM installation result:"
            $dismResult | ForEach-Object { Write-Host "  $_" }

            # Method 3: Try pnputil install as fallback (may hang but worth trying)
            Write-Host "Method 3: Attempting pnputil install with timeout..."

            # Create a job to run pnputil with timeout
            $scriptBlock = {
              param($infPath)
              Set-Location $using:driverPath
              & pnputil.exe /add-driver ".\Scream.inf" /install 2>&1
            }

            $job = Start-Job -ScriptBlock $scriptBlock -ArgumentList $infFile.FullName
            $completed = Wait-Job -Job $job -Timeout 30

            if ($completed) {
              $pnpResult = Receive-Job -Job $job
              Write-Host "PnPUtil install result:"
              $pnpResult | ForEach-Object { Write-Host "  $_" }
            } else {
              Write-Host "⚠️ PnPUtil install timed out after 30 seconds (expected in headless environment)"
              Stop-Job -Job $job
            }

            Remove-Job -Job $job -Force

            Write-Host "✅ Driver installation attempts completed"

          } catch {
            Write-Host "❌ Scream driver installation failed: $_"
            # Don't throw - continue with verification to see if any method worked
            Write-Host "⚠️ Continuing with verification to check if driver was installed..."
          } finally {
            Pop-Location
          }

          # Start Windows Audio services
          Write-Host "Starting Windows Audio services..."
          try {
            Start-Service -Name "AudioSrv" -ErrorAction Stop
            Write-Host "✅ AudioSrv service started"
          } catch {
            Write-Host "⚠️ Could not start AudioSrv: $_"
          }

          try {
            Start-Service -Name "AudioEndpointBuilder" -ErrorAction Stop
            Write-Host "✅ AudioEndpointBuilder service started"
          } catch {
            Write-Host "⚠️ Could not start AudioEndpointBuilder: $_"
          }

          # Wait a moment for services to initialize
          Start-Sleep -Seconds 3

          # Verify Scream driver installation
          Write-Host "Verifying Scream driver installation..."

          # Look for Scream audio devices
          $screamDevices = Get-PnpDevice | Where-Object {
            $_.FriendlyName -like "*Scream*" -or
            $_.FriendlyName -like "*Virtual*Audio*" -or
            $_.Name -like "*Scream*"
          }

          if ($screamDevices) {
            Write-Host "✅ Scream audio devices detected:"
            $screamDevices | ForEach-Object {
              Write-Host "  - $($_.FriendlyName) ($($_.Status))"
            }
          } else {
            Write-Host "⚠️ No Scream audio devices detected yet"

            # List all audio devices for debugging
            Write-Host "All audio devices:"
            Get-PnpDevice | Where-Object { $_.Class -eq "AudioEndpoint" -or $_.Class -eq "MEDIA" } |
              ForEach-Object { Write-Host "  - $($_.FriendlyName) ($($_.Status))" }
          }

          # Check Windows Audio services
          Write-Host "Checking audio services..."
          $audioServices = @("AudioSrv", "AudioEndpointBuilder")
          foreach ($service in $audioServices) {
            $svc = Get-Service -Name $service -ErrorAction SilentlyContinue
            if ($svc) {
              Write-Host "  ${service}: $($svc.Status)"
            } else {
              Write-Host "  ${service}: Not found"
            }
          }

          Write-Host "Scream Virtual Audio Driver installation completed"
        shell: pwsh

      - name: Install VLC
        run: |
          Write-Host "Installing VLC using Chocolatey..."
          choco install vlc -y
          Write-Host "VLC installation completed"
        shell: pwsh

      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          Write-Host "=== System Information ==="
          rustc --version --verbose
          cargo --version --verbose
          Write-Host "=== Audio Devices ==="
          Get-CimInstance Win32_SoundDevice | Format-List Name, Status, Manufacturer
          Write-Host "=== Audio Services ==="
          Get-Service -Name "AudioSrv", "AudioEndpointBuilder" | Format-List Name, Status
          Write-Host "=== Scream Virtual Audio Driver Check ==="
          Get-CimInstance Win32_PnPEntity | Where-Object { $_.Name -like "*Scream*" -or $_.Name -like "*Virtual*Audio*" } | Format-List Name, Status, DeviceID
          Write-Host "=== VLC Installation ==="
          if (Test-Path "${env:ProgramFiles}\VideoLAN\VLC\vlc.exe") {
            Write-Host "VLC found at: ${env:ProgramFiles}\VideoLAN\VLC\vlc.exe"
          } else {
            Write-Host "VLC not found in standard location"
          }
        shell: pwsh

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Windows library
        run: |
          Write-Host "Building Windows audio capture library with WASAPI support..."
          cargo build --lib --no-default-features --features feat_windows --verbose
        shell: pwsh

      - name: Build dynamic VLC capture
        run: |
          Write-Host "Building dynamic VLC capture binary..."
          cargo build --bin dynamic_vlc_capture --no-default-features --features feat_windows --verbose
        shell: pwsh

      - name: Build Windows examples
        run: |
          Write-Host "Building Windows examples to verify compilation..."
          cargo build --example windows_application_capture --no-default-features --features feat_windows
          cargo build --example windows_apis --no-default-features --features feat_windows
        shell: pwsh

      - name: Verify Scream Audio Devices
        run: |
          Write-Host "Verifying Scream Virtual Audio Driver installation..."

          # Check for Scream audio devices
          Write-Host "=== Checking for Scream Audio Devices ==="
          $screamDevices = Get-CimInstance Win32_PnPEntity | Where-Object { $_.Name -like "*Scream*" -or $_.Name -like "*Virtual*Audio*" -or $_.Name -like "*Virtual*Mic*" }
          if ($screamDevices) {
            $screamDevices | Format-List Name, Status, DeviceID
          } else {
            Write-Host "No Scream audio devices found"
          }

          # Check audio endpoints
          Write-Host "=== Checking Audio Endpoints ==="
          try {
            Add-Type -AssemblyName System.Core
            $audioDevices = Get-WmiObject -Class Win32_SoundDevice
            $audioDevices | Where-Object { $_.Name -like "*Virtual*" } | Format-List Name, Status
          } catch {
            Write-Host "Could not enumerate audio endpoints: $_"
          }

          # Verify audio services are running
          Write-Host "=== Audio Services Status ==="
          $audioSrv = Get-Service -Name "AudioSrv" -ErrorAction SilentlyContinue
          $endpointBuilder = Get-Service -Name "AudioEndpointBuilder" -ErrorAction SilentlyContinue

          if ($audioSrv) { Write-Host "AudioSrv: $($audioSrv.Status)" }
          if ($endpointBuilder) { Write-Host "AudioEndpointBuilder: $($endpointBuilder.Status)" }

          Write-Host "Scream Virtual Audio Device verification completed"
        shell: pwsh

      - name: Test VLC audio capture
        run: |
          Write-Host "Running Windows VLC audio capture test..."
          powershell -ExecutionPolicy Bypass -File "scripts/test-vlc-capture-windows.ps1"
        shell: pwsh

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-audio-test-results
          path: |
            dynamic_vlc_capture.wav
            flexible_test.log
            vlc_capture_test.log
            vlc_capture_test_error.log
            process_tracking.log
        if: always()
