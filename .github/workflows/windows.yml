name: Windows Audio Tests

on:
  workflow_call:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  test-windows:
    runs-on: windows-latest
    env:
      DEBUG: ${{ inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Windows SDK
        uses: microsoft/setup-msbuild@v1.3

      - name: Enable Test Signing
        run: |
          Write-Host "Enabling test signing for self-signed certificate approach..."

          # Enable test signing - required for self-signed certificate approach
          $result = & bcdedit /set testsigning on 2>&1
          Write-Host "Test signing result: $result"
          Write-Host "✅ Test signing enabled for driver installation"

      - name: Download and Install Virtual Audio Driver
        run: |
          Write-Host "Downloading Virtual Audio Driver by VirtualDrivers..."
          
          # Download the specific signed ZIP package
          $downloadUrl = "https://github.com/VirtualDrivers/Virtual-Audio-Driver/releases/download/25.7.14/Virtual.Audio.Driver.Signed.-.25.7.14.zip"
          $fileName = "Virtual.Audio.Driver.Signed.zip"
          
          Write-Host "Downloading from: $downloadUrl"
          Invoke-WebRequest -Uri $downloadUrl -OutFile $fileName
          
          Write-Host "Extracting Virtual Audio Driver ZIP..."
          Expand-Archive -Path $fileName -DestinationPath VirtualAudioDriver -Force
          
          # Find the .inf files for automated installation
          $infFiles = Get-ChildItem VirtualAudioDriver -Recurse -Include "*.inf"
          Write-Host "Found INF files:"
          $infFiles | ForEach-Object { Write-Host "  - $($_.FullName)" }
          
          # Install using pnputil for headless automation
          if ($infFiles) {
            foreach ($inf in $infFiles) {
              Write-Host "Installing driver: $($inf.Name)"
              try {
                # Use pnputil for modern driver installation
                $result = & pnputil /add-driver $inf.FullName /install 2>&1
                Write-Host "pnputil output: $result"
                Write-Host "✅ Successfully processed $($inf.Name)"
              } catch {
                Write-Host "⚠️ Failed to install $($inf.Name): $_"
              }
            }
            
            # Alternative: Try devcon installation if available
            $devconPath = Get-ChildItem VirtualAudioDriver -Recurse -Include "devcon*.exe" | Select-Object -First 1
            if ($devconPath) {
              Write-Host "Found devcon tool, attempting alternative installation..."
              try {
                # Virtual Audio Driver typically uses Root\VirtualAudioDriver as hardware ID
                & $devconPath.FullName install "$($infFiles[0].FullName)" "Root\VirtualAudioDriver"
                Write-Host "✅ devcon installation completed"
              } catch {
                Write-Host "⚠️ devcon installation failed: $_"
              }
            }
          } else {
            Write-Host "❌ No .inf files found for installation"
            # List all files for debugging
            Get-ChildItem VirtualAudioDriver -Recurse | ForEach-Object { Write-Host "  Found: $($_.FullName)" }
          }
          
          Write-Host "✅ Virtual Audio Driver installation process completed"
        timeout-minutes: 10

      - name: Start Audio Services and Verify Virtual Audio Driver
        run: |
          # Start Windows Audio services
          Write-Host "Starting Windows Audio services..."
          try {
            Start-Service -Name "AudioSrv" -ErrorAction Stop
            Write-Host "✅ AudioSrv service started"
          } catch {
            Write-Host "⚠️ Could not start AudioSrv: $_"
          }

          try {
            Start-Service -Name "AudioEndpointBuilder" -ErrorAction Stop
            Write-Host "✅ AudioEndpointBuilder service started"
          } catch {
            Write-Host "⚠️ Could not start AudioEndpointBuilder: $_"
          }

          # Wait a moment for services to initialize
          Start-Sleep -Seconds 5

          # Verify Virtual Audio Driver installation
          Write-Host "Verifying Virtual Audio Driver installation..."

          # Look for Virtual Audio Driver devices
          $virtualDevices = Get-PnpDevice | Where-Object {
            $_.FriendlyName -like "*Virtual*Audio*" -or
            $_.FriendlyName -like "*Virtual*Speaker*" -or
            $_.FriendlyName -like "*Virtual*Microphone*" -or
            $_.Name -like "*Virtual*Audio*"
          }

          if ($virtualDevices) {
            Write-Host "✅ Virtual Audio Driver devices detected:"
            $virtualDevices | ForEach-Object {
              Write-Host "  - $($_.FriendlyName) ($($_.Status))"
            }
          } else {
            Write-Host "⚠️ No Virtual Audio Driver devices detected yet"

            # List all audio devices for debugging
            Write-Host "All audio devices:"
            Get-PnpDevice | Where-Object { $_.Class -eq "AudioEndpoint" -or $_.Class -eq "MEDIA" } |
              ForEach-Object { Write-Host "  - $($_.FriendlyName) ($($_.Status))" }
          }

          # Check audio endpoints using WMI
          Write-Host "=== Audio Endpoints via WMI ==="
          try {
            $audioDevices = Get-WmiObject -Class Win32_SoundDevice
            $virtualAudioDevices = $audioDevices | Where-Object { 
              $_.Name -like "*Virtual*" -or 
              $_.Description -like "*Virtual*" 
            }
            if ($virtualAudioDevices) {
              Write-Host "✅ Virtual audio devices found via WMI:"
              $virtualAudioDevices | ForEach-Object {
                Write-Host "  - $($_.Name) - $($_.Description)"
              }
            } else {
              Write-Host "⚠️ No virtual audio devices found via WMI"
            }
          } catch {
            Write-Host "Could not enumerate WMI audio devices: $_"
          }

          # Check Windows Audio services
          Write-Host "Checking audio services..."
          $audioServices = @("AudioSrv", "AudioEndpointBuilder")
          foreach ($service in $audioServices) {
            $svc = Get-Service -Name $service -ErrorAction SilentlyContinue
            if ($svc) {
              Write-Host "  ${service}: $($svc.Status)"
            } else {
              Write-Host "  ${service}: Not found"
            }
          }

          Write-Host "Virtual Audio Driver verification completed"
        shell: pwsh

      - name: Install VLC
        run: |
          Write-Host "Installing VLC using Chocolatey..."
          choco install vlc -y
          Write-Host "VLC installation completed"
        shell: pwsh

      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          Write-Host "=== System Information ==="
          rustc --version --verbose
          cargo --version --verbose
          Write-Host "=== Audio Devices ==="
          Get-CimInstance Win32_SoundDevice | Format-List Name, Status, Manufacturer
          Write-Host "=== Audio Services ==="
          Get-Service -Name "AudioSrv", "AudioEndpointBuilder" | Format-List Name, Status
          Write-Host "=== Virtual Audio Driver Check ==="
          Get-CimInstance Win32_PnPEntity | Where-Object { $_.Name -like "*Virtual*Audio*" -or $_.Name -like "*Virtual*Driver*" -or $_.Name -like "*Virtual*Speaker*" -or $_.Name -like "*Virtual*Mic*" } | Format-List Name, Status, DeviceID
          Write-Host "=== VLC Installation ==="
          if (Test-Path "${env:ProgramFiles}\VideoLAN\VLC\vlc.exe") {
            Write-Host "VLC found at: ${env:ProgramFiles}\VideoLAN\VLC\vlc.exe"
          } else {
            Write-Host "VLC not found in standard location"
          }
        shell: pwsh

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Windows library
        run: |
          Write-Host "Building Windows audio capture library with WASAPI support..."
          cargo build --lib --no-default-features --features feat_windows --verbose
        shell: pwsh

      - name: Build dynamic VLC capture
        run: |
          Write-Host "Building dynamic VLC capture binary..."
          cargo build --bin dynamic_vlc_capture --no-default-features --features feat_windows --verbose
        shell: pwsh

      - name: Build Windows examples
        run: |
          Write-Host "Building Windows examples to verify compilation..."
          cargo build --example windows_application_capture --no-default-features --features feat_windows
          cargo build --example windows_apis --no-default-features --features feat_windows
        shell: pwsh

      - name: Verify Scream Audio Devices
        run: |
          Write-Host "Verifying Scream Virtual Audio Driver installation..."

          # Check for Scream audio devices
          Write-Host "=== Checking for Scream Audio Devices ==="
          $screamDevices = Get-CimInstance Win32_PnPEntity | Where-Object { $_.Name -like "*Scream*" -or $_.Name -like "*Virtual*Audio*" -or $_.Name -like "*Virtual*Mic*" }
          if ($screamDevices) {
            $screamDevices | Format-List Name, Status, DeviceID
          } else {
            Write-Host "No Scream audio devices found"
          }

          # Check audio endpoints
          Write-Host "=== Checking Audio Endpoints ==="
          try {
            Add-Type -AssemblyName System.Core
            $audioDevices = Get-WmiObject -Class Win32_SoundDevice
            $audioDevices | Where-Object { $_.Name -like "*Virtual*" } | Format-List Name, Status
          } catch {
            Write-Host "Could not enumerate audio endpoints: $_"
          }

          # Verify audio services are running
          Write-Host "=== Audio Services Status ==="
          $audioSrv = Get-Service -Name "AudioSrv" -ErrorAction SilentlyContinue
          $endpointBuilder = Get-Service -Name "AudioEndpointBuilder" -ErrorAction SilentlyContinue

          if ($audioSrv) { Write-Host "AudioSrv: $($audioSrv.Status)" }
          if ($endpointBuilder) { Write-Host "AudioEndpointBuilder: $($endpointBuilder.Status)" }

          Write-Host "Scream Virtual Audio Device verification completed"
        shell: pwsh

      - name: Test VLC audio capture
        run: |
          Write-Host "Running Windows VLC audio capture test..."
          powershell -ExecutionPolicy Bypass -File "scripts/test-vlc-capture-windows.ps1"
        shell: pwsh

      - name: Upload VLC Audio Capture Files
        uses: actions/upload-artifact@v4
        with:
          name: windows-vlc-audio-captures
          path: |
            dynamic_vlc_capture.wav
            vlc_test_audio.wav
            *.wav
          compression-level: 0
          if-no-files-found: warn
        if: always()

      - name: Upload VLC Logs
        uses: actions/upload-artifact@v4
        with:
          name: windows-vlc-logs
          path: |
            flexible_test.log
            vlc_capture_test.log
            vlc_capture_test_error.log
            process_tracking.log
            *.log
          compression-level: 0
          if-no-files-found: warn
        if: always()

      - name: Upload Windows Audio Debug Info
        uses: actions/upload-artifact@v4
        with:
          name: windows-audio-debug
          path: |
            audio_devices.txt
            scream_verification.txt
            *.txt
          compression-level: 0
          if-no-files-found: warn
        if: always()
