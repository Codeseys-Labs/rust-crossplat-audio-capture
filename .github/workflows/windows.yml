name: Windows Audio Tests

on:
  workflow_call:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  test-windows:
    runs-on: windows-latest
    env:
      DEBUG: ${{ inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Windows SDK
        uses: microsoft/setup-msbuild@v1.3

      - name: Install Virtual Audio Driver
        run: |
          Write-Host "Installing Virtual Audio Driver for headless audio support..."

          # Temporarily disable driver signature enforcement for CI
          Write-Host "Configuring system for driver installation..."
          try {
            # This is safe in CI environments and will be reset on reboot
            bcdedit /set testsigning on 2>&1 | Out-Null
            Write-Host "✅ Test signing enabled for driver installation"
          } catch {
            Write-Host "⚠️ Could not enable test signing (may not be needed): $_"
          }

          # Download the latest Virtual Audio Driver
          $downloadUrl = "https://github.com/VirtualDrivers/Virtual-Audio-Driver/releases/download/25.7.14/Virtual.Audio.Driver.Signed.-.25.7.14.zip"
          $zipPath = "$env:TEMP\VirtualAudioDriver.zip"
          $extractPath = "$env:TEMP\VirtualAudioDriver"

          Write-Host "Downloading Virtual Audio Driver..."
          Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath -UseBasicParsing

          Write-Host "Extracting Virtual Audio Driver..."
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

          # Find the INF file
          $infFile = Get-ChildItem -Path $extractPath -Filter "*.inf" -Recurse | Select-Object -First 1
          if (-not $infFile) {
            throw "Could not find INF file in Virtual Audio Driver package"
          }

          Write-Host "Installing Virtual Audio Driver from: $($infFile.FullName)"

          # Install the driver using pnputil with timeout to prevent hanging
          Write-Host "Installing driver silently using pnputil with timeout..."

          # Method 1: Try with timeout using job-based approach
          try {
            Write-Host "Attempting pnputil installation with 60-second timeout..."

            # Create a script block for the pnputil command
            $scriptBlock = {
              param($infPath)
              & pnputil.exe /add-driver $infPath /install /force 2>&1
            }

            # Start the job with timeout
            $job = Start-Job -ScriptBlock $scriptBlock -ArgumentList $infFile.FullName
            $completed = Wait-Job -Job $job -Timeout 60

            if ($completed) {
              $result = Receive-Job -Job $job
              Write-Host "PnPUtil result: $result"

              if ($job.State -eq "Completed") {
                Write-Host "✅ Driver installation completed"
              } else {
                Write-Host "⚠️ Driver installation finished with state: $($job.State)"
              }
            } else {
              Write-Host "⚠️ PnPUtil installation timed out after 60 seconds"
              Stop-Job -Job $job
            }

            Remove-Job -Job $job -Force

          } catch {
            Write-Host "❌ PnPUtil installation with timeout failed: $_"
          }

          # Method 2: Try just adding to driver store (safer)
          Write-Host "Trying to add driver to store only..."
          try {
            $storeResult = & pnputil.exe /add-driver $infFile.FullName /force 2>&1
            Write-Host "Driver store result: $storeResult"
          } catch {
            Write-Host "Driver store addition failed: $_"
          }

          # Method 3: Try PowerShell DISM method as fallback
          Write-Host "Attempting DISM driver installation as fallback..."
          try {
            $dismResult = & dism.exe /online /add-driver /driver:$infFile.FullName /force 2>&1
            Write-Host "DISM result: $dismResult"
          } catch {
            Write-Host "DISM installation failed: $_"
          }

          # Start Windows Audio services
          Write-Host "Starting Windows Audio services..."
          try {
            Start-Service -Name "AudioSrv" -ErrorAction Stop
            Write-Host "✅ AudioSrv service started"
          } catch {
            Write-Host "⚠️ Could not start AudioSrv: $_"
          }

          try {
            Start-Service -Name "AudioEndpointBuilder" -ErrorAction Stop
            Write-Host "✅ AudioEndpointBuilder service started"
          } catch {
            Write-Host "⚠️ Could not start AudioEndpointBuilder: $_"
          }

          # Wait a moment for services to initialize
          Start-Sleep -Seconds 3

          # Verify driver installation
          Write-Host "Verifying driver installation..."
          $virtualDevices = Get-PnpDevice | Where-Object { $_.FriendlyName -like "*Virtual*Audio*" -or $_.FriendlyName -like "*Virtual*Mic*" }
          if ($virtualDevices) {
            Write-Host "✅ Virtual audio devices detected:"
            $virtualDevices | ForEach-Object { Write-Host "  - $($_.FriendlyName) ($($_.Status))" }
          } else {
            Write-Host "⚠️ No virtual audio devices detected yet (may appear after reboot)"
          }

          Write-Host "Virtual Audio Driver installation completed"
        shell: pwsh

      - name: Install VLC
        run: |
          Write-Host "Installing VLC using Chocolatey..."
          choco install vlc -y
          Write-Host "VLC installation completed"
        shell: pwsh

      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          Write-Host "=== System Information ==="
          rustc --version --verbose
          cargo --version --verbose
          Write-Host "=== Audio Devices ==="
          Get-CimInstance Win32_SoundDevice | Format-List Name, Status, Manufacturer
          Write-Host "=== Audio Services ==="
          Get-Service -Name "AudioSrv", "AudioEndpointBuilder" | Format-List Name, Status
          Write-Host "=== Virtual Audio Driver Check ==="
          Get-CimInstance Win32_PnPEntity | Where-Object { $_.Name -like "*Virtual*Audio*" } | Format-List Name, Status, DeviceID
          Write-Host "=== VLC Installation ==="
          if (Test-Path "${env:ProgramFiles}\VideoLAN\VLC\vlc.exe") {
            Write-Host "VLC found at: ${env:ProgramFiles}\VideoLAN\VLC\vlc.exe"
          } else {
            Write-Host "VLC not found in standard location"
          }
        shell: pwsh

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Windows library
        run: |
          Write-Host "Building Windows audio capture library with WASAPI support..."
          cargo build --lib --no-default-features --features feat_windows --verbose
        shell: pwsh

      - name: Build dynamic VLC capture
        run: |
          Write-Host "Building dynamic VLC capture binary..."
          cargo build --bin dynamic_vlc_capture --no-default-features --features feat_windows --verbose
        shell: pwsh

      - name: Build Windows examples
        run: |
          Write-Host "Building Windows examples to verify compilation..."
          cargo build --example windows_application_capture --no-default-features --features feat_windows
          cargo build --example windows_apis --no-default-features --features feat_windows
        shell: pwsh

      - name: Verify Virtual Audio Devices
        run: |
          Write-Host "Verifying Virtual Audio Driver installation..."

          # Check for virtual audio devices
          Write-Host "=== Checking for Virtual Audio Devices ==="
          $virtualDevices = Get-CimInstance Win32_PnPEntity | Where-Object { $_.Name -like "*Virtual*Audio*" -or $_.Name -like "*Virtual*Mic*" }
          if ($virtualDevices) {
            $virtualDevices | Format-List Name, Status, DeviceID
          } else {
            Write-Host "No virtual audio devices found"
          }

          # Check audio endpoints
          Write-Host "=== Checking Audio Endpoints ==="
          try {
            Add-Type -AssemblyName System.Core
            $audioDevices = Get-WmiObject -Class Win32_SoundDevice
            $audioDevices | Where-Object { $_.Name -like "*Virtual*" } | Format-List Name, Status
          } catch {
            Write-Host "Could not enumerate audio endpoints: $_"
          }

          # Verify audio services are running
          Write-Host "=== Audio Services Status ==="
          $audioSrv = Get-Service -Name "AudioSrv" -ErrorAction SilentlyContinue
          $endpointBuilder = Get-Service -Name "AudioEndpointBuilder" -ErrorAction SilentlyContinue

          if ($audioSrv) { Write-Host "AudioSrv: $($audioSrv.Status)" }
          if ($endpointBuilder) { Write-Host "AudioEndpointBuilder: $($endpointBuilder.Status)" }

          Write-Host "Virtual Audio Device verification completed"
        shell: pwsh

      - name: Test VLC audio capture
        run: |
          Write-Host "Running Windows VLC audio capture test..."
          powershell -ExecutionPolicy Bypass -File "scripts/test-vlc-capture-windows.ps1"
        shell: pwsh

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-audio-test-results
          path: |
            dynamic_vlc_capture.wav
            flexible_test.log
            vlc_capture_test.log
            vlc_capture_test_error.log
            process_tracking.log
        if: always()
