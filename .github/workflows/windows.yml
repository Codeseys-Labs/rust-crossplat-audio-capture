name: Windows Audio Tests

on:
  workflow_call:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  test-windows:
    runs-on: windows-latest
    env:
      DEBUG: ${{ inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Windows SDK
        uses: microsoft/setup-msbuild@v1.3

      - name: Debug Info
        if: env.DEBUG == true
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo tree
          Get-CimInstance Win32_SoundDevice | Format-List *
        shell: pwsh

      - name: Download test audio
        run: |
          mkdir -p test_audio
          curl -L "https://ia800901.us.archive.org/23/items/gd70-02-14.early-late.sbd.cotsman.18115.sbeok.shnf/gd70-02-14d1t02.mp3" -o "test_audio/sample.mp3"
        shell: bash

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1

      - name: Run tests
        run: cargo test --verbose
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1

      - name: Build examples
        run: cargo build --examples
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1

      - name: Test audio capture
        run: |
          # Start test tone in background
          $testTone = Start-Process -NoNewWindow cargo -ArgumentList "run", "--example", "test_tone" -PassThru

          try {
              # Wait a bit for playback to start
              Start-Sleep -Seconds 2

              # Start capturing
              Write-Host "Starting audio capture..."
              cargo run --example test_windows -- --duration 10

              # Verify the captured audio
              if (!(Test-Path "test_capture.wav")) {
                  throw "Capture failed - no output file created"
              }

              $capturedSize = (Get-Item "test_capture.wav").Length
              if ($capturedSize -eq 0) {
                  throw "Capture failed - output file is empty"
              }

              Write-Host "Successfully captured $capturedSize bytes of audio"
          }
          finally {
              # Clean up test process
              if ($testTone) {
                  Stop-Process -Id $testTone.Id -Force -ErrorAction SilentlyContinue
              }
          }
        shell: pwsh
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-audio-test-results
          path: |
            test_capture.wav
            test_audio/sample.mp3