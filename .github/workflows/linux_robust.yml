name: Linux Audio Tests

on:
  workflow_call:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      
      - id: cache-key
        run: echo "value=${{ hashFiles('**/Cargo.lock') }}" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

  test-pipewire:
    needs: setup
    runs-on: ubuntu-latest
    env:
      DEBUG: ${{ inputs.debug_enabled }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cached dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ needs.setup.outputs.cache-key }}

      - name: Install PipeWire Dependencies
        timeout-minutes: 5
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            alsa-utils \
            libasound2-dev \
            pipewire \
            pipewire-pulse \
            pipewire-alsa \
            pipewire-audio \
            wireplumber

      - name: Configure PipeWire
        run: |
          # Stop any existing audio services
          systemctl --user stop pipewire pipewire-pulse pulseaudio || true
          killall -9 pulseaudio pipewire pipewire-pulse 2>/dev/null || true
          
          # Create PipeWire config directory
          mkdir -p ~/.config/pipewire
          
          # Configure PipeWire for CI environment
          cat > ~/.config/pipewire/pipewire.conf << EOF
          context.properties = {
              default.clock.rate = 48000
              default.clock.quantum = 1024
              default.clock.min-quantum = 32
              default.clock.max-quantum = 8192
          }
          context.modules = [
              { name = libpipewire-module-protocol-native }
              { name = libpipewire-module-profiler }
              { name = libpipewire-module-metadata }
              { name = libpipewire-module-spa-device-factory }
              { name = libpipewire-module-spa-node-factory }
              { name = libpipewire-module-client-node }
              { name = libpipewire-module-client-device }
              { name = libpipewire-module-portal }
              { name = libpipewire-module-access }
              { name = libpipewire-module-adapter }
              { name = libpipewire-module-link-factory }
              { name = libpipewire-module-session-manager }
          ]
          EOF
          
          # Start PipeWire and related services
          systemctl --user daemon-reload
          systemctl --user start pipewire wireplumber pipewire-pulse
          
          # Wait for services to start
          sleep 5
          
          # Create virtual sink
          pw-cli create-node adapter { factory.name=support.null-audio-sink node.name=virtual-sink media.class=Audio/Sink }
          
          # Set as default sink
          wpctl set-default $(wpctl status | grep "virtual-sink" | cut -d "." -f1)

      - name: Run Audio Tests
        run: |
          # Start test tone in background
          cargo run --example test_tone_robust > test_tone.log 2>&1 &
          TONE_PID=$!
          
          # Wait for tone to start
          sleep 3
          
          # Verify test tone is running
          if ! kill -0 $TONE_PID 2>/dev/null; then
            echo "Test tone failed to start"
            cat test_tone.log
            exit 1
          fi
          
          # Start audio capture
          cargo run --example test_capture_robust
          CAPTURE_EXIT=$?
          
          # Stop test tone
          kill $TONE_PID || true
          wait $TONE_PID || true
          
          # Check capture results
          if [ $CAPTURE_EXIT -ne 0 ]; then
            echo "Audio capture failed"
            exit 1
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipewire-test-results
          path: |
            test_capture_robust.wav
            test_tone.log
            ~/.config/pipewire/*.log

  test-pulseaudio:
    needs: setup
    runs-on: ubuntu-latest
    env:
      DEBUG: ${{ inputs.debug_enabled }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cached dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ needs.setup.outputs.cache-key }}

      - name: Install PulseAudio Dependencies
        timeout-minutes: 5
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            alsa-utils \
            libasound2-dev \
            pulseaudio \
            pulseaudio-utils

      - name: Configure PulseAudio
        run: |
          # Configure PulseAudio for CI environment
          mkdir -p ~/.config/pulse
          cat > ~/.config/pulse/daemon.conf << EOF
          exit-idle-time = -1
          anonymous-enable = yes
          default-sample-rate = 48000
          default-sample-channels = 2
          default-sample-format = float32le
          realtime-scheduling = yes
          realtime-priority = 9
          rlimit-rtprio = 9
          daemonize = yes
          allow-module-loading = yes
          EOF
          
          # Start PulseAudio
          pulseaudio --start --exit-idle-time=-1 --load="module-null-sink sink_name=virtual-sink"
          sleep 3
          
          # Set virtual sink as default
          pacmd set-default-sink virtual-sink

      - name: Run Audio Tests
        run: |
          # Start test tone in background
          cargo run --example test_tone_robust > test_tone.log 2>&1 &
          TONE_PID=$!
          
          # Wait for tone to start
          sleep 3
          
          # Verify test tone is running
          if ! kill -0 $TONE_PID 2>/dev/null; then
            echo "Test tone failed to start"
            cat test_tone.log
            exit 1
          fi
          
          # Start audio capture
          cargo run --example test_capture_robust
          CAPTURE_EXIT=$?
          
          # Stop test tone
          kill $TONE_PID || true
          wait $TONE_PID || true
          
          # Check capture results
          if [ $CAPTURE_EXIT -ne 0 ]; then
            echo "Audio capture failed"
            exit 1
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulseaudio-test-results
          path: |
            test_capture_robust.wav
            test_tone.log
            ~/.config/pulse/*.log