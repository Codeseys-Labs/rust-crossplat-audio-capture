name: Application Capture CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-windows:
    name: Test Windows WASAPI Process Loopback
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
        
    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Check code formatting
      run: cargo fmt --all -- --check
      
    - name: Run Clippy
      run: cargo clippy --features feat_windows -- -D warnings
      
    - name: Build Windows features
      run: cargo build --features feat_windows --bin app_capture_test
      
    - name: Run Windows-specific tests
      run: cargo test --features feat_windows
      
    - name: Test application capture binary - Version
      run: cargo run --features feat_windows --bin app_capture_test -- --version
      
    - name: Test application capture binary - List apps
      run: cargo run --features feat_windows --bin app_capture_test -- --list
      
    - name: Test application capture binary - Error handling
      run: cargo run --features feat_windows --bin app_capture_test -- --test-invalid
      
    - name: Test application capture binary - Platform features
      run: cargo run --features feat_windows --bin app_capture_test -- --test-platform
      
    - name: Test application capture binary - Quick test
      run: cargo run --features feat_windows --bin app_capture_test -- --quick-test

  test-linux:
    name: Test Linux PipeWire Monitor Streams
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libpipewire-0.3-dev \
          pkg-config \
          build-essential \
          clang \
          libclang-dev \
          llvm-dev \
          libasound2-dev
          
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
        
    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Check PipeWire installation
      run: |
        pkg-config --modversion libpipewire-0.3 || echo "PipeWire not found"
        pipewire --version || echo "PipeWire daemon not available"
        
    - name: Build Linux features
      run: cargo build --features feat_linux --bin app_capture_test
      
    - name: Run Linux-specific tests
      run: cargo test --features feat_linux
      
    - name: Test application capture binary - Version
      run: cargo run --features feat_linux --bin app_capture_test -- --version
      
    - name: Test application capture binary - List apps
      run: cargo run --features feat_linux --bin app_capture_test -- --list
      
    - name: Test application capture binary - Error handling
      run: cargo run --features feat_linux --bin app_capture_test -- --test-invalid
      
    - name: Test application capture binary - Platform features
      run: cargo run --features feat_linux --bin app_capture_test -- --test-platform
      
    - name: Test application capture binary - Quick test
      run: cargo run --features feat_linux --bin app_capture_test -- --quick-test

  test-macos:
    name: Test macOS CoreAudio Process Tap
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Check macOS version
      run: |
        sw_vers -productVersion
        echo "Process Tap requires macOS 14.4+"
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
        
    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Build macOS features
      run: cargo build --features feat_macos --bin app_capture_test
      
    - name: Run macOS-specific tests
      run: cargo test --features feat_macos
      
    - name: Test application capture binary - Version
      run: cargo run --features feat_macos --bin app_capture_test -- --version
      
    - name: Test application capture binary - List apps
      run: cargo run --features feat_macos --bin app_capture_test -- --list
      
    - name: Test application capture binary - Error handling
      run: cargo run --features feat_macos --bin app_capture_test -- --test-invalid
      
    - name: Test application capture binary - Platform features
      run: cargo run --features feat_macos --bin app_capture_test -- --test-platform
      
    - name: Test application capture binary - Quick test
      run: cargo run --features feat_macos --bin app_capture_test -- --quick-test

  cross-platform-build:
    name: Cross-platform build test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-gnu
          - x86_64-unknown-linux-gnu
          - x86_64-apple-darwin
          
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
        
    - name: Install cross-compilation dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mingw-w64-x86-64
        
    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: cross-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Build for target
      run: |
        case "${{ matrix.target }}" in
          x86_64-pc-windows-gnu)
            cargo build --target ${{ matrix.target }} --features feat_windows --bin app_capture_test
            ;;
          x86_64-unknown-linux-gnu)
            cargo build --target ${{ matrix.target }} --features feat_linux --bin app_capture_test
            ;;
          x86_64-apple-darwin)
            # Note: Cross-compilation to macOS requires additional setup
            echo "macOS cross-compilation requires macOS SDK"
            ;;
        esac

  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpipewire-0.3-dev pkg-config build-essential
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Run integration tests
      run: cargo test --test application_capture_tests --features feat_linux
      
    - name: Run example compilation test
      run: cargo check --example application_capture_demo --features feat_linux

  documentation:
    name: Documentation and examples
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Build documentation
      run: cargo doc --no-deps --features feat_linux
      
    - name: Check example compilation
      run: cargo check --examples --features feat_linux
