# Tag-triggered PyPI release workflow for rsac (Python bindings via PyO3 + maturin).
#
# Mirrors .github/workflows/release.yml for the crates.io flow:
#   1. build-wheels — matrix of (os × python) wheels via maturin-action
#   2. build-sdist  — single sdist for source installs / offline mirrors
#   3. publish-pypi — merges all artifacts, uploads to PyPI with skip-existing
#
# Triggered by semver-shaped tags (vMAJOR.MINOR.PATCH) from push --tags.
# Bump bindings/rsac-python/pyproject.toml version in lockstep with the root
# Cargo.toml before tagging (see docs/RELEASE_PROCESS.md).
#
# Authentication: PyPI Trusted Publishing (OIDC) — NO long-lived secret.
#   The publish-pypi job requests `id-token: write` and uploads via
#   pypa/gh-action-pypi-publish, which authenticates with a short-lived
#   OIDC token. A Trusted Publisher must be configured on the PyPI `rsac`
#   project for this repo + workflow:
#     https://docs.pypi.org/trusted-publishers/
#   (The previous MATURIN_PYPI_TOKEN secret is no longer used.)
#
# manylinux note: PyO3/maturin-action `manylinux: auto` currently resolves to
# manylinux2014 (glibc 2.17) on x86_64, which covers py3.9+. aarch64 Linux
# wheels are built inside the same manylinux container. macOS 15 runners
# produce wheels that require macOS 11.0+ (aarch64) / 10.12+ (x86_64) given
# the Rust toolchain's default deployment targets.
#
# Security note: tag-triggered only; no untrusted event payloads are
# interpolated into run: steps. Only `secrets.*` and matrix values.

name: Release PyPI

on:
  push:
    tags:
      # Stable semver tags only; pre-release shapes (v0.2.0-rc.1, etc.)
      # must not trigger real PyPI publishes. See docs/RELEASE_PROCESS.md.
      - 'v*.*.*'
      - '!v*-*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Least privilege by default. The publish job opts into id-token: write
# for PyPI Trusted Publishing (OIDC); no other job needs write scope.
permissions:
  contents: read

jobs:
  # build-wheels: os × python matrix.
  build-wheels:
    name: Wheel (${{ matrix.os }} py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - blacksmith-4vcpu-ubuntu-2404
          - blacksmith-6vcpu-macos-15
          - blacksmith-4vcpu-windows-2025
        python: ['3.9', '3.10', '3.11', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5 # TODO: pin to SHA

      - uses: actions/setup-python@v5 # TODO: pin to SHA
        with:
          python-version: ${{ matrix.python }}

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: useblacksmith/rust-cache@v1 # TODO: pin to SHA
        with:
          workspaces: bindings/rsac-python -> target

      - name: Build wheel (maturin-action)
        uses: PyO3/maturin-action@v1 # TODO: pin to SHA
        with:
          command: build
          target: auto
          manylinux: auto
          args: --release --out dist --interpreter ${{ matrix.python }} --manifest-path bindings/rsac-python/Cargo.toml

      # Native-artifact smoke test: install the freshly built wheel into
      # the matrix Python and import it, calling device-free APIs so a
      # broken native extension fails here instead of publishing green.
      # Every build-wheels row builds for its own host arch (no cross/qemu
      # rows in this matrix), so the wheel is always host-loadable.
      - name: Smoke test wheel (device-free import)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          WHEEL="$(ls dist/*.whl | head -1)"
          echo "Installing freshly built wheel: ${WHEEL}"
          python -m pip install --force-reinstall "${WHEEL}"
          python -c "import rsac; print('rsac', rsac.__version__); caps = rsac.platform_capabilities(); print('backend:', caps.backend_name)"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4 # TODO: pin to SHA
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl
          if-no-files-found: error

  # build-sdist: single source distribution.
  build-sdist:
    name: Source distribution
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5 # TODO: pin to SHA

      - uses: actions/setup-python@v5 # TODO: pin to SHA
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@1.95.0

      - name: Build sdist (maturin-action)
        uses: PyO3/maturin-action@v1 # TODO: pin to SHA
        with:
          command: sdist
          args: --out dist --manifest-path bindings/rsac-python/Cargo.toml

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4 # TODO: pin to SHA
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # publish-pypi: upload every artifact via PyPI Trusted Publishing (OIDC).
  #
  # NOTE: This requires a Trusted Publisher to be configured on the PyPI
  # `rsac` project pointing at this repository + workflow file
  # (https://docs.pypi.org/trusted-publishers/). Once configured, no
  # long-lived MATURIN_PYPI_TOKEN secret is needed — the upload authenticates
  # with a short-lived OIDC token minted from `id-token: write` below.
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    # Guard against forks publishing to the PyPI `rsac` project.
    if: github.repository == 'Codeseys-Labs/rust-crossplat-audio-capture'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      # Required for PyPI Trusted Publishing (OIDC).
      id-token: write
    steps:
      - uses: actions/checkout@v5 # TODO: pin to SHA

      # Tag↔manifest version guard: the pushed tag must match the version
      # in pyproject.toml before publishing to PyPI. Tag events only.
      - name: Verify tag matches pyproject.toml version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST="$(grep -m1 '^version' bindings/rsac-python/pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "tag version: ${VERSION}  manifest version: ${MANIFEST}"
          if [ "${VERSION}" != "${MANIFEST}" ]; then
            echo "::error::Tag version (${VERSION}) does not match pyproject.toml version (${MANIFEST})"
            exit 1
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4 # TODO: pin to SHA
        with:
          path: dist-all
          merge-multiple: true

      # Upload via the official PyPA action using Trusted Publishing.
      # No password/token input: it uses the OIDC id-token granted above.
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1 # TODO: pin to SHA
        with:
          packages-dir: dist-all
          skip-existing: true
