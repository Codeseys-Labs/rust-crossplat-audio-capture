# Tag/manual PyPI release workflow for rsac (Python bindings via PyO3 + maturin).
#
# Mirrors .github/workflows/release.yml for the crates.io flow:
#   1. build-wheels — matrix of (os × arch) ABI3 wheels via maturin-action
#                     (one cp39-abi3 wheel per platform covers CPython 3.9+)
#   2. build-sdist  — single sdist for source installs / offline mirrors
#   3. publish-pypi — merges all artifacts, uploads to PyPI with skip-existing
#
# Triggered by semver-shaped tags (vMAJOR.MINOR.PATCH) from push --tags,
# or manually via workflow_dispatch with publish=true + a matching X.Y.Z
# version input. Bump bindings/rsac-python/pyproject.toml version in
# lockstep with the root Cargo.toml before publishing (see
# docs/RELEASE_PROCESS.md).
#
# Authentication: PyPI Trusted Publishing (OIDC) — NO long-lived secret.
#   The publish-pypi job requests `id-token: write` and uploads via
#   pypa/gh-action-pypi-publish, which authenticates with a short-lived
#   OIDC token. A Trusted Publisher must be configured on the PyPI `rsac`
#   project for this repo + workflow:
#     https://docs.pypi.org/trusted-publishers/
#   (The previous MATURIN_PYPI_TOKEN secret is no longer used.)
#
# manylinux note: PyO3/maturin-action `manylinux: auto` currently resolves to
# manylinux2014 (glibc 2.17) on x86_64, which covers py3.9+. aarch64 Linux
# wheels are built inside the same manylinux container. macOS 15 runners
# produce wheels that require macOS 11.0+ (aarch64) / 10.12+ (x86_64) given
# the Rust toolchain's default deployment targets.
#
# Security note: tag-triggered only; no untrusted event payloads are
# interpolated into run: steps. Only `secrets.*` and matrix values.

name: Release PyPI

on:
  push:
    tags:
      # Stable semver tags only; pre-release shapes (v0.2.0-rc.1, etc.)
      # must not trigger real PyPI publishes. See docs/RELEASE_PROCESS.md.
      - 'v*.*.*'
      - '!v*-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to verify against bindings/rsac-python/pyproject.toml before publishing (for example: 0.4.0)'
        type: string
        required: false
        default: ''
      publish:
        description: 'Publish to PyPI. Leave false to build/smoke wheels only.'
        type: boolean
        required: false
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Least privilege by default. The publish job opts into id-token: write
# for PyPI Trusted Publishing (OIDC); no other job needs write scope.
permissions:
  contents: read

jobs:
  # build-wheels: os × arch matrix. ONE abi3 wheel per (platform, arch).
  #
  # The crate builds against the CPython stable ABI (pyo3 `abi3-py39`), so a
  # single `cp39-abi3` wheel per platform is importable on CPython 3.9–3.13 —
  # no per-interpreter matrix dimension (rsac-c353 / rsac#18). We build the
  # wheel with one interpreter, then smoke-test importing it on several minor
  # versions to prove the forward-compatibility holds.
  #
  # `target` selects the arch: Linux ships both x86_64 and aarch64 manylinux
  # wheels (aarch64 cross-built inside the manylinux container by
  # maturin-action), macOS ships a universal2 wheel (x86_64 + arm64), Windows
  # ships x86_64.
  build-wheels:
    name: Wheel (${{ matrix.os }} ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-4vcpu-ubuntu-2404
            target: x86_64
            smoke: true   # host arch — importable on this runner
          - os: blacksmith-4vcpu-ubuntu-2404
            target: aarch64
            smoke: false  # cross-built; not loadable on the x86_64 runner
          - os: blacksmith-6vcpu-macos-15
            target: universal2
            smoke: true
          - os: blacksmith-4vcpu-windows-2025
            target: x64
            smoke: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      # Install the spread of CPython minor versions used by the abi3
      # forward-compat smoke test below. The first listed (3.9) is the build
      # interpreter; the rest prove one cp39-abi3 wheel imports across versions.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: |
            3.9
            3.13

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0

      - uses: useblacksmith/rust-cache@81d053bdb0871dcd3f10763c8cc60d0adc41762b # v1 branch head (no v1 tag exists upstream)
        with:
          workspaces: bindings/rsac-python -> target

      # One abi3 wheel for this (platform, arch). `--interpreter 3.9` pins the
      # abi3 floor; `manylinux: auto` resolves to manylinux2014 (glibc 2.17,
      # covers 3.9+) and installs PipeWire dev libs via before-script-linux so
      # the Linux wheel links feat_linux.
      - name: Build abi3 wheel (maturin-action)
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: auto
          # manylinux containers are minimal; the Linux backend needs PipeWire +
          # clang/llvm (bindgen) to compile feat_linux. No-op on macOS/Windows.
          before-script-linux: |
            if command -v yum >/dev/null 2>&1; then
              yum install -y pipewire-devel clang-devel llvm-devel || \
                yum install -y pipewire clang llvm || true
            fi
          args: --release --out dist --interpreter 3.9 --manifest-path bindings/rsac-python/Cargo.toml

      # abi3 forward-compat smoke test: install the ONE built wheel into BOTH
      # the 3.9 floor and a newer minor (3.13) and import + call device-free
      # APIs, proving a single cp39-abi3 wheel works across CPython versions.
      # Skipped for the cross-built aarch64 wheel (not loadable on x86_64).
      - name: Smoke test wheel across CPython versions (device-free import)
        if: ${{ matrix.smoke }}
        shell: bash
        run: |
          WHEEL="$(ls dist/*.whl | head -1)"
          echo "abi3 wheel: ${WHEEL}"
          for PYBIN in python3.9 python3.13; do
            if command -v "$PYBIN" >/dev/null 2>&1; then
              echo "=== import on $("$PYBIN" --version) ==="
              "$PYBIN" -m pip install --upgrade pip >/dev/null
              "$PYBIN" -m pip install --force-reinstall "${WHEEL}"
              "$PYBIN" -c "import rsac; print('rsac', rsac.__version__); print('backend:', rsac.platform_capabilities().backend_name); print('parse:', rsac.CaptureTarget.parse('system'))"
            fi
          done

      - name: Upload wheel artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  # build-sdist: single source distribution.
  build-sdist:
    name: Source distribution
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0

      - name: Build sdist (maturin-action)
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: sdist
          args: --out dist --manifest-path bindings/rsac-python/Cargo.toml

      - name: Upload sdist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # publish-pypi: upload every artifact via PyPI Trusted Publishing (OIDC).
  #
  # NOTE: This requires a Trusted Publisher to be configured on the PyPI
  # `rsac` project pointing at this repository + workflow file
  # (https://docs.pypi.org/trusted-publishers/). Once configured, no
  # long-lived MATURIN_PYPI_TOKEN secret is needed — the upload authenticates
  # with a short-lived OIDC token minted from `id-token: write` below.
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    # Guard against forks publishing to the PyPI `rsac` project.
    if: github.repository == 'Codeseys-Labs/rust-crossplat-audio-capture' && (github.event_name != 'workflow_dispatch' || inputs.publish)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      # Required for PyPI Trusted Publishing (OIDC).
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      # Tag↔manifest version guard: the pushed tag must match the version
      # in pyproject.toml before publishing to PyPI. Tag events only.
      - name: Verify requested version matches pyproject.toml version
        shell: bash
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION='${{ inputs.version }}'
          fi
          if [ -z "${VERSION}" ]; then
            echo "::error::Manual PyPI publish requires the workflow_dispatch version input"
            exit 1
          fi
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Requested version '${VERSION}' is not a stable X.Y.Z semver version"
            exit 1
          fi
          MANIFEST="$(grep -m1 '^version' bindings/rsac-python/pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "requested version: ${VERSION}  manifest version: ${MANIFEST}"
          if [ "${VERSION}" != "${MANIFEST}" ]; then
            echo "::error::Requested version (${VERSION}) does not match pyproject.toml version (${MANIFEST})"
            exit 1
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist-all
          merge-multiple: true

      # Upload via the official PyPA action using Trusted Publishing.
      # No password/token input: it uses the OIDC id-token granted above.
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0 (head of release/v1)
        with:
          packages-dir: dist-all
          skip-existing: true
