name: Cross-Platform Audio Tests

on:
  workflow_call:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  linux-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        audio_backend: [pipewire, pulseaudio]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Run Linux tests
        run: cargo test --verbose

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.audio_backend }}-test-results
          path: |
            test_capture_robust.wav
            test_tone.log

  macos-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run macOS tests
        run: cargo test --verbose
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-test-results
          path: |
            test_capture_robust.wav
            test_tone.log

  windows-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Windows tests
        run: cargo test --verbose

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-results
          path: |
            test_capture.wav
            test_audio/sample.mp3
