name: Cross-Platform Compilation Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  cross-compile:
    name: Cross Compile - ${{ matrix.platform.name }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: "Linux x86_64"
            target: x86_64-unknown-linux-gnu
            features: feat_linux
            
          - name: "Linux ARM64"
            target: aarch64-unknown-linux-gnu
            features: feat_linux
            
          - name: "Windows x86_64"
            target: x86_64-pc-windows-msvc
            features: feat_windows
            
          - name: "macOS x86_64"
            target: x86_64-apple-darwin
            features: feat_macos
            
          - name: "macOS ARM64"
            target: aarch64-apple-darwin
            features: feat_macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cross compile check
        run: |
          echo "🔧 Cross-compiling for ${{ matrix.platform.name }}"
          echo "Target: ${{ matrix.platform.target }}"
          echo "Features: ${{ matrix.platform.features }}"
          cross check --target ${{ matrix.platform.target }} --no-default-features --features ${{ matrix.platform.features }} --examples

  # Separate job for native compilation (faster, no Docker needed)
  native-compile:
    name: Native Compile - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            features: feat_linux
            name: "Linux Native"
            
          - os: windows-latest
            features: feat_windows
            name: "Windows Native"
            
          - os: macos-latest
            features: feat_macos
            name: "macOS Native"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev pkg-config

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Native compile check
        run: |
          echo "🔧 Native compilation for ${{ matrix.name }}"
          cargo check --no-default-features --features ${{ matrix.features }} --examples

      - name: Run tests (Linux only for now)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "🧪 Running tests on ${{ matrix.name }}"
          cargo test --no-default-features --features ${{ matrix.features }}
