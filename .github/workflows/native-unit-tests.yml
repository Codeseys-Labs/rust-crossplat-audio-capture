name: Native Platform Unit Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Linux unit tests
  linux-tests:
    name: Linux Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install PipeWire development libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Cargo check
        run: cargo check --lib --no-default-features --features feat_linux

      - name: Cargo clippy
        run: cargo clippy --lib --no-default-features --features feat_linux -- -D warnings

      - name: Cargo test (unit tests)
        run: cargo test --lib --no-default-features --features feat_linux -- --test-threads=1

  # Windows unit tests — runs our 35 new WASAPI backend tests!
  windows-tests:
    name: Windows Unit Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check --lib --no-default-features --features feat_windows

      - name: Cargo clippy
        run: cargo clippy --lib --no-default-features --features feat_windows -- -D warnings
        continue-on-error: true  # First time running clippy on Windows, may have warnings

      - name: Cargo test (unit tests)
        run: cargo test --lib --no-default-features --features feat_windows -- --test-threads=1

      - name: Report audio service status
        if: always()
        shell: powershell
        run: |
          Write-Host "=== Audio Service Status ==="
          Get-Service -Name "Audiosrv" -ErrorAction SilentlyContinue | Format-Table Status, Name, DisplayName
          Write-Host "=== Audio Devices ==="
          Get-WmiObject Win32_SoundDevice -ErrorAction SilentlyContinue | Format-Table Name, Status

  # macOS unit tests
  macos-tests:
    name: macOS Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]  # ARM64 (M1/M2). Add macos-13 for Intel if needed.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check --lib --no-default-features --features feat_macos

      - name: Cargo clippy
        run: cargo clippy --lib --no-default-features --features feat_macos -- -D warnings
        continue-on-error: true  # First time running clippy on macOS

      - name: Cargo test (unit tests)
        run: cargo test --lib --no-default-features --features feat_macos -- --test-threads=1
        continue-on-error: true  # macOS tests may have platform-specific failures
