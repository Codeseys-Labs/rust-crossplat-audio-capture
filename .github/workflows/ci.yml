name: Rust CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint_and_format_checks:
    name: Lint and Format Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal # Minimal profile is sufficient for linting
          override: true

      - name: Cache Cargo registry and build outputs
        uses: Swatinem/rust-cache@v2 # Cache for clippy if it resolves dependencies

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  build_and_test:
    needs: lint_and_format_checks # Depends on the lint job
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install audio dev libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev libpulse-dev pkg-config

      - name: Install Rust stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo registry and build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-features --all-targets --verbose

      - name: Run tests
        run: cargo test --all-features --all-targets --verbose

  docker_linux_test:
    name: Dockerized Linux Tests
    needs: lint_and_format_checks # Depends on the lint job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image and run tests (Linux)
        run: docker build --file docker/linux/Dockerfile --tag rust-audio-capture-linux-test:latest .

  enhanced_windows_tests:
    name: Enhanced Windows WASAPI Tests
    needs: lint_and_format_checks
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Windows-only features
        run: cargo build --no-default-features --features feat_windows --verbose
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1

      - name: Test Enhanced WASAPI Device Enumeration
        run: |
          Write-Host "Testing enhanced WASAPI device enumeration with wasapi-rs optimizations..."
          Write-Host "VecDeque buffering, process tree support, and improved error handling"
          cargo run --example windows_device_test --features feat_windows
        shell: pwsh
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1
  coverage:
    name: Code Coverage
    needs: lint_and_format_checks # Depends on the lint job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --version 0.27.3 # Pinned version

      - name: Generate code coverage
        run: cargo tarpaulin --all-features --workspace --out Lcov --output-dir coverage/ --run-types Tests Lib # Focus on library and test code

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          # token: ${{ secrets.CODECOV_TOKEN }} # Only if needed for private repo
          files: ./coverage/lcov.info
          fail_ci_if_error: true
