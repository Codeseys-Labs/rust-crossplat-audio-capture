# Unified CI for rsac (Rust Cross-Platform Audio Capture)
# Lint → Unit tests (Linux/Windows/macOS) → ARM64 cross-compile check

name: CI

on:
  push:
    branches: [main, master]
    # Also run on stable semver tags so the version-lockstep job's tag-time
    # hard-gate (which asserts all six manifests equal the tag) actually fires
    # at the point of no return — it was previously dead code (ci.yml had no
    # tags: trigger). Pre-release shapes (v*-rc.1) are excluded.
    tags:
      - 'v*.*.*'
      - '!v*-*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Least-privilege token: this workflow only builds/tests, never writes.
permissions:
  contents: read

# Cancel superseded runs on the same ref (saves runner minutes on PR pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Lint (clippy matrix across all 3 OS) ────────────────────────────
  lint:
    name: Lint & Format (${{ matrix.feature }})
    timeout-minutes: 20
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: blacksmith-4vcpu-ubuntu-2404
            feature: feat_linux
            os: linux
          - runner: blacksmith-4vcpu-windows-2025
            feature: feat_windows
            os: windows
          - runner: blacksmith-6vcpu-macos-15
            feature: feat_macos
            os: macos
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install PipeWire dev libraries
        if: matrix.os == 'linux'
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      # rustfmt is platform-independent; run the check once on the Linux leg.
      - name: Check formatting
        if: matrix.os == 'linux'
        run: cargo fmt --all -- --check

      # rsac L14(a): clippy now lints --all-targets (lib + bins + examples +
      # tests + benches) for the active platform, so example/test/bench code is
      # held to the same -D warnings bar as the library and demo binaries —
      # previously they were exempt and could accumulate lint debt silently.
      # rsac-0a1f: `cli` gates the rsac/standardized_test bins + the
      # verify_audio/basic_capture/record_to_file examples via
      # required-features, so --all-targets WITHOUT it silently skips them
      # (src/main.rs would lose its -D warnings coverage). `compose` is
      # platform-independent; lint it on every leg too.
      - name: Run Clippy
        run: cargo clippy --all-targets --no-default-features --features ${{ matrix.feature }},compose,cli -- -D warnings

      # FH-2: the bare `--no-default-features` build (NO platform feature) must
      # still compile. It broke on Windows (E0432) because a bin gated only on
      # target_os pulled in a feature-gated module. Run it on all three runners —
      # the failure only manifests where target_os is true but the feat_* is off.
      - name: Build with no default features (bare-build smoke)
        run: cargo build --no-default-features

  # ── Linux unit tests ────────────────────────────────────────────────
  test-linux:
    name: Linux Unit Tests
    timeout-minutes: 25
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install PipeWire dev libraries
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Cargo check
        run: cargo check --lib --no-default-features --features feat_linux

      # Build every target (bin/ + examples/), not just the lib, so demo
      # binaries and examples are compiled and kept from bit-rotting.
      # rsac-0a1f: `cli` (rsac/standardized_test bins + several examples) and
      # `compose` (composed_capture example) gate targets via required-features
      # — without them --all-targets silently skips those targets.
      - name: Build all targets
        run: cargo build --all-targets --no-default-features --features feat_linux,compose,cli

      # rsac-0a1f: `compose` is platform-independent (mock/scripted sources),
      # so its unit tests run in the lib suite on every OS leg.
      - name: Cargo test (unit tests)
        run: cargo test --lib --no-default-features --features feat_linux,compose

      # TC-01: ADR-0001's headline alloc-free producer guarantee is proved ONLY
      # by tests/rt_alloc.rs, which is an integration test and so was never run
      # by the `--lib` job above. Allocation behaviour can differ per target, so
      # it runs on every per-OS unit job. It installs a process-wide
      # #[global_allocator] (CountingAllocator) and must therefore be its OWN
      # test binary; we pin --test-threads=1 so the global counter is never
      # perturbed by a parallel test in the same process.
      - name: Cargo test (rt_alloc — ADR-0001 alloc-free proof)
        run: cargo test --test rt_alloc --no-default-features --features feat_linux -- --test-threads=1

      # TC-02: the enumeration honest-failure contract (tests/enumeration_matrix.rs)
      # is device-free / graceful-skip (it asserts non-empty-or-classified-error
      # and skips the hardware assertions on a headless runner), but it was dead
      # in CI because the matrix only ran `--lib`. Wire it in per-OS.
      - name: Cargo test (enumeration_matrix — honest-failure contract)
        run: cargo test --test enumeration_matrix --no-default-features --features feat_linux

  # ── Windows unit tests ──────────────────────────────────────────────
  test-windows:
    name: Windows Unit Tests
    timeout-minutes: 25
    needs: lint
    runs-on: blacksmith-4vcpu-windows-2025
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Cargo check
        run: cargo check --lib --no-default-features --features feat_windows

      # Build every target (bin/ + examples/), not just the lib.
      # rsac-0a1f: `cli` + `compose` gate bins/examples via required-features —
      # without them --all-targets silently skips those targets.
      - name: Build all targets
        run: cargo build --all-targets --no-default-features --features feat_windows,compose,cli

      # TC-07: the Windows unit step used to be continue-on-error on the WHOLE
      # `cargo test --lib` run, so the ~40 inline wasapi.rs tests + 21 thread.rs
      # tests + the device-free DeviceWatcher lifecycle tests could regress
      # without ever gating CI. We now PARTITION the suite exactly like
      # release.yml's verify job: the platform-independent + non-audio tests
      # HARD-FAIL here (a real Windows unit regression blocks CI), while ONLY the
      # device-touching subset (the create_audio_client_* tests in
      # src/audio/windows/thread.rs, which open a real WASAPI client) is excluded
      # via --skip and re-run as a tolerated step below. The filter substring
      # mirrors release.yml's device_test_filter — keep the two in lockstep and
      # as narrow as possible if device-dependent test names change.
      # The device-dependent unit tests open a real WASAPI client / default
      # endpoint / IMMNotificationClient, which need the Windows Audio service
      # (Audiosrv) + an audio endpoint — both ABSENT on the Blacksmith Windows
      # runner (AGENTS.md §6), where they fail with RPC-unavailable (0x800706BA)
      # / service-not-installed (0x80070424). They are partitioned out of the
      # hard-fail step (via --skip) and re-run as a tolerated step. Everything
      # NOT in this list (parse_session_identifier, get_process_name_by_pid,
      # backend_context, data_flow_to_kind, application_session_info, …) is pure
      # logic and HARD-FAILS, so a real unit regression still gates CI.
      # DEVICE_SKIPS must stay in lockstep with release.yml's verify job.
      # rsac-0a1f: `compose` added so the platform-independent compose unit
      # tests run here too (same feature set in the tolerated step below, so
      # the lib is compiled once for both partitions).
      - name: Cargo test (unit tests, hard-fail)
        shell: bash
        run: |
          DEVICE_SKIPS="--skip enumerate --skip default_device --skip device_enumeration --skip device_id --skip device_supported_formats --skip audio_device_ --skip create_stream --skip find_device --skip watch_ --skip create_audio_client"
          cargo test --lib --no-default-features --features feat_windows,compose -- --test-threads=1 $DEVICE_SKIPS

      # Device-dependent subset ONLY (the families --skip'd above). Tolerated
      # because the Blacksmith Windows runner has no audio subsystem; this step
      # runs ONLY those families, so it can never mask the hard-fail partition.
      # Mirrors release.yml's tolerated device step — keep the filters in sync.
      - name: Cargo test (device-dependent tests, tolerated)
        continue-on-error: true
        shell: bash
        run: |
          for f in enumerate default_device device_enumeration device_id device_supported_formats audio_device_ create_stream find_device watch_ create_audio_client; do
            cargo test --lib --no-default-features --features feat_windows,compose -- --test-threads=1 "$f" || true
          done

      # TC-01: ADR-0001 alloc-free producer proof (process-wide allocator, own
      # binary, single-threaded). Device-free, so it HARD-FAILS like Linux —
      # an allocation regression on Windows now blocks CI.
      - name: Cargo test (rt_alloc — ADR-0001 alloc-free proof)
        shell: bash
        run: cargo test --test rt_alloc --no-default-features --features feat_windows -- --test-threads=1

      # TC-02: device-free enumeration honest-failure contract (graceful-skip).
      - name: Cargo test (enumeration_matrix — honest-failure contract)
        shell: bash
        run: cargo test --test enumeration_matrix --no-default-features --features feat_windows

      # Doctests were Linux-only (feature-combo-doctests job) — doc examples
      # visible only under cfg(windows) never compiled as doctests. Run the
      # doc suite on this leg's feature set too (device-free; no_run examples
      # only compile).
      - name: Cargo test (doctests)
        shell: bash
        run: cargo test --doc --no-default-features --features feat_windows,compose,sink-wav,cli

      - name: Report audio service status
        if: always()
        shell: powershell
        run: |
          Write-Host "=== Audio Service Status ==="
          Get-Service -Name "Audiosrv" -ErrorAction SilentlyContinue | Format-Table Status, Name, DisplayName
          Write-Host "=== Audio Devices ==="
          Get-WmiObject Win32_SoundDevice -ErrorAction SilentlyContinue | Format-Table Name, Status

  # ── macOS unit tests ────────────────────────────────────────────────
  test-macos:
    name: macOS Unit Tests
    timeout-minutes: 25
    needs: lint
    runs-on: blacksmith-6vcpu-macos-15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Grant audio permissions for CI
        run: |
          # Grant microphone/audio access to avoid TCC dialog blocking tests
          # This allows the test binary to access audio devices without UI prompts
          TCC_DB="$HOME/Library/Application Support/com.apple.TCC/TCC.db"
          if [ -f "$TCC_DB" ]; then
            sqlite3 "$TCC_DB" \
              "INSERT OR IGNORE INTO access VALUES('kTCCServiceMicrophone','com.apple.Terminal',1,2,4,1,NULL,NULL,0,'UNUSED',NULL,0,$(date +%s))" 2>/dev/null || true
            sqlite3 "$TCC_DB" \
              "INSERT OR IGNORE INTO access VALUES('kTCCServiceMicrophone','com.apple.dt.CommandLineTools',1,2,4,1,NULL,NULL,0,'UNUSED',NULL,0,$(date +%s))" 2>/dev/null || true
            echo "TCC permissions granted (or already present)"
          else
            echo "TCC database not found — skipping permission grants"
          fi

      - name: Report audio environment
        run: |
          echo "=== macOS Version ==="
          sw_vers
          echo "=== Audio Devices ==="
          system_profiler SPAudioDataType 2>/dev/null || echo "No audio profiler available"

      - name: Cargo check
        run: cargo check --lib --no-default-features --features feat_macos

      # Build every target (bin/ + examples/), not just the lib.
      # rsac-0a1f: `cli` + `compose` gate bins/examples via required-features —
      # without them --all-targets silently skips those targets.
      - name: Build all targets
        run: cargo build --all-targets --no-default-features --features feat_macos,compose,cli

      # TC-03: src/audio/macos/tap.rs has process-tap tests that are NOT
      # #[ignore]d (e.g. test_new_system_creates_tap at tap.rs:1352 calls
      # CoreAudioProcessTap::new_system -> AudioHardwareCreateProcessTap, which
      # the project's own docs note can BLOCK 10+ minutes without a
      # kTCCServiceAudioCapture grant — unavailable on Blacksmith macOS). The
      # job-level timeout-minutes: 25 already bounds the worst case, but a
      # step-level timeout fails THIS step fast (5 min) so a hang surfaces as a
      # clear failure here rather than eating the whole job budget. The proper
      # fix is to #[ignore] those tests in src/ — flagged as a follow-up for the
      # orchestrator since this job may not edit src/.
      # rsac-0a1f: `compose` added so the platform-independent compose unit
      # tests run in this leg too.
      - name: Cargo test (unit tests)
        timeout-minutes: 5
        run: cargo test --lib --no-default-features --features feat_macos,compose

      # TC-01: ADR-0001 alloc-free producer proof (process-wide allocator, own
      # binary, single-threaded). Device-free, so it HARD-FAILS like Linux.
      - name: Cargo test (rt_alloc — ADR-0001 alloc-free proof)
        timeout-minutes: 5
        run: cargo test --test rt_alloc --no-default-features --features feat_macos -- --test-threads=1

      # TC-02: device-free enumeration honest-failure contract (graceful-skip).
      - name: Cargo test (enumeration_matrix — honest-failure contract)
        timeout-minutes: 5
        run: cargo test --test enumeration_matrix --no-default-features --features feat_macos

      # Doctests were Linux-only (feature-combo-doctests job) — doc examples
      # visible only under cfg(macos) never compiled as doctests. Run the doc
      # suite on this leg's feature set too (device-free; no_run examples only
      # compile).
      - name: Cargo test (doctests)
        timeout-minutes: 10
        run: cargo test --doc --no-default-features --features feat_macos,compose,sink-wav,cli

      # OPTION B (existence check): Blacksmith macOS runners lack TCC grants for
      # Process Tap capture (see macos-process job in ci-audio-tests.yml —
      # continue-on-error with "Process Tap expected to skip due to TCC in CI").
      # Rather than add a known-failing step, we assert the ignored tests exist
      # and are discoverable by the harness. This catches regressions where the
      # tests get deleted, renamed, or fail to compile — the common failure
      # modes that a wiring check meaningfully guards against.
      - name: Verify ApplicationByName + ApplicationByPID tests are wired up
        timeout-minutes: 5
        run: |
          cargo test --test ci_audio --no-default-features --features feat_macos \
            -- --list --ignored 2>&1 | tee ci-audio-ignored.log
          grep -q "application_by_name" ci-audio-ignored.log || {
            echo "FAIL: application_by_name tests not discovered in ignored test list"
            exit 1
          }
          grep -q "application_by_pid" ci-audio-ignored.log || {
            echo "FAIL: application_by_pid tests not discovered in ignored test list"
            exit 1
          }
          echo "OK: application_by_{name,pid} tests are wired up (ignored, not run in CI — TCC unavailable on Blacksmith macOS)"

      # Existence check for subscribe + process_tree coverage added in
      # loop-18 task #3. These are NOT #[ignore]d — they use require_audio!()
      # to skip at runtime — so we list the full (non-ignored) suite and
      # grep for the module names. Keeps the wiring-regression guard in
      # lockstep with the application_by_{name,pid} pattern above.
      - name: Verify subscribe + process_tree tests are wired up
        timeout-minutes: 5
        run: |
          cargo test --test ci_audio --no-default-features --features feat_macos \
            -- --list 2>&1 | tee ci-audio-all.log
          grep -q "subscribe" ci-audio-all.log || {
            echo "FAIL: subscribe tests not discovered in test list"
            exit 1
          }
          grep -q "process_tree" ci-audio-all.log || {
            echo "FAIL: process_tree tests not discovered in test list"
            exit 1
          }
          echo "OK: subscribe + process_tree tests are wired up"

  # ── Linux ARM64 cross-compilation check ─────────────────────────────
  cross-compile-linux-arm64:
    name: Linux ARM64 Cross-Compile Check
    timeout-minutes: 20
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          # PipeWire dev libraries for host (needed for build.rs)
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Cross-compile check (lib only)
        run: |
          # ARM64 cross-check. We do NOT install :arm64 PipeWire dev packages:
          # the pipewire-debian PPA does not publish arm64 binaries, so apt
          # would fail. Instead we run `cargo check` (compile-only, no link)
          # and make its REAL exit code authoritative: exit 0 passes, and a
          # non-zero exit is tolerated ONLY for the one known-acceptable mode
          # — the pipewire/libspa -sys build scripts failing pkg-config
          # discovery of the (missing) aarch64 system libraries. Any other
          # failure — rustc `error[` / `error:` diagnostics, a non-PipeWire
          # build-script crash — fails the job. CARGO_TERM_COLOR is forced off
          # for this invocation so the greps below see plain text (the
          # workflow-level `always` would embed ANSI codes in the log).
          set -o pipefail
          echo "Checking ARM64 compilation (library code only, no linking)..."
          STATUS=0
          CARGO_TERM_COLOR=never cargo check --lib --no-default-features --features feat_linux \
            --target aarch64-unknown-linux-gnu 2>&1 | tee arm64-check.log || STATUS=$?
          if [ "$STATUS" -eq 0 ]; then
            echo "OK: ARM64 cross-check passed cleanly"
            exit 0
          fi
          # Fail on any error diagnostic that is NOT the tolerated
          # pipewire/libspa build-script failure.
          UNEXPECTED="$(grep -E '^error(\[|:)' arm64-check.log \
            | grep -vE 'failed to run custom build command for `(pipewire|libspa)' || true)"
          if [ -n "$UNEXPECTED" ]; then
            echo "FAIL: cargo check exited ${STATUS} with unexpected errors for aarch64-unknown-linux-gnu:"
            echo "$UNEXPECTED"
            exit 1
          fi
          # Confirm the root cause really is pkg-config discovery of the
          # missing aarch64 PipeWire libs, not some other build-script issue.
          if ! grep -qiE 'pkg-config|library .* was not found|\.pc' arm64-check.log; then
            echo "FAIL: cargo check exited ${STATUS} without the expected pkg-config/libpipewire diagnostic — not the tolerated missing-arm64-libs mode"
            exit 1
          fi
          echo "TOLERATED: aarch64 PipeWire system libraries unavailable (pkg-config failure in the pipewire/libspa -sys build scripts); no rustc compilation errors"

  # ── Binding crates compilation check ─────────────────────────────────
  check-bindings:
    name: Binding Crates
    timeout-minutes: 20
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install PipeWire dev libraries
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config libclang-dev

      - name: Check rsac-ffi (C FFI)
        run: cargo check -p rsac-ffi

      # rsac-3e24: clippy the binding crates under -D warnings. The root lint job
      # only lints the workspace default member (feat_<os>), so binding-crate
      # clippy errors (e.g. manual_is_multiple_of, type_complexity) previously
      # reached CI only as a `cargo check` pass. Lint all three to the same bar.
      - name: Clippy binding crates (-D warnings)
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: |
          cargo clippy -p rsac-ffi --all-targets -- -D warnings
          cargo clippy -p rsac-napi --all-targets -- -D warnings
          cargo clippy -p rsac-python --all-targets -- -D warnings

      # rsac-1413 / BP-5: the curated include/rsac.h (which rsac-go links against)
      # must never silently drift from the cbindgen-generated twin. build.rs runs
      # cbindgen on every build and writes include/rsac_generated.h. Here we build
      # rsac-ffi to (re)generate that twin, then diff its SYMBOL SET — every
      # typedef/struct/enum type name plus every exported `rsac_*` function name —
      # against the curated header. We compare the symbol SET, not the byte stream,
      # so the headers may legitimately differ in layout, doc comments, and the
      # tagged-vs-anonymous typedef style (`typedef enum X {…} X;` vs
      # `typedef enum {…} X;`) — only a genuinely added / renamed / removed symbol
      # fails the job. A failure means: regenerate rsac_generated.h, then update the
      # curated rsac.h (NEVER point cbindgen --output at rsac.h).
      - name: Header drift check (curated rsac.h vs generated)
        shell: bash
        run: |
          set -euo pipefail
          # build.rs runs cbindgen and writes include/rsac_generated.h.
          cargo build -p rsac-ffi
          cd bindings/rsac-ffi/include

          CURATED="rsac.h"
          GENERATED="rsac_generated.h"
          for h in "$CURATED" "$GENERATED"; do
            [ -f "$h" ] || { echo "::error::expected header $h not found"; exit 1; }
          done

          # Extract the canonical symbol set from a C header:
          #   • value typedefs   ->  trailing "} NAME;"  (enum/struct, either style)
          #   • opaque typedefs  ->  "typedef struct X NAME;"
          #   • fn-ptr typedefs  ->  "(*NAME)("
          #   • exported fns     ->  "rsac_<name>("
          # This is style-tolerant: a tagged `typedef enum X {…} X;` and an
          # anonymous `typedef enum {…} X;` both reduce to the name `X`.
          symbols() {
            local f="$1"
            {
              grep -oE '^\}[[:space:]]*[A-Za-z_][A-Za-z0-9_]*[[:space:]]*;' "$f" \
                | sed -E 's/^\}[[:space:]]*//; s/[[:space:]]*;//'
              grep -oE 'typedef[[:space:]]+struct[[:space:]]+[A-Za-z_][A-Za-z0-9_]*[[:space:]]+[A-Za-z_][A-Za-z0-9_]*[[:space:]]*;' "$f" \
                | sed -E 's/.*[[:space:]]([A-Za-z_][A-Za-z0-9_]*)[[:space:]]*;/\1/'
              grep -oE '\(\*[A-Za-z_][A-Za-z0-9_]*\)' "$f" | sed -E 's/\(\*//; s/\)//'
              grep -oE '\brsac_[A-Za-z0-9_]*\(' "$f" | sed -E 's/\($//'
            } | sort -u
          }

          symbols "$CURATED" > curated-symbols.txt
          symbols "$GENERATED" > generated-symbols.txt

          echo "curated  symbols: $(wc -l < curated-symbols.txt)"
          echo "generated symbols: $(wc -l < generated-symbols.txt)"

          # Guard against an extractor that silently matched nothing.
          if [ ! -s curated-symbols.txt ] || [ ! -s generated-symbols.txt ]; then
            echo "::error::symbol extraction yielded an empty set — the header format may have changed; fix the extractor in ci.yml"
            exit 1
          fi

          if ! diff -u curated-symbols.txt generated-symbols.txt; then
            echo "::error::cbindgen-generated header symbol set has DRIFTED from the curated include/rsac.h."
            echo "::error::'-' lines are only in curated rsac.h; '+' lines are only in generated rsac_generated.h."
            echo "::error::Reconcile: regenerate rsac_generated.h, then update the curated rsac.h to match (NEVER cbindgen --output rsac.h)."
            exit 1
          fi
          echo "OK: curated rsac.h and generated rsac_generated.h share an identical symbol set ($(wc -l < curated-symbols.txt) symbols)."

      - name: Check rsac-napi (Node.js/TypeScript)
        run: cargo check -p rsac-napi

      - name: Check rsac-python (Python/PyO3)
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: cargo check -p rsac-python

  # ── Go bindings: build the FFI staticlib + run device-free tests ─────
  # rsac-go links librsac_ffi.a (built by bindings/rsac-go/Makefile) via cgo.
  # This matrix builds that staticlib natively on each platform and runs
  # `make test-pure` (the no-audio-device logic tests), so the cgo link +
  # the Go wrappers stay green across linux/windows/macos. Windows uses the
  # *-pc-windows-gnu toolchain because cgo links through MinGW gcc, which
  # consumes the GNU-archive .a (an MSVC .lib would not link). (rsac-9728)
  go-bindings:
    name: Go Bindings (${{ matrix.os }})
    timeout-minutes: 25
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os:
          - blacksmith-4vcpu-ubuntu-2404
          - blacksmith-4vcpu-windows-2025
          - blacksmith-6vcpu-macos-15
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5
        with:
          go-version: '1.22'

      - name: Install PipeWire dev libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config libclang-dev

      # cgo links through MinGW gcc on Windows, which needs the GNU .a — so the
      # FFI crate must be built for the *-pc-windows-gnu target. Add it here.
      - name: Add windows-gnu Rust target (Windows)
        if: runner.os == 'Windows'
        run: rustup target add x86_64-pc-windows-gnu

      # Build the FFI staticlib + run the Go-only (device-free) logic tests.
      # `make test-pure` builds rsac-ffi (release) and runs the no-device test
      # subset; the cgo link exercises every new FFI symbol.
      - name: Build FFI staticlib + run Go device-free tests
        working-directory: bindings/rsac-go
        run: make test-pure

      - name: go vet
        working-directory: bindings/rsac-go
        run: |
          CGO_ENABLED=1 \
          CGO_LDFLAGS="-L$(pwd)/lib -lrsac_ffi" \
          go vet ./...

  # ── Go ARM64 cross-compile check (staticlib only) ────────────────────
  # The pipewire-debian PPA publishes no arm64 binaries, so a full aarch64
  # link+test is not possible here (matching cross-compile-linux-arm64).
  # We compile-check the FFI staticlib for aarch64 so the Go-linked artifact
  # does not bit-rot on ARM; full ARM Go tests run on native ARM elsewhere.
  go-bindings-arm64-check:
    name: Go Bindings ARM64 Staticlib Check
    timeout-minutes: 20
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cross toolchain + host PipeWire dev libs
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config libclang-dev

      - name: Cross-compile rsac-ffi staticlib (aarch64, compile-only)
        run: |
          # Compile-only check (no arm64 PipeWire link libs in the PPA). The
          # build's REAL exit code is authoritative: exit 0 passes, and a
          # non-zero exit is tolerated ONLY for the one known-acceptable mode
          # (the pipewire/libspa -sys build scripts failing pkg-config
          # discovery of the missing aarch64 system libraries). Any other
          # failure — rustc `error[` / `error:` diagnostics included — fails
          # the job. CARGO_TERM_COLOR is forced off so the greps see plain
          # text (the workflow-level `always` would embed ANSI codes).
          set -o pipefail
          STATUS=0
          CARGO_TERM_COLOR=never cargo build -p rsac-ffi --release \
            --target aarch64-unknown-linux-gnu 2>&1 | tee go-arm64.log || STATUS=$?
          if [ "$STATUS" -eq 0 ]; then
            echo "OK: aarch64 rsac-ffi staticlib built cleanly"
            exit 0
          fi
          # Fail on any error diagnostic that is NOT the tolerated
          # pipewire/libspa build-script failure.
          UNEXPECTED="$(grep -E '^error(\[|:)' go-arm64.log \
            | grep -vE 'failed to run custom build command for `(pipewire|libspa)' || true)"
          if [ -n "$UNEXPECTED" ]; then
            echo "FAIL: rsac-ffi aarch64 build exited ${STATUS} with unexpected errors:"
            echo "$UNEXPECTED"
            exit 1
          fi
          # Confirm the root cause really is pkg-config discovery of the
          # missing aarch64 PipeWire libs, not some other build-script issue.
          if ! grep -qiE 'pkg-config|library .* was not found|\.pc' go-arm64.log; then
            echo "FAIL: rsac-ffi aarch64 build exited ${STATUS} without the expected pkg-config/libpipewire diagnostic — not the tolerated missing-arm64-libs mode"
            exit 1
          fi
          echo "TOLERATED: aarch64 PipeWire system libraries unavailable (pkg-config failure in the pipewire/libspa -sys build scripts); no rustc compilation errors"

  # ── Feature-combo compile + doctests (Linux) ────────────────────────
  # The async-stream / sink-wav / test-utils features are not exercised by
  # any other job (they're off in the default --features feat_<platform>
  # runs), so they can silently bit-rot. This job compiles them together and
  # runs the doctests, which are otherwise never executed in CI.
  feature-combo-doctests:
    name: Feature Combo + Doctests (Linux)
    timeout-minutes: 20
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install PipeWire dev libraries
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Check feature combination (async-stream + sink-wav + test-utils + compose)
        run: cargo check --no-default-features --features feat_linux,async-stream,sink-wav,test-utils,compose

      # rsac-3e24: clippy the optional features under -D warnings. The root lint
      # job lints only feat_<os>, so a lint that fires solely under bridge-zerocopy
      # (e.g. drop_non_drop on the SampleRing path) never gated CI. Lint the full
      # optional-feature set + bridge-zerocopy here.
      - name: Clippy optional features (-D warnings)
        run: |
          cargo clippy --all-targets --no-default-features --features feat_linux,async-stream,sink-wav,test-utils,compose -- -D warnings
          cargo clippy --all-targets --no-default-features --features feat_linux,bridge-zerocopy -- -D warnings

      - name: Run doctests
        # Build doctests with the same feature set so doc examples that touch
        # async-stream / sink-wav / compose APIs are exercised too — the compose
        # module docs carry a `no_run` doctest that must COMPILE here.
        run: cargo test --doc --no-default-features --features feat_linux,async-stream,sink-wav,test-utils,compose

  # ── Feature powerset (cargo-hack, Linux) ───────────────────────────
  # The hand-picked feature-combo-doctests job above checks ONE combination;
  # this checks the POWERSET: async-stream / sink-wav / test-utils /
  # bridge-zerocopy / tracing / compose / cli — and any future features — get
  # covered combinatorially, so a bad pairwise interaction (a cfg that only
  # compiles with one feature on and another off) can't slip through.
  # feat_windows / feat_macos are excluded because their platform deps cannot
  # compile on a Linux runner; feat_linux stays in the powerset, hence the
  # PipeWire headers below.
  feature-powerset:
    name: Feature Powerset (cargo-hack)
    timeout-minutes: 30
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install PipeWire dev libraries
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Install cargo-hack
        uses: taiki-e/install-action@0fd46367812ee04360509b4169d9f659d6892bb2 # v2
        with:
          tool: cargo-hack

      # rsac-0a1f: compose + cli grew the non-excluded feature set to 8, so a
      # FULL powerset is 256 combos — past this job's 30-min budget. --depth 2
      # bounds it to every single feature + every PAIR (37 combos), which is
      # exactly the pairwise-interaction guarantee this job exists to provide.
      - name: Check feature powerset
        run: cargo hack check --feature-powerset --depth 2 --no-dev-deps --exclude-features feat_windows,feat_macos --keep-going

  # ── MSRV check (Rust 1.87, Linux) ───────────────────────────────────
  # Guards rust-version = "1.87" (Cargo.toml:9) from rotting under the pinned
  # 1.95 toolchain: every other job compiles with 1.95.0 (rust-toolchain.toml),
  # so a post-1.87 API creeping into src/ would otherwise surface only for
  # downstream consumers building on the MSRV. This is also the tripwire for
  # new optional deps exceeding the MSRV: --all-features compiles the `compose`
  # deps (rubato + audioadapter-buffers) and the `cli` deps (clap, color-eyre,
  # ctrlc, env_logger), and --all-targets includes the cli-gated bins/examples.
  # RUSTUP_TOOLCHAIN is set at the job level because the
  # repo's rust-toolchain.toml (1.95.0) would otherwise override the installed
  # default for every cargo/rustc invocation, silently un-MSRVing the job.
  msrv:
    name: MSRV Check (Rust 1.87)
    timeout-minutes: 25
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      RUSTUP_TOOLCHAIN: "1.87.0"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      # Same SHA-pinned action commit as the 1.95.0 pins above; the
      # `toolchain` input overrides the ref-derived version with the MSRV.
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # action pin as above; toolchain input = 1.87.0
        with:
          toolchain: "1.87.0"
      # Distinct cache prefix so MSRV (1.87) artifacts never poison the 1.95
      # caches shared by every other job.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: v0-rust-msrv-1-87

      - name: Install PipeWire dev libraries
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Cargo check (MSRV)
        run: cargo check --all-features --all-targets

  # ── docs.rs render gate (cargo doc) ─────────────────────────────────
  # rsac L14(b): Cargo.toml carries a [package.metadata.docs.rs] block
  # (all-features = true, rustdoc-args = ["--cfg", "docsrs"]) but nothing in
  # CI exercised it, so a broken intra-doc link or a `#[cfg_attr(docsrs, …)]`
  # mistake would only surface as a RED docs.rs build *after* publish. This job
  # reproduces the docs.rs invocation as closely as a single Linux runner can:
  #   • --all-features matches docs.rs `all-features = true`. The macOS/Windows
  #     backends are gated `all(target_os = "X", feature = "feat_X")`, so on a
  #     Linux runner they stay cfg-disabled even with every feature on — only
  #     the Linux backend + the non-platform features (async-stream, sink-wav,
  #     test-utils, compose, cli) are documented here — this is also where the
  #     compose deps (rubato + audioadapter-buffers) must build for rustdoc.
  #     (Per-OS rendering is docs.rs's job.)
  #   • RUSTDOCFLAGS="--cfg docsrs -D warnings" turns broken-doc-link / bad-doc
  #     warnings into a hard failure and enables the `docsrs` cfg the metadata
  #     block sets, so `#[cfg_attr(docsrs, doc(...))]` annotations are exercised.
  docs:
    name: Docs (cargo doc, docs.rs config)
    timeout-minutes: 20
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install PipeWire dev libraries
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: cargo doc (no-deps, all-features, docs.rs flags)
        env:
          RUSTDOCFLAGS: "--cfg docsrs -D warnings"
        run: cargo doc --no-deps --all-features

  # ── Supply-chain audit (cargo-deny) ─────────────────────────────────
  # cargo-deny is chosen over cargo-audit because it covers advisories AND
  # license compliance, banned/duplicate crates, and source registries in a
  # single declarative config (deny.toml at the repo root). The initial
  # deny.toml is conservative: hard-fail on security advisories + disallowed
  # licenses, warn-only on duplicate versions so a benign version skew doesn't
  # break CI on day one.
  # ── Module-DAG reverse-edge guard (DAG-004) ─────────────────────────
  # Enforce the layering invariant core -> bridge -> audio -> api -> lib by
  # failing on any NEW reverse import edge (e.g. core importing crate::audio).
  # The one known, tracked exception (core/introspection.rs -> crate::audio for
  # cross-platform enumeration) is allowlisted inside the script. No toolchain
  # needed — it is a pure ripgrep/grep source scan.
  module-dag:
    name: Module DAG (reverse-edge guard)
    timeout-minutes: 5
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Check for reverse module-DAG edges
        run: bash scripts/check-module-dag.sh
      # CI-5 regression guard: prove the scanner still FLAGS a deliberate
      # core->audio reverse edge (catches the guard silently degrading to a
      # false-negative, e.g. a pattern that misses a bare `use crate::audio;`).
      - name: Self-test the module-DAG guard
        run: bash scripts/check-module-dag.sh --self-test

  supply-chain:
    name: Supply Chain (cargo-deny)
    timeout-minutes: 20
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@0fd46367812ee04360509b4169d9f659d6892bb2 # v2
        with:
          tool: cargo-deny

      - name: Run cargo-deny
        run: cargo deny check advisories bans licenses sources

  # ── Version lockstep guard (rsac + 4 bindings) ──────────────────────
  # Enforces the versioning/ABI contract documented in
  # docs/RELEASE_PROCESS.md §"Versioning & ABI contract":
  # rsac and every publishable binding manifest bump in lockstep on a
  # semver tag. This job extracts the [package].version of the root crate
  # and the four binding manifests (rsac-ffi/rsac-napi/rsac-python +
  # rsac-napi/package.json + rsac-python/pyproject.toml) and asserts they
  # all agree.
  #
  #   • On a `vX.Y.Z` tag push it ALSO asserts every version equals the
  #     tag (minus the leading `v`) and HARD-FAILS on any divergence — a
  #     mismatched manifest must never reach a registry. This is the
  #     "CI check that fails if versions diverge from the release tag"
  #     required by the contract.
  #   • On ordinary pushes / PRs it only WARNS (via ::warning::) so a
  #     deliberate mid-cycle skew (e.g. a binding lagging behind the root
  #     crate between releases) does not block day-to-day CI. The hard
  #     gate runs at tag time, which is the point of no return.
  version-lockstep:
    name: Version Lockstep (rsac + bindings)
    timeout-minutes: 5
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Check rsac + binding versions are in lockstep
        shell: bash
        run: |
          set -euo pipefail

          # Extract the first `version = "X.Y.Z"` inside the [package] /
          # [project] section of a TOML manifest. Mirrors the extractor in
          # scripts/bump-version.sh so the two stay in agreement.
          toml_pkg_version() {
            awk '
              /^\[package\][[:space:]]*$/ || /^\[project\][[:space:]]*$/ { in_sec = 1; next }
              /^\[/ { if ($0 !~ /^\[(package|project)\][[:space:]]*$/) in_sec = 0 }
              in_sec && /^[[:space:]]*version[[:space:]]*=[[:space:]]*"[^"]+"[[:space:]]*$/ {
                match($0, /"[^"]+"/); print substr($0, RSTART + 1, RLENGTH - 2); exit
              }
            ' "$1"
          }
          # Top-level (2-space indent) "version" key of a package.json.
          json_top_version() {
            awk '
              /^  "version"[[:space:]]*:[[:space:]]*"[^"]+"[[:space:]]*,?[[:space:]]*$/ {
                colon = index($0, ":"); rest = substr($0, colon + 1)
                match(rest, /"[^"]+"/); print substr(rest, RSTART + 1, RLENGTH - 2); exit
              }
            ' "$1"
          }

          declare -A V
          V[Cargo.toml]=$(toml_pkg_version Cargo.toml)
          V[bindings/rsac-ffi/Cargo.toml]=$(toml_pkg_version bindings/rsac-ffi/Cargo.toml)
          V[bindings/rsac-napi/Cargo.toml]=$(toml_pkg_version bindings/rsac-napi/Cargo.toml)
          V[bindings/rsac-napi/package.json]=$(json_top_version bindings/rsac-napi/package.json)
          V[bindings/rsac-python/Cargo.toml]=$(toml_pkg_version bindings/rsac-python/Cargo.toml)
          V[bindings/rsac-python/pyproject.toml]=$(toml_pkg_version bindings/rsac-python/pyproject.toml)

          echo "Discovered versions:"
          for f in "${!V[@]}"; do
            printf '  %-42s %s\n' "$f" "${V[$f]:-<none>}"
            if [ -z "${V[$f]:-}" ]; then
              echo "::error::could not extract a version from $f"
              exit 1
            fi
          done

          ROOT="${V[Cargo.toml]}"
          DIVERGED=0
          for f in "${!V[@]}"; do
            if [ "${V[$f]}" != "$ROOT" ]; then
              DIVERGED=1
              echo "DIVERGENCE: $f is ${V[$f]}, root Cargo.toml is $ROOT"
            fi
          done

          # rsac-go has no version field — releases are tagged
          # bindings/rsac-go/vX.Y.Z (see docs/RELEASE_PROCESS.md). Nothing
          # to compare in-tree; recorded here so the absence is intentional.
          echo "note: rsac-go carries no manifest version (tagged out-of-band as bindings/rsac-go/vX.Y.Z)"

          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            echo "release tag detected: v${TAG_VERSION} — enforcing lockstep + tag match"
            FAIL=0
            for f in "${!V[@]}"; do
              if [ "${V[$f]}" != "$TAG_VERSION" ]; then
                FAIL=1
                echo "::error::$f version ${V[$f]} does not match release tag v${TAG_VERSION}"
              fi
            done
            if [ "$FAIL" -ne 0 ]; then
              echo "::error::version lockstep violated on release tag — refusing to proceed"
              exit 1
            fi
            echo "OK: all manifests match release tag v${TAG_VERSION}"
          elif [ "$DIVERGED" -ne 0 ]; then
            echo "::warning::rsac + binding versions are not in lockstep (see above). This only HARD-FAILS on a release tag; bump every manifest to match before tagging (scripts/bump-version.sh)."
          else
            echo "OK: rsac + all bindings agree at $ROOT"
          fi
