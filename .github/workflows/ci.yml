name: Cross-Platform Tests

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to test"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - linux
          - macos
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  test-windows:
    if: github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'all'
    runs-on: windows-latest
    env:
      DEBUG: ${{ github.event.inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Windows SDK
        uses: GuillaumeFalourd/setup-windows10-sdk-action@v1.11
        with:
          sdk-version: 18362

      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo tree
          Get-CimInstance Win32_SoundDevice | Format-List *
        shell: pwsh

      - name: Install FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v2

      - name: Download test audio
        run: |
          mkdir -p test_audio
          curl -L "https://ia800901.us.archive.org/23/items/gd70-02-14.early-late.sbd.cotsman.18115.sbeok.shnf/gd70-02-14d1t02.mp3" -o "test_audio/sample.mp3"
        shell: bash

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1

      - name: Run tests
        run: cargo test --verbose
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1

      - name: Build examples
        run: cargo build --examples
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1

      - name: Test audio capture
        run: |
          # Start test tone in background
          Start-Process -NoNewWindow cargo -ArgumentList "run", "--example", "test_tone"

          # Wait a bit for playback to start
          Start-Sleep -Seconds 2

          # Start capturing
          Write-Host "Starting audio capture..."
          cargo run --example test_windows -- --duration 10

          # Verify the captured audio
          if (!(Test-Path "test_capture.wav")) {
              Write-Error "Capture failed - no output file created"
              exit 1
          }

          $capturedSize = (Get-Item "test_capture.wav").Length
          if ($capturedSize -eq 0) {
              Write-Error "Capture failed - output file is empty"
              exit 1
          }

          Write-Host "Successfully captured $capturedSize bytes of audio"

          # Compare audio characteristics
          Write-Host "Captured audio info:"
          ffprobe -v quiet -print_format json -show_streams "test_capture.wav"

          # Generate waveform
          ffmpeg -i "test_capture.wav" -filter_complex "showwavespic=s=640x120" -frames:v 1 "captured_waveform.png"
        shell: pwsh
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1

      - name: Upload test artifacts
        uses: actions/upload-artifact@v3
        with:
          name: audio-test-results
          path: |
            captured_waveform.png
            test_capture.wav
            test_audio/sample.mp3

  test-linux:
    if: github.event.inputs.platform == 'linux' || github.event.inputs.platform == 'all'
    runs-on: ubuntu-latest
    env:
      DEBUG: ${{ github.event.inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo tree

      - name: Install PulseAudio
        run: |
          sudo apt-get update
          sudo apt-get install -y pulseaudio libpulse-dev libasound2-dev

      - name: Start PulseAudio
        run: |
          pulseaudio --start --exit-idle-time=-1
          sleep 2

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Build examples
        run: cargo build --examples

      - name: Test PulseAudio capture from playback
        run: |
          # Start test tone in background
          cargo run --example test_tone &
          PLAYER_PID=$!

          # Wait for playback to start
          sleep 2

          # List audio sources
          echo "Available audio sources:"
          cargo run --example test_pulseaudio -- --list-devices

          # Start capturing
          echo "Starting audio capture..."
          cargo run --example test_pulseaudio -- --duration 10

          # Wait for player to finish
          wait $PLAYER_PID

          # Verify capture
          if [ ! -f "test_capture.wav" ]; then
              echo "Capture failed - no output file created"
              exit 1
          fi

          # Compare audio characteristics
          echo "Captured audio info:"
          ffprobe -v quiet -print_format json -show_streams test_capture.wav

          # Generate waveform
          ffmpeg -i test_capture.wav -filter_complex "showwavespic=s=640x120" -frames:v 1 captured_waveform.png

      - name: Upload Linux test artifacts
        uses: actions/upload-artifact@v3
        with:
          name: linux-audio-test-results
          path: |
            captured_waveform.png
            test_capture.wav
            test_audio/sample.mp3

  test-macos:
    if: github.event.inputs.platform == 'macos' || github.event.inputs.platform == 'all'
    runs-on: macos-latest
    env:
      DEBUG: ${{ github.event.inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo tree

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Build examples
        run: cargo build --examples

      - name: Test CoreAudio capture from playback
        run: |
          # Start test tone in background
          cargo run --example test_tone &
          PLAYER_PID=$!

          # Wait for playback to start
          sleep 2

          # List audio sources
          echo "Available audio sources:"
          cargo run --example test_coreaudio -- --list-devices

          # Start capturing
          echo "Starting audio capture..."
          cargo run --example test_coreaudio -- --duration 10

          # Wait for player to finish
          wait $PLAYER_PID

          # Verify capture
          if [ ! -f "test_capture.wav" ]; then
              echo "Capture failed - no output file created"
              exit 1
          fi

          # Compare audio characteristics
          echo "Captured audio info:"
          ffprobe -v quiet -print_format json -show_streams test_capture.wav

          # Generate waveform
          ffmpeg -i test_capture.wav -filter_complex "showwavespic=s=640x120" -frames:v 1 captured_waveform.png

      - name: Upload macOS test artifacts
        uses: actions/upload-artifact@v3
        with:
          name: macos-audio-test-results
          path: |
            captured_waveform.png
            test_capture.wav
            test_audio/sample.mp3

  clippy:
    if: github.event.inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy check
        run: cargo clippy -- -D warnings

  format:
    if: github.event.inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check
