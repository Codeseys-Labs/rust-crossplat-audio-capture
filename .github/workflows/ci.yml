name: Cross-Platform Tests

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to test'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - linux
          - macos
      debug_enabled:
        description: 'Enable debug output'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  test-windows:
    if: github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'all'
    runs-on: windows-latest
    env:
      DEBUG: ${{ github.event.inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Setup Windows SDK
        uses: GuillaumeFalourd/setup-windows10-sdk-action@v1.11
        with:
          sdk-version: 18362
        
      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo tree
          Get-CimInstance Win32_SoundDevice | Format-List *
          Get-AudioDevice -List
        shell: pwsh
          
      - name: Install Virtual Audio Device
        run: |
          # Download VB-CABLE driver
          Invoke-WebRequest -Uri "https://download.vb-audio.com/Download_CABLE/VBCABLE_Driver_Pack43.zip" -OutFile "VBCABLE.zip"
          Expand-Archive -Path "VBCABLE.zip" -DestinationPath "VBCABLE"
          
          # Install the driver (requires elevation)
          $cert = Get-ChildItem -Path "VBCABLE" -Recurse -Filter "*.cer"
          if ($cert) {
              certutil -addstore "TrustedPublisher" $cert.FullName
          }
          
          $inf = Get-ChildItem -Path "VBCABLE" -Recurse -Filter "*.inf"
          if ($inf) {
              pnputil /add-driver $inf.FullName /install
          }
        shell: pwsh
        
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Build
        run: cargo build --verbose
        env:
          # Ensure we use the right Windows SDK
          WINAPI_NO_BUNDLED_LIBRARIES: 1
        
      - name: Run tests
        run: cargo test --verbose
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1
        
      - name: Build examples
        run: cargo build --examples
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1
        
      - name: Generate test audio
        run: |
          Add-Type -AssemblyName System.Speech
          $speak = New-Object System.Speech.Synthesis.SpeechSynthesizer
          $speak.SetOutputToDefaultAudioDevice()
          $speak.Speak("This is a test audio for WASAPI capture")
        shell: pwsh
        
      - name: Test WASAPI functionality
        run: |
          # List available audio endpoints
          cargo run --example test_windows -- --list-devices
          
          # Try to capture from the virtual audio device
          cargo run --example test_windows -- --device "CABLE Input" --duration 5
          
          # Check if we captured any audio
          if (Test-Path "audio_capture.raw") {
              $size = (Get-Item "audio_capture.raw").Length
              if ($size -eq 0) {
                  Write-Error "No audio was captured"
                  exit 1
              }
              Write-Host "Successfully captured $size bytes of audio"
          } else {
              Write-Error "Audio capture file was not created"
              exit 1
          }
        shell: pwsh
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1

  test-linux:
    if: github.event.inputs.platform == 'linux' || github.event.inputs.platform == 'all'
    runs-on: ubuntu-latest
    env:
      DEBUG: ${{ github.event.inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo tree
          
      - name: Install PulseAudio
        run: |
          sudo apt-get update
          sudo apt-get install -y pulseaudio libpulse-dev
          
      - name: Start PulseAudio
        run: |
          pulseaudio --start --exit-idle-time=-1
          sleep 2
          
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Build
        run: cargo build --verbose
        
      - name: Run tests
        run: cargo test --verbose
        
      - name: Build examples
        run: cargo build --examples
        
      - name: Test PulseAudio functionality
        run: |
          cargo run --example test_pulseaudio -- --help
          # Note: Actual audio capture tests require audio playback

  test-macos:
    if: github.event.inputs.platform == 'macos' || github.event.inputs.platform == 'all'
    runs-on: macos-latest
    env:
      DEBUG: ${{ github.event.inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo tree
          
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Build
        run: cargo build --verbose
        
      - name: Run tests
        run: cargo test --verbose
        
      - name: Build examples
        run: cargo build --examples
        
      - name: Test CoreAudio functionality
        run: |
          cargo run --example test_coreaudio -- --help
          # Note: Actual audio capture tests require screen recording permission

  clippy:
    if: github.event.inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          
      - name: Clippy check
        run: cargo clippy -- -D warnings

  format:
    if: github.event.inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          
      - name: Check formatting
        run: cargo fmt -- --check