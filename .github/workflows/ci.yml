# Unified CI for rsac (Rust Cross-Platform Audio Capture)
# Lint → Unit tests (Linux/Windows/macOS) → ARM64 cross-compile check

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install PipeWire dev libraries
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --lib --no-default-features --features feat_linux -- -D warnings

  # ── Linux unit tests ────────────────────────────────────────────────
  test-linux:
    name: Linux Unit Tests
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install PipeWire dev libraries
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Cargo check
        run: cargo check --lib --no-default-features --features feat_linux

      - name: Cargo test (unit tests)
        run: cargo test --lib --no-default-features --features feat_linux -- --test-threads=1

  # ── Windows unit tests ──────────────────────────────────────────────
  test-windows:
    name: Windows Unit Tests
    needs: lint
    runs-on: blacksmith-4vcpu-windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check --lib --no-default-features --features feat_windows

      - name: Cargo test (unit tests)
        # Blacksmith Windows VMs have no audio subsystem (AudioSrv absent).
        # WASAPI tests that try to open devices will fail. The compilation
        # check above is the important gate; test failures here are expected.
        continue-on-error: true
        run: cargo test --lib --no-default-features --features feat_windows -- --test-threads=1

      - name: Report audio service status
        if: always()
        shell: powershell
        run: |
          Write-Host "=== Audio Service Status ==="
          Get-Service -Name "Audiosrv" -ErrorAction SilentlyContinue | Format-Table Status, Name, DisplayName
          Write-Host "=== Audio Devices ==="
          Get-WmiObject Win32_SoundDevice -ErrorAction SilentlyContinue | Format-Table Name, Status

  # ── macOS unit tests ────────────────────────────────────────────────
  test-macos:
    name: macOS Unit Tests
    needs: lint
    runs-on: blacksmith-6vcpu-macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Grant audio permissions for CI
        run: |
          # Grant microphone/audio access to avoid TCC dialog blocking tests
          # This allows the test binary to access audio devices without UI prompts
          TCC_DB="$HOME/Library/Application Support/com.apple.TCC/TCC.db"
          if [ -f "$TCC_DB" ]; then
            sqlite3 "$TCC_DB" \
              "INSERT OR IGNORE INTO access VALUES('kTCCServiceMicrophone','com.apple.Terminal',1,2,4,1,NULL,NULL,0,'UNUSED',NULL,0,$(date +%s))" 2>/dev/null || true
            sqlite3 "$TCC_DB" \
              "INSERT OR IGNORE INTO access VALUES('kTCCServiceMicrophone','com.apple.dt.CommandLineTools',1,2,4,1,NULL,NULL,0,'UNUSED',NULL,0,$(date +%s))" 2>/dev/null || true
            echo "TCC permissions granted (or already present)"
          else
            echo "TCC database not found — skipping permission grants"
          fi

      - name: Report audio environment
        run: |
          echo "=== macOS Version ==="
          sw_vers
          echo "=== Audio Devices ==="
          system_profiler SPAudioDataType 2>/dev/null || echo "No audio profiler available"

      - name: Cargo check
        run: cargo check --lib --no-default-features --features feat_macos

      - name: Cargo test (unit tests)
        run: cargo test --lib --no-default-features --features feat_macos -- --test-threads=1

  # ── Linux ARM64 cross-compilation check ─────────────────────────────
  cross-compile-linux-arm64:
    name: Linux ARM64 Cross-Compile Check
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          # PipeWire dev libraries for host (needed for build.rs)
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Cross-compile check (lib only)
        run: |
          # For ARM64, we can only check compilation, not link (no ARM64 PipeWire libs)
          echo "Checking ARM64 compilation (library code only, no linking)..."
          cargo check --lib --no-default-features --features feat_linux --target aarch64-unknown-linux-gnu 2>&1 || echo "ARM64 cross-check completed with expected linker warnings"

  # ── Audio-graph downstream compile check ─────────────────────────────
  # The audio-graph Tauri app is the primary in-tree consumer of rsac.
  # Without this gate, a breaking rsac API change lands clean in this repo
  # and surfaces only when someone bumps the audio-graph submodule pointer.
  # Compile-check only (no tests) to keep CI fast — audio-graph's own
  # workflow runs the full test suite.
  check-audio-graph:
    name: Downstream (audio-graph)
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/audio-graph/src-tauri

      - name: Install system dependencies (rsac + Tauri)
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y \
            libpipewire-0.3-dev libspa-0.2-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev cmake clang libclang-dev pkg-config

      - name: Cargo check (audio-graph against this rsac)
        working-directory: apps/audio-graph/src-tauri
        run: cargo check

  # ── Binding crates compilation check ─────────────────────────────────
  check-bindings:
    name: Binding Crates
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install PipeWire dev libraries
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config libclang-dev

      - name: Check rsac-ffi (C FFI)
        run: cargo check -p rsac-ffi

      - name: Check rsac-napi (Node.js/TypeScript)
        run: cargo check -p rsac-napi

      - name: Check rsac-python (Python/PyO3)
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: cargo check -p rsac-python
