name: Rust CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Enable debug output for all workflows"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  lint_and_format:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install PipeWire dev libraries
        run: |
          sudo apt-get update
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev libasound2-dev pkg-config

      - name: Run Clippy
        run: cargo clippy --lib --no-default-features --features feat_linux -- -D warnings

  linux_tests:
    name: Linux PipeWire Tests
    needs: lint_and_format
    uses: ./.github/workflows/linux.yml
    with:
      debug_enabled: ${{ inputs.debug_enabled || false }}

  windows_tests:
    name: Windows WASAPI Tests
    needs: lint_and_format
    uses: ./.github/workflows/windows.yml
    with:
      debug_enabled: ${{ inputs.debug_enabled || false }}

  unit_tests:
    name: Unit Tests (All Platforms)
    needs: lint_and_format
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            features: feat_linux
            setup: |
              sudo apt-get update
              sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
              sudo apt-get update
              sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config
          - os: windows-latest
            features: feat_windows
            setup: echo "No additional setup needed for Windows"
          - os: macos-latest
            features: feat_macos
            setup: echo "No additional setup needed for macOS"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Platform setup
        run: ${{ matrix.setup }}
        shell: bash

      - name: Run unit tests
        run: cargo test --lib --no-default-features --features ${{ matrix.features }}

  coverage:
    name: Code Coverage
    needs: lint_and_format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install PipeWire dev libraries
        run: |
          sudo apt-get update
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --version 0.27.3

      - name: Generate code coverage
        run: cargo tarpaulin --features feat_linux --workspace --out Lcov --output-dir coverage/ --run-types Tests Lib

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
