# Unified CI for rsac (Rust Cross-Platform Audio Capture)
# Lint → Unit tests (Linux/Windows/macOS) → ARM64 cross-compile check

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Least-privilege token: this workflow only builds/tests, never writes.
permissions:
  contents: read

# Cancel superseded runs on the same ref (saves runner minutes on PR pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Lint (clippy matrix across all 3 OS) ────────────────────────────
  lint:
    name: Lint & Format (${{ matrix.feature }})
    timeout-minutes: 20
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: blacksmith-4vcpu-ubuntu-2404
            feature: feat_linux
            os: linux
          - runner: blacksmith-4vcpu-windows-2025
            feature: feat_windows
            os: windows
          - runner: blacksmith-6vcpu-macos-15
            feature: feat_macos
            os: macos
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install PipeWire dev libraries
        if: matrix.os == 'linux'
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      # rustfmt is platform-independent; run the check once on the Linux leg.
      - name: Check formatting
        if: matrix.os == 'linux'
        run: cargo fmt --all -- --check

      # rsac L14(a): clippy now lints --all-targets (lib + bins + examples +
      # tests + benches) for the active platform, so example/test/bench code is
      # held to the same -D warnings bar as the library and demo binaries —
      # previously they were exempt and could accumulate lint debt silently.
      - name: Run Clippy
        run: cargo clippy --all-targets --no-default-features --features ${{ matrix.feature }} -- -D warnings

  # ── Linux unit tests ────────────────────────────────────────────────
  test-linux:
    name: Linux Unit Tests
    timeout-minutes: 25
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install PipeWire dev libraries
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Cargo check
        run: cargo check --lib --no-default-features --features feat_linux

      # Build every target (bin/ + examples/), not just the lib, so demo
      # binaries and examples are compiled and kept from bit-rotting.
      - name: Build all targets
        run: cargo build --all-targets --no-default-features --features feat_linux

      - name: Cargo test (unit tests)
        run: cargo test --lib --no-default-features --features feat_linux

  # ── Windows unit tests ──────────────────────────────────────────────
  test-windows:
    name: Windows Unit Tests
    timeout-minutes: 25
    needs: lint
    runs-on: blacksmith-4vcpu-windows-2025
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Cargo check
        run: cargo check --lib --no-default-features --features feat_windows

      # Build every target (bin/ + examples/), not just the lib.
      - name: Build all targets
        run: cargo build --all-targets --no-default-features --features feat_windows

      - name: Cargo test (unit tests)
        # Blacksmith Windows VMs have no audio subsystem (AudioSrv absent).
        # WASAPI tests that try to open devices will fail. The compilation
        # check above is the important gate; test failures here are expected.
        continue-on-error: true
        run: cargo test --lib --no-default-features --features feat_windows

      - name: Report audio service status
        if: always()
        shell: powershell
        run: |
          Write-Host "=== Audio Service Status ==="
          Get-Service -Name "Audiosrv" -ErrorAction SilentlyContinue | Format-Table Status, Name, DisplayName
          Write-Host "=== Audio Devices ==="
          Get-WmiObject Win32_SoundDevice -ErrorAction SilentlyContinue | Format-Table Name, Status

  # ── macOS unit tests ────────────────────────────────────────────────
  test-macos:
    name: macOS Unit Tests
    timeout-minutes: 25
    needs: lint
    runs-on: blacksmith-6vcpu-macos-15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Grant audio permissions for CI
        run: |
          # Grant microphone/audio access to avoid TCC dialog blocking tests
          # This allows the test binary to access audio devices without UI prompts
          TCC_DB="$HOME/Library/Application Support/com.apple.TCC/TCC.db"
          if [ -f "$TCC_DB" ]; then
            sqlite3 "$TCC_DB" \
              "INSERT OR IGNORE INTO access VALUES('kTCCServiceMicrophone','com.apple.Terminal',1,2,4,1,NULL,NULL,0,'UNUSED',NULL,0,$(date +%s))" 2>/dev/null || true
            sqlite3 "$TCC_DB" \
              "INSERT OR IGNORE INTO access VALUES('kTCCServiceMicrophone','com.apple.dt.CommandLineTools',1,2,4,1,NULL,NULL,0,'UNUSED',NULL,0,$(date +%s))" 2>/dev/null || true
            echo "TCC permissions granted (or already present)"
          else
            echo "TCC database not found — skipping permission grants"
          fi

      - name: Report audio environment
        run: |
          echo "=== macOS Version ==="
          sw_vers
          echo "=== Audio Devices ==="
          system_profiler SPAudioDataType 2>/dev/null || echo "No audio profiler available"

      - name: Cargo check
        run: cargo check --lib --no-default-features --features feat_macos

      # Build every target (bin/ + examples/), not just the lib.
      - name: Build all targets
        run: cargo build --all-targets --no-default-features --features feat_macos

      - name: Cargo test (unit tests)
        run: cargo test --lib --no-default-features --features feat_macos

      # OPTION B (existence check): Blacksmith macOS runners lack TCC grants for
      # Process Tap capture (see macos-process job in ci-audio-tests.yml —
      # continue-on-error with "Process Tap expected to skip due to TCC in CI").
      # Rather than add a known-failing step, we assert the ignored tests exist
      # and are discoverable by the harness. This catches regressions where the
      # tests get deleted, renamed, or fail to compile — the common failure
      # modes that a wiring check meaningfully guards against.
      - name: Verify ApplicationByName + ApplicationByPID tests are wired up
        timeout-minutes: 5
        run: |
          cargo test --test ci_audio --no-default-features --features feat_macos \
            -- --list --ignored 2>&1 | tee ci-audio-ignored.log
          grep -q "application_by_name" ci-audio-ignored.log || {
            echo "FAIL: application_by_name tests not discovered in ignored test list"
            exit 1
          }
          grep -q "application_by_pid" ci-audio-ignored.log || {
            echo "FAIL: application_by_pid tests not discovered in ignored test list"
            exit 1
          }
          echo "OK: application_by_{name,pid} tests are wired up (ignored, not run in CI — TCC unavailable on Blacksmith macOS)"

      # Existence check for subscribe + process_tree coverage added in
      # loop-18 task #3. These are NOT #[ignore]d — they use require_audio!()
      # to skip at runtime — so we list the full (non-ignored) suite and
      # grep for the module names. Keeps the wiring-regression guard in
      # lockstep with the application_by_{name,pid} pattern above.
      - name: Verify subscribe + process_tree tests are wired up
        timeout-minutes: 5
        run: |
          cargo test --test ci_audio --no-default-features --features feat_macos \
            -- --list 2>&1 | tee ci-audio-all.log
          grep -q "subscribe" ci-audio-all.log || {
            echo "FAIL: subscribe tests not discovered in test list"
            exit 1
          }
          grep -q "process_tree" ci-audio-all.log || {
            echo "FAIL: process_tree tests not discovered in test list"
            exit 1
          }
          echo "OK: subscribe + process_tree tests are wired up"

  # ── Linux ARM64 cross-compilation check ─────────────────────────────
  cross-compile-linux-arm64:
    name: Linux ARM64 Cross-Compile Check
    timeout-minutes: 20
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          # PipeWire dev libraries for host (needed for build.rs)
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Cross-compile check (lib only)
        run: |
          # ARM64 cross-check. We do NOT install :arm64 PipeWire dev packages:
          # the pipewire-debian PPA does not publish arm64 binaries, so apt
          # would fail. Instead we run `cargo check` (compile-only, no link) and
          # turn it into a *real* gate by failing on genuine rustc errors while
          # tolerating expected link/pkg-config noise. Errors are detected by
          # grepping the captured output for `error[` / `error:` — a rustc
          # error there fails the job (unlike the old `|| echo` mask, which
          # could never fail).
          set -o pipefail
          echo "Checking ARM64 compilation (library code only, no linking)..."
          cargo check --lib --no-default-features --features feat_linux \
            --target aarch64-unknown-linux-gnu 2>&1 | tee arm64-check.log || true
          if grep -E 'error(\[|:)' arm64-check.log; then
            echo "FAIL: rustc reported compilation errors for aarch64-unknown-linux-gnu"
            exit 1
          fi
          echo "OK: ARM64 cross-check produced no rustc compilation errors"

  # ── Binding crates compilation check ─────────────────────────────────
  check-bindings:
    name: Binding Crates
    timeout-minutes: 20
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install PipeWire dev libraries
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config libclang-dev

      - name: Check rsac-ffi (C FFI)
        run: cargo check -p rsac-ffi

      - name: Check rsac-napi (Node.js/TypeScript)
        run: cargo check -p rsac-napi

      - name: Check rsac-python (Python/PyO3)
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: cargo check -p rsac-python

  # ── Feature-combo compile + doctests (Linux) ────────────────────────
  # The async-stream / sink-wav / test-utils features are not exercised by
  # any other job (they're off in the default --features feat_<platform>
  # runs), so they can silently bit-rot. This job compiles them together and
  # runs the doctests, which are otherwise never executed in CI.
  feature-combo-doctests:
    name: Feature Combo + Doctests (Linux)
    timeout-minutes: 20
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install PipeWire dev libraries
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Check feature combination (async-stream + sink-wav + test-utils)
        run: cargo check --no-default-features --features feat_linux,async-stream,sink-wav,test-utils

      - name: Run doctests
        # Build doctests with the same feature set so doc examples that touch
        # async-stream / sink-wav APIs are exercised too.
        run: cargo test --doc --no-default-features --features feat_linux,async-stream,sink-wav,test-utils

  # ── docs.rs render gate (cargo doc) ─────────────────────────────────
  # rsac L14(b): Cargo.toml carries a [package.metadata.docs.rs] block
  # (all-features = true, rustdoc-args = ["--cfg", "docsrs"]) but nothing in
  # CI exercised it, so a broken intra-doc link or a `#[cfg_attr(docsrs, …)]`
  # mistake would only surface as a RED docs.rs build *after* publish. This job
  # reproduces the docs.rs invocation as closely as a single Linux runner can:
  #   • --all-features matches docs.rs `all-features = true`. The macOS/Windows
  #     backends are gated `all(target_os = "X", feature = "feat_X")`, so on a
  #     Linux runner they stay cfg-disabled even with every feature on — only
  #     the Linux backend + the non-platform features (async-stream, sink-wav,
  #     test-utils) are documented here. (Per-OS rendering is docs.rs's job.)
  #   • RUSTDOCFLAGS="--cfg docsrs -D warnings" turns broken-doc-link / bad-doc
  #     warnings into a hard failure and enables the `docsrs` cfg the metadata
  #     block sets, so `#[cfg_attr(docsrs, doc(...))]` annotations are exercised.
  docs:
    name: Docs (cargo doc, docs.rs config)
    timeout-minutes: 20
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install PipeWire dev libraries
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: cargo doc (no-deps, all-features, docs.rs flags)
        env:
          RUSTDOCFLAGS: "--cfg docsrs -D warnings"
        run: cargo doc --no-deps --all-features

  # ── Supply-chain audit (cargo-deny) ─────────────────────────────────
  # cargo-deny is chosen over cargo-audit because it covers advisories AND
  # license compliance, banned/duplicate crates, and source registries in a
  # single declarative config (deny.toml at the repo root). The initial
  # deny.toml is conservative: hard-fail on security advisories + disallowed
  # licenses, warn-only on duplicate versions so a benign version skew doesn't
  # break CI on day one.
  supply-chain:
    name: Supply Chain (cargo-deny)
    timeout-minutes: 20
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@0fd46367812ee04360509b4169d9f659d6892bb2 # v2
        with:
          tool: cargo-deny

      - name: Run cargo-deny
        run: cargo deny check advisories bans licenses sources

  # ── Version lockstep guard (rsac + 4 bindings) ──────────────────────
  # Enforces the versioning/ABI contract documented in
  # docs/RELEASE_PROCESS.md §"Versioning & ABI contract":
  # rsac and every publishable binding manifest bump in lockstep on a
  # semver tag. This job extracts the [package].version of the root crate
  # and the four binding manifests (rsac-ffi/rsac-napi/rsac-python +
  # rsac-napi/package.json + rsac-python/pyproject.toml) and asserts they
  # all agree.
  #
  #   • On a `vX.Y.Z` tag push it ALSO asserts every version equals the
  #     tag (minus the leading `v`) and HARD-FAILS on any divergence — a
  #     mismatched manifest must never reach a registry. This is the
  #     "CI check that fails if versions diverge from the release tag"
  #     required by the contract.
  #   • On ordinary pushes / PRs it only WARNS (via ::warning::) so a
  #     deliberate mid-cycle skew (e.g. a binding lagging behind the root
  #     crate between releases) does not block day-to-day CI. The hard
  #     gate runs at tag time, which is the point of no return.
  version-lockstep:
    name: Version Lockstep (rsac + bindings)
    timeout-minutes: 5
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Check rsac + binding versions are in lockstep
        shell: bash
        run: |
          set -euo pipefail

          # Extract the first `version = "X.Y.Z"` inside the [package] /
          # [project] section of a TOML manifest. Mirrors the extractor in
          # scripts/bump-version.sh so the two stay in agreement.
          toml_pkg_version() {
            awk '
              /^\[package\][[:space:]]*$/ || /^\[project\][[:space:]]*$/ { in_sec = 1; next }
              /^\[/ { if ($0 !~ /^\[(package|project)\][[:space:]]*$/) in_sec = 0 }
              in_sec && /^[[:space:]]*version[[:space:]]*=[[:space:]]*"[^"]+"[[:space:]]*$/ {
                match($0, /"[^"]+"/); print substr($0, RSTART + 1, RLENGTH - 2); exit
              }
            ' "$1"
          }
          # Top-level (2-space indent) "version" key of a package.json.
          json_top_version() {
            awk '
              /^  "version"[[:space:]]*:[[:space:]]*"[^"]+"[[:space:]]*,?[[:space:]]*$/ {
                colon = index($0, ":"); rest = substr($0, colon + 1)
                match(rest, /"[^"]+"/); print substr(rest, RSTART + 1, RLENGTH - 2); exit
              }
            ' "$1"
          }

          declare -A V
          V[Cargo.toml]=$(toml_pkg_version Cargo.toml)
          V[bindings/rsac-ffi/Cargo.toml]=$(toml_pkg_version bindings/rsac-ffi/Cargo.toml)
          V[bindings/rsac-napi/Cargo.toml]=$(toml_pkg_version bindings/rsac-napi/Cargo.toml)
          V[bindings/rsac-napi/package.json]=$(json_top_version bindings/rsac-napi/package.json)
          V[bindings/rsac-python/Cargo.toml]=$(toml_pkg_version bindings/rsac-python/Cargo.toml)
          V[bindings/rsac-python/pyproject.toml]=$(toml_pkg_version bindings/rsac-python/pyproject.toml)

          echo "Discovered versions:"
          for f in "${!V[@]}"; do
            printf '  %-42s %s\n' "$f" "${V[$f]:-<none>}"
            if [ -z "${V[$f]:-}" ]; then
              echo "::error::could not extract a version from $f"
              exit 1
            fi
          done

          ROOT="${V[Cargo.toml]}"
          DIVERGED=0
          for f in "${!V[@]}"; do
            if [ "${V[$f]}" != "$ROOT" ]; then
              DIVERGED=1
              echo "DIVERGENCE: $f is ${V[$f]}, root Cargo.toml is $ROOT"
            fi
          done

          # rsac-go has no version field — releases are tagged
          # bindings/rsac-go/vX.Y.Z (see docs/RELEASE_PROCESS.md). Nothing
          # to compare in-tree; recorded here so the absence is intentional.
          echo "note: rsac-go carries no manifest version (tagged out-of-band as bindings/rsac-go/vX.Y.Z)"

          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            echo "release tag detected: v${TAG_VERSION} — enforcing lockstep + tag match"
            FAIL=0
            for f in "${!V[@]}"; do
              if [ "${V[$f]}" != "$TAG_VERSION" ]; then
                FAIL=1
                echo "::error::$f version ${V[$f]} does not match release tag v${TAG_VERSION}"
              fi
            done
            if [ "$FAIL" -ne 0 ]; then
              echo "::error::version lockstep violated on release tag — refusing to proceed"
              exit 1
            fi
            echo "OK: all manifests match release tag v${TAG_VERSION}"
          elif [ "$DIVERGED" -ne 0 ]; then
            echo "::warning::rsac + binding versions are not in lockstep (see above). This only HARD-FAILS on a release tag; bump every manifest to match before tagging (scripts/bump-version.sh)."
          else
            echo "OK: rsac + all bindings agree at $ROOT"
          fi
