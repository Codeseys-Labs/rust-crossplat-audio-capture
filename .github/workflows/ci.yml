# Rust Cross-Platform Audio Capture CI
# Focus: Real-world integration tests with VLC audio capture
# Platforms: Linux (PipeWire), Windows (WASAPI)
# macOS (CoreAudio) is incomplete and checked separately

name: Rust CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Enable debug output for all workflows"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # Quick lint check before running expensive tests
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install PipeWire dev libraries
        run: |
          sudo apt-get update
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev libasound2-dev pkg-config

      - name: Run Clippy
        run: cargo clippy --lib --no-default-features --features feat_linux -- -D warnings

  # PRIMARY TEST: Linux PipeWire integration test with real VLC audio capture
  linux_integration:
    name: Linux PipeWire Integration Test
    needs: lint
    uses: ./.github/workflows/linux.yml
    with:
      debug_enabled: ${{ inputs.debug_enabled || false }}

  # PRIMARY TEST: Windows WASAPI integration test with real VLC audio capture
  windows_integration:
    name: Windows WASAPI Integration Test
    needs: lint
    uses: ./.github/workflows/windows.yml
    with:
      debug_enabled: ${{ inputs.debug_enabled || false }}

  # macOS compilation check (incomplete implementation)
  macos_check:
    name: macOS Compilation Check
    needs: lint
    runs-on: macos-latest
    continue-on-error: true  # Allow failure - implementation incomplete
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check library compilation
        run: cargo check --lib --no-default-features --features feat_macos
