name: Cross-Platform Tests

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to test"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - linux
          - macos
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  test-windows:
    if: github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'all'
    runs-on: windows-latest
    env:
      DEBUG: ${{ github.event.inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Windows SDK
        uses: GuillaumeFalourd/setup-windows10-sdk-action@v1.11
        with:
          sdk-version: 18362

      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo tree
          Get-CimInstance Win32_SoundDevice | Format-List *
        shell: pwsh

      - name: Download test audio
        run: |
          mkdir -p test_audio
          curl -L "https://ia800901.us.archive.org/23/items/gd70-02-14.early-late.sbd.cotsman.18115.sbeok.shnf/gd70-02-14d1t02.mp3" -o "test_audio/sample.mp3"
        shell: bash

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1

      - name: Run tests
        run: cargo test --verbose
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1

      - name: Build examples
        run: cargo build --examples
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1

      - name: Test audio capture
        run: |
          # Start test tone in background
          $testTone = Start-Process -NoNewWindow cargo -ArgumentList "run", "--example", "test_tone" -PassThru

          try {
              # Wait a bit for playback to start
              Start-Sleep -Seconds 2

              # Start capturing
              Write-Host "Starting audio capture..."
              cargo run --example test_windows -- --duration 10

              # Verify the captured audio
              if (!(Test-Path "test_capture.wav")) {
                  throw "Capture failed - no output file created"
              }

              $capturedSize = (Get-Item "test_capture.wav").Length
              if ($capturedSize -eq 0) {
                  throw "Capture failed - output file is empty"
              }

              Write-Host "Successfully captured $capturedSize bytes of audio"
          }
          finally {
              # Clean up test process
              if ($testTone) {
                  Stop-Process -Id $testTone.Id -Force -ErrorAction SilentlyContinue
              }
          }
        shell: pwsh
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1

      - name: Upload test artifacts
        uses: actions/upload-artifact@v3
        with:
          name: windows-audio-test-results
          path: |
            test_capture.wav
            test_audio/sample.mp3

  test-linux:
    if: github.event.inputs.platform == 'linux' || github.event.inputs.platform == 'all'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        audio_system: [pipewire, pulseaudio]
    env:
      DEBUG: ${{ github.event.inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo tree

      - name: Setup PipeWire
        if: matrix.audio_system == 'pipewire'
        run: |
          sudo apt-get update
          sudo apt-get install -y pipewire pipewire-pulse pipewire-audio wireplumber

          # Stop PulseAudio if running
          pulseaudio --kill || true

          # Configure PipeWire
          mkdir -p ~/.config/pipewire
          echo "context.properties = {
            default.clock.rate = 44100
            default.clock.quantum = 1024
            default.clock.min-quantum = 32
            default.clock.max-quantum = 8192
          }" > ~/.config/pipewire/pipewire.conf

          # Start PipeWire
          systemctl --user daemon-reload
          systemctl --user restart pipewire pipewire-pulse

          # Wait for system to initialize
          sleep 5

          # Verify PipeWire is running
          pw-cli info
          pactl info

      - name: Setup PulseAudio
        if: matrix.audio_system == 'pulseaudio'
        run: |
          sudo apt-get update
          sudo apt-get install -y pulseaudio libpulse-dev libasound2-dev

          # Stop any existing audio services
          systemctl --user stop pipewire pipewire-pulse || true
          pulseaudio --kill || true

          # Configure PulseAudio
          mkdir -p ~/.config/pulse
          echo "default-sample-rate = 44100
          default-fragments = 4
          default-fragment-size-msec = 25
          exit-idle-time = -1
          load-module module-native-protocol-tcp auth-anonymous=1
          load-module module-null-sink sink_name=test_sink" > ~/.config/pulse/daemon.conf

          # Start PulseAudio
          pulseaudio --start --exit-idle-time=-1 --daemon

          # Wait for system to initialize
          sleep 5

          # Verify PulseAudio is running
          pactl info

      - name: Download test audio
        run: |
          mkdir -p test_audio
          curl -L "https://ia800901.us.archive.org/23/items/gd70-02-14.early-late.sbd.cotsman.18115.sbeok.shnf/gd70-02-14d1t02.mp3" -o "test_audio/sample.mp3"

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Build examples
        run: cargo build --examples

      - name: Test Audio Capture
        run: |
          # Start test tone in background
          cargo run --example test_tone &
          PLAYER_PID=$!

          # Ensure cleanup on exit
          trap "kill $PLAYER_PID 2>/dev/null || true" EXIT

          # Wait for playback to start
          sleep 2

          # Start capturing
          echo "Starting audio capture with ${{ matrix.audio_system }}..."
          cargo run --example test_pulseaudio -- --duration 10

          # Verify capture
          if [ ! -f "test_capture.wav" ]; then
              echo "Capture failed - no output file created"
              exit 1
          fi

          FILESIZE=$(stat --format="%s" "test_capture.wav")
          if [ "$FILESIZE" -eq 0 ]; then
              echo "Capture failed - output file is empty"
              exit 1
          fi

          echo "Successfully captured $FILESIZE bytes of audio using ${{ matrix.audio_system }}"

      - name: Upload Linux test artifacts
        uses: actions/upload-artifact@v3
        with:
          name: linux-${{ matrix.audio_system }}-test-results
          path: |
            test_capture.wav
            test_audio/sample.mp3

  test-macos:
    if: github.event.inputs.platform == 'macos' || github.event.inputs.platform == 'all'
    runs-on: macos-latest
    env:
      DEBUG: ${{ github.event.inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo tree

      - name: Setup Audio
        run: |
          # Create virtual audio device
          brew install blackhole-2ch

          # List audio devices
          system_profiler SPAudioDataType

      - name: Download test audio
        run: |
          mkdir -p test_audio
          curl -L "https://ia800901.us.archive.org/23/items/gd70-02-14.early-late.sbd.cotsman.18115.sbeok.shnf/gd70-02-14d1t02.mp3" -o "test_audio/sample.mp3"

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Build examples
        run: cargo build --examples

      - name: Test CoreAudio capture
        run: |
          # Start test tone in background
          cargo run --example test_tone &
          PLAYER_PID=$!

          # Ensure cleanup on exit
          trap "kill $PLAYER_PID 2>/dev/null || true" EXIT

          # Wait for playback to start
          sleep 2

          # Start capturing
          echo "Starting audio capture..."
          cargo run --example test_coreaudio -- --duration 10

          # Verify capture
          if [ ! -f "test_capture.wav" ]; then
              echo "Capture failed - no output file created"
              exit 1
          fi

          FILESIZE=$(stat -f%z "test_capture.wav")
          if [ "$FILESIZE" -eq 0 ]; then
              echo "Capture failed - output file is empty"
              exit 1
          fi

          echo "Successfully captured $FILESIZE bytes of audio"

      - name: Upload macOS test artifacts
        uses: actions/upload-artifact@v3
        with:
          name: macos-audio-test-results
          path: |
            test_capture.wav
            test_audio/sample.mp3

  clippy:
    if: github.event.inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy check
        run: cargo clippy -- -D warnings

  format:
    if: github.event.inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check
