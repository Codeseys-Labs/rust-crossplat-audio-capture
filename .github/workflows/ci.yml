name: Cross-Platform Tests

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to test'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - linux
          - macos
      debug_enabled:
        description: 'Enable debug output'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  test-windows:
    if: github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'all'
    runs-on: windows-latest
    env:
      DEBUG: ${{ github.event.inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Setup Windows SDK
        uses: GuillaumeFalourd/setup-windows10-sdk-action@v1.11
        with:
          sdk-version: 18362
        
      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo tree
          Get-CimInstance Win32_SoundDevice | Format-List *
          Get-AudioDevice -List
        shell: pwsh
          
      - name: Install FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v2
        
      - name: Download test audio
        run: |
          mkdir -p test_audio
          curl -L "https://ia800901.us.archive.org/23/items/gd70-02-14.early-late.sbd.cotsman.18115.sbeok.shnf/gd70-02-14d1t02.mp3" -o "test_audio/sample.mp3"
          ffmpeg -i "test_audio/sample.mp3" -ar 48000 -ac 2 -acodec pcm_f32le -t 30 "test_audio/sample.wav"
          # Print audio info
          ffprobe -v quiet -print_format json -show_streams "test_audio/sample.mp3"
        shell: bash
        
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Build
        run: cargo build --verbose
        env:
          # Ensure we use the right Windows SDK
          WINAPI_NO_BUNDLED_LIBRARIES: 1
        
      - name: Run tests
        run: cargo test --verbose
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1
        
      - name: Build examples
        run: cargo build --examples
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1
        
      - name: Test audio file processing
        run: |
          # Test WAV file reading
          cargo run --example wav_demo -- test_audio/sample.wav
          
          # Test audio format conversion
          cargo run --example test_windows -- --file test_audio/sample.wav --format s16le --output converted.raw
          
          # Verify output
          if (!(Test-Path "converted.raw")) {
              Write-Error "Conversion failed - output file not created"
              exit 1
          }
          
          $size = (Get-Item "converted.raw").Length
          if ($size -eq 0) {
              Write-Error "Conversion failed - output file is empty"
              exit 1
          }
          
          Write-Host "Successfully processed $size bytes of audio"
          
          # Test format conversion back to WAV
          cargo run --example test_windows -- --file converted.raw --format s16le --output final.wav --to-wav
          
          # Verify final WAV
          if (!(Test-Path "final.wav")) {
              Write-Error "WAV conversion failed - output file not created"
              exit 1
          }
          
          # Compare audio characteristics
          $originalInfo = ffprobe -v quiet -print_format json -show_streams test_audio/sample.wav
          $finalInfo = ffprobe -v quiet -print_format json -show_streams final.wav
          
          Write-Host "Original audio info:"
          Write-Host $originalInfo
          Write-Host "Converted audio info:"
          Write-Host $finalInfo
        shell: pwsh
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1

  test-linux:
    if: github.event.inputs.platform == 'linux' || github.event.inputs.platform == 'all'
    runs-on: ubuntu-latest
    env:
      DEBUG: ${{ github.event.inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo tree
          
      - name: Install PulseAudio
        run: |
          sudo apt-get update
          sudo apt-get install -y pulseaudio libpulse-dev
          
      - name: Start PulseAudio
        run: |
          pulseaudio --start --exit-idle-time=-1
          sleep 2
          
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Build
        run: cargo build --verbose
        
      - name: Run tests
        run: cargo test --verbose
        
      - name: Build examples
        run: cargo build --examples
        
      - name: Test PulseAudio functionality
        run: |
          cargo run --example test_pulseaudio -- --help
          # Note: Actual audio capture tests require audio playback

  test-macos:
    if: github.event.inputs.platform == 'macos' || github.event.inputs.platform == 'all'
    runs-on: macos-latest
    env:
      DEBUG: ${{ github.event.inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo tree
          
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Build
        run: cargo build --verbose
        
      - name: Run tests
        run: cargo test --verbose
        
      - name: Build examples
        run: cargo build --examples
        
      - name: Test CoreAudio functionality
        run: |
          cargo run --example test_coreaudio -- --help
          # Note: Actual audio capture tests require screen recording permission

  clippy:
    if: github.event.inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          
      - name: Clippy check
        run: cargo clippy -- -D warnings

  format:
    if: github.event.inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          
      - name: Check formatting
        run: cargo fmt -- --check