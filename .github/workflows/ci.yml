name: Rust CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint_and_format_checks:
    name: Lint and Format Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal # Minimal profile is sufficient for linting
          override: true

      - name: Cache Cargo registry and build outputs
        uses: Swatinem/rust-cache@v2 # Cache for clippy if it resolves dependencies

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install PipeWire dev libraries for linting
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Run Clippy on all platforms
        run: |
          cargo clippy --features feat_linux --all-targets -- -D warnings
          cargo clippy --features feat_windows --all-targets -- -D warnings  
          cargo clippy --features feat_macos --all-targets -- -D warnings

  build_and_test:
    needs: lint_and_format_checks # Depends on the lint job
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PipeWire dev libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Install Rust stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo registry and build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build platform-specific features
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            cargo build --features feat_linux --verbose
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            cargo build --features feat_windows --verbose
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            cargo build --features feat_macos --verbose
          fi
        shell: bash

      - name: Run platform-specific tests
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            cargo test --features feat_linux --verbose
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            cargo test --features feat_windows --verbose
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            cargo test --features feat_macos --verbose
          fi
        shell: bash

  pipewire_linux_test:
    name: PipeWire Linux Tests
    needs: lint_and_format_checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install PipeWire
        run: |
          sudo apt-get update
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y \
            pipewire \
            pipewire-audio-client-libraries \
            pipewire-pulse \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            pkg-config

      - name: Build PipeWire-only features
        run: cargo build --no-default-features --features feat_linux --verbose

      - name: Test PipeWire audio capture
        run: |
          systemctl --user --now enable pipewire.service
          sleep 2
          cargo run --example test_capture --features feat_linux -- --duration 3 --output pipewire_test.wav || echo "Test completed"

  enhanced_windows_tests:
    name: Enhanced Windows WASAPI Tests
    needs: lint_and_format_checks
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Windows-only features
        run: cargo build --no-default-features --features feat_windows --verbose
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1

      - name: Test Enhanced WASAPI Device Enumeration
        run: |
          Write-Host "Testing enhanced WASAPI device enumeration with wasapi-rs optimizations..."
          Write-Host "VecDeque buffering, process tree support, and improved error handling"
          cargo run --example windows_device_test --features feat_windows
        shell: pwsh
        env:
          WINAPI_NO_BUNDLED_LIBRARIES: 1
  coverage:
    name: Code Coverage
    needs: lint_and_format_checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install PipeWire dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --version 0.27.3

      - name: Generate code coverage (Linux only)
        run: cargo tarpaulin --features feat_linux --workspace --out Lcov --output-dir coverage/ --run-types Tests Lib

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
