name: Linux PipeWire Tests

on:
  workflow_call:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  DEBIAN_FRONTEND: noninteractive

jobs:
  test-linux-pipewire:
    runs-on: ubuntu-latest
    env:
      DEBUG: ${{ inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo tree

      - name: Configure System
        run: |
          # Prevent needrestart prompts
          sudo sed -i 's/#$nrconf{restart} = '"'"'i'"'"';/$nrconf{restart} = '"'"'a'"'"';/g' /etc/needrestart/needrestart.conf

      - name: Install PipeWire
        run: |
          sudo apt-get update

          # Add PipeWire PPA and update
          echo "Adding PipeWire PPA..."
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update

          # Add WirePlumber PPA
          echo "Adding WirePlumber PPA..."
          sudo add-apt-repository ppa:pipewire-debian/wireplumber-upstream -y
          sudo apt-get update

          # Install PipeWire and development packages (NO PulseAudio)
          echo "Installing PipeWire packages..."
          sudo apt-get install -y \
            pipewire \
            pipewire-audio-client-libraries \
            pipewire-pulse \
            libpipewire-0.3-dev \
            libpipewire-0.3-modules \
            libspa-0.2-dev \
            wireplumber \
            libasound2-dev \
            pkg-config

      - name: Disable PulseAudio (if exists)
        run: |
          systemctl --user --now disable pulseaudio.service pulseaudio.socket || true
          pulseaudio --kill || true

      - name: Start PipeWire Services
        run: |
          # Reload systemd daemon
          systemctl --user daemon-reload

          # Start services in order
          echo "Starting WirePlumber..."
          systemctl --user --now enable wireplumber.service
          sleep 2

          echo "Starting PipeWire..."
          systemctl --user --now enable pipewire.service
          sleep 2

          echo "Starting PipeWire PulseAudio compatibility..."
          systemctl --user --now enable pipewire-pulse.service
          sleep 2

      - name: Verify PipeWire Setup
        run: |
          echo "=== WirePlumber Status ==="
          systemctl --user status wireplumber || true

          echo "=== PipeWire Status ==="
          systemctl --user status pipewire || true

          echo "=== PipeWire-Pulse Status ==="
          systemctl --user status pipewire-pulse || true

          echo "=== PipeWire Info ==="
          pw-cli info || true

          echo "=== Audio Info ==="
          pactl info || true

      - name: Download test audio
        run: |
          mkdir -p test_audio
          curl -L "https://ia800901.us.archive.org/23/items/gd70-02-14.early-late.sbd.cotsman.18115.sbeok.shnf/gd70-02-14d1t02.mp3" -o "test_audio/sample.mp3"

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build PipeWire-only
        run: cargo build --no-default-features --features feat_linux --verbose

      - name: Build examples
        run: cargo build --examples --features feat_linux

      - name: Test PipeWire Audio Capture
        run: |
          echo "=== Starting PipeWire Audio Test ==="

          # Verify audio system is ready
          if ! pactl info; then
            echo "PipeWire audio system is not ready"
            exit 1
          fi

          # Start test tone in background with logging
          echo "Starting test tone..."
          cargo run --example test_tone --features feat_linux > test_tone.log 2>&1 &
          PLAYER_PID=$!

          # Ensure cleanup on exit
          cleanup() {
            echo "Cleaning up processes..."
            if [ -n "$PLAYER_PID" ] && kill -0 $PLAYER_PID 2>/dev/null; then
              echo "Stopping test tone (PID: $PLAYER_PID)"
              kill $PLAYER_PID
              wait $PLAYER_PID 2>/dev/null || true
            fi
            # Collect audio debug info
            echo "=== Final PipeWire State ==="
            pactl info || true
            pactl list short sinks || true
            echo "=== Test Tone Log ==="
            cat test_tone.log || true
          }
          trap cleanup EXIT

          # Wait for process to initialize
          sleep 5

          # Test system-wide capture
          echo "Testing PipeWire system-wide capture..."
          cargo run --example test_capture --features feat_linux -- --duration 5 --output pipewire_system_capture.wav

          # Verify capture
          if [ ! -f "pipewire_system_capture.wav" ]; then
            echo "PipeWire capture failed - file not created"
            exit 1
          fi

          FILESIZE=$(stat -c%s "pipewire_system_capture.wav")
          if [ "$FILESIZE" -eq 0 ]; then
            echo "PipeWire capture failed - file is empty"
            exit 1
          fi

          echo "Successfully captured $FILESIZE bytes of audio with PipeWire"

      - name: Upload PipeWire test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-pipewire-audio-test-results
          path: |
            pipewire_system_capture.wav
            test_tone.log
            test_audio/sample.mp3