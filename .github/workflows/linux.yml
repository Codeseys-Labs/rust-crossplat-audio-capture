name: Linux PipeWire Tests

on:
  workflow_call:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  DEBIAN_FRONTEND: noninteractive

jobs:
  test-linux-pipewire:
    runs-on: ubuntu-latest
    env:
      DEBUG: ${{ inputs.debug_enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Debug Info
        if: env.DEBUG == 'true'
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo tree

      - name: Configure System
        run: |
          # Prevent needrestart prompts
          sudo sed -i 's/#$nrconf{restart} = '"'"'i'"'"';/$nrconf{restart} = '"'"'a'"'"';/g' /etc/needrestart/needrestart.conf

      - name: Check and Install PipeWire
        run: |
          echo "=== Checking for existing PipeWire installation ==="

          # Check if PipeWire is already installed
          if command -v pw-cli >/dev/null 2>&1; then
            echo "✅ PipeWire already installed: $(pw-cli --version)"
            PIPEWIRE_INSTALLED=true
          else
            echo "❌ PipeWire not found, will install"
            PIPEWIRE_INSTALLED=false
          fi

          # Check if development libraries are available
          if pkg-config --exists libpipewire-0.3; then
            echo "✅ PipeWire development libraries already available"
            DEV_LIBS_INSTALLED=true
          else
            echo "❌ PipeWire development libraries not found"
            DEV_LIBS_INSTALLED=false
          fi

          # Only install if needed
          if [ "$PIPEWIRE_INSTALLED" = false ] || [ "$DEV_LIBS_INSTALLED" = false ]; then
            echo "=== Installing PipeWire and dependencies ==="
            sudo apt-get update

            # Add PipeWire PPA and update
            echo "Adding PipeWire PPA..."
            sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
            sudo apt-get update

            # Add WirePlumber PPA
            echo "Adding WirePlumber PPA..."
            sudo add-apt-repository ppa:pipewire-debian/wireplumber-upstream -y
            sudo apt-get update

            # Install PipeWire and development packages
            echo "Installing PipeWire packages..."
            sudo apt-get install -y \
              pipewire \
              pipewire-bin \
              pipewire-audio-client-libraries \
              pipewire-pulse \
              libpipewire-0.3-dev \
              libpipewire-0.3-modules \
              libspa-0.2-dev \
              wireplumber \
              libasound2-dev \
              pkg-config
          else
            echo "=== PipeWire already installed, skipping installation ==="
          fi

          # Always install VLC and audio tools for testing
          echo "=== Installing VLC and audio testing tools ==="
          sudo apt-get update
          sudo apt-get install -y \
            vlc \
            vlc-plugin-base \
            ffmpeg \
            sox \
            curl \
            wget

      - name: Disable PulseAudio (if exists)
        run: |
          systemctl --user --now disable pulseaudio.service pulseaudio.socket || true
          pulseaudio --kill || true

      - name: Fix Audio Permissions
        run: |
          # Fix audio permissions (critical for monitor stream creation)
          echo "=== Fixing Audio Permissions ==="
          echo "Current user: $(whoami)"
          echo "Current groups: $(groups)"

          # Add user to audio group (required for PipeWire stream creation)
          sudo usermod -aG audio $(whoami)
          echo "Added $(whoami) to audio group"

          # Verify audio group membership (requires new shell)
          newgrp audio << 'EOF'
          groups | grep -q audio && echo "✅ User is now in audio group" || echo "❌ Failed to add user to audio group"
          EOF

          # Export environment variable to indicate audio group membership
          echo "AUDIO_GROUP_CONFIGURED=true" >> $GITHUB_ENV
          echo "USER_IN_AUDIO_GROUP=true" >> $GITHUB_ENV

          # Set up realtime scheduling permissions for audio
          echo "=== Setting up Realtime Permissions ==="
          sudo tee /etc/security/limits.d/99-audio.conf << 'EOF'
          @audio - rtprio 95
          @audio - memlock unlimited
          @audio - nice -19
          EOF
          echo "✅ Realtime permissions configured for audio group"

      - name: Start PipeWire Services
        run: |
          # Reload systemd daemon
          systemctl --user daemon-reload

          # Start services in order
          echo "Starting WirePlumber..."
          systemctl --user --now enable wireplumber.service
          sleep 2

          echo "Starting PipeWire..."
          systemctl --user --now enable pipewire.service
          sleep 2

          echo "Starting PipeWire PulseAudio compatibility..."
          systemctl --user --now enable pipewire-pulse.service
          sleep 2

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build VLC Audio Capture Tools
        run: |
          echo "=== Building VLC-specific audio capture tools ==="
          # Build the dynamic VLC capture tool (primary test)
          cargo build --bin dynamic_vlc_capture --features feat_linux
          echo "✅ Built dynamic_vlc_capture tool"

      - name: Run VLC Capture Test
        timeout-minutes: 10
        run: |
          chmod +x scripts/test-vlc-capture.sh
          ./scripts/test-vlc-capture.sh

      - name: List Generated Files
        run: |
          echo "=== Files in current directory ==="
          ls -la *.wav *.log 2>/dev/null || echo "No .wav or .log files found"
          echo ""
          echo "=== All files in current directory ==="
          ls -la
        if: always()

      # Artifact uploads are optional (may fail due to storage quota)
      - name: Upload VLC Audio Capture Files
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: vlc-audio-captures
          path: |
            dynamic_vlc_capture.wav
            vlc_test_audio.wav
          compression-level: 0
          if-no-files-found: warn
        if: always()

      - name: Upload VLC Logs
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: vlc-logs
          path: |
            vlc_capture_test.log
            flexible_test.log
            process_tracking.log
          compression-level: 0
          if-no-files-found: warn
        if: always()

      - name: Upload PipeWire Logs
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: pipewire-logs
          path: |
            /var/log/pipewire/
            ~/.local/share/pipewire/
          compression-level: 0
          if-no-files-found: ignore
        if: always()
