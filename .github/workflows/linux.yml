name: Linux Audio Tests

on:
  workflow_call:
    inputs:
      debug_enabled:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false
      audio_backend:
        description: "Audio backend to use"
        required: false
        type: string
        default: "auto"

env:
  CARGO_TERM_COLOR: always
  DEBIAN_FRONTEND: noninteractive

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        audio_system: [pipewire, pulseaudio]
      fail-fast: false
    env:
      DEBUG: ${{ inputs.debug_enabled }}
    steps:
      - name: Check if backend should run
        id: check_backend
        run: |
          if [[ "${{ inputs.audio_backend }}" == "auto" || "${{ inputs.audio_backend }}" == "${{ matrix.audio_system }}" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check_backend.outputs.should_run == 'true'

      - name: Install Rust
        if: steps.check_backend.outputs.should_run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Debug Info
        if: steps.check_backend.outputs.should_run == 'true' && env.DEBUG == true
        run: |
          rustc --version --verbose
          cargo --version --verbose
          cargo tree

      - name: Configure System
        if: steps.check_backend.outputs.should_run == 'true' && matrix.audio_system == 'pipewire'
        run: |
          # Prevent needrestart prompts
          sudo sed -i 's/#$nrconf{restart} = '"'"'i'"'"';/$nrconf{restart} = '"'"'a'"'"';/g' /etc/needrestart/needrestart.conf

      - name: Add Audio PPAs
        if: steps.check_backend.outputs.should_run == 'true' && matrix.audio_system == 'pipewire'
        run: |
          sudo apt-get update

          # Add PipeWire PPA and update
          echo "Adding PipeWire PPA..."
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update

          # Add WirePlumber PPA
          echo "Adding WirePlumber PPA..."
          sudo add-apt-repository ppa:pipewire-debian/wireplumber-upstream -y
          sudo apt-get update

          # Install base PipeWire and development packages
          echo "Installing PipeWire packages..."
          sudo apt-get install -y \
            pipewire \
            pipewire-audio-client-libraries \
            pipewire-pulse \
            libpipewire-0.3-dev \
            libpipewire-0.3-modules \
            libspa-0.2-dev \
            wireplumber \
            libasound2-dev \
            pkg-config

      - name: Disable PulseAudio
        if: steps.check_backend.outputs.should_run == 'true' && matrix.audio_system == 'pipewire'
        run: |
          systemctl --user --now disable pulseaudio.service pulseaudio.socket || true
          pulseaudio --kill || true

      - name: Start Audio Services
        if: steps.check_backend.outputs.should_run == 'true' && matrix.audio_system == 'pipewire'
        run: |
          # Reload systemd daemon
          systemctl --user daemon-reload

          # Start services in order
          echo "Starting WirePlumber..."
          systemctl --user --now enable wireplumber.service
          sleep 2

          echo "Starting PipeWire..."
          systemctl --user --now enable pipewire.service
          sleep 2

          echo "Starting PipeWire PulseAudio..."
          systemctl --user --now enable pipewire-pulse.service
          sleep 2

      - name: Verify Audio Setup
        if: steps.check_backend.outputs.should_run == 'true' && matrix.audio_system == 'pipewire'
        run: |
          echo "=== WirePlumber Status ==="
          systemctl --user status wireplumber || true

          echo "=== PipeWire Status ==="
          systemctl --user status pipewire || true

          echo "=== PipeWire-Pulse Status ==="
          systemctl --user status pipewire-pulse || true

          echo "=== PipeWire Info ==="
          pw-cli info || true

          echo "=== Audio Info ==="
          pactl info || true

      - name: Setup PulseAudio
        if: steps.check_backend.outputs.should_run == 'true' && matrix.audio_system == 'pulseaudio'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pulseaudio \
            libpulse-dev \
            libasound2-dev \
            pkg-config

          # Stop any existing audio services
          systemctl --user stop pipewire pipewire-pulse || true
          pulseaudio --kill || true

          # Configure PulseAudio
          mkdir -p ~/.config/pulse
          cat > ~/.config/pulse/daemon.conf << 'EOF'
          default-sample-rate = 44100
          default-fragments = 4
          default-fragment-size-msec = 25
          exit-idle-time = -1
          EOF

          # Create client configuration
          mkdir -p ~/.config/pulse
          cat > ~/.config/pulse/client.conf << EOF
          autospawn = yes
          daemon-binary = /usr/bin/pulseaudio
          enable-shm = yes
          EOF

          # Create separate file for module loading
          mkdir -p ~/.config/pulse/default.pa.d
          cat > ~/.config/pulse/default.pa.d/ci-setup.pa << EOF
          .include /etc/pulse/default.pa
          load-module module-native-protocol-tcp auth-anonymous=1
          load-module module-null-sink sink_name=test_sink
          EOF

          # Start PulseAudio with our custom configuration
          pulseaudio --start --exit-idle-time=-1 --daemon \
            -F ~/.config/pulse/default.pa.d/ci-setup.pa \
            --log-level=debug \
            --verbose

          # Wait for PulseAudio to fully initialize
          sleep 5

          # Verify PulseAudio is running and configured correctly
          echo "=== PulseAudio Status ==="
          pulseaudio --check && echo "PulseAudio is running" || echo "PulseAudio failed to start"
          echo "=== PulseAudio Configuration ==="
          cat ~/.config/pulse/daemon.conf
          echo "=== PulseAudio Modules ==="
          pactl list modules || true
          echo "=== PulseAudio Sinks ==="
          pactl list sinks || true

          # Wait for system to initialize
          sleep 5

          # Verify PulseAudio is running
          pactl info

      - name: Download test audio
        if: steps.check_backend.outputs.should_run == 'true'
        run: |
          mkdir -p test_audio
          curl -L "https://ia800901.us.archive.org/23/items/gd70-02-14.early-late.sbd.cotsman.18115.sbeok.shnf/gd70-02-14d1t02.mp3" -o "test_audio/sample.mp3"

      - name: Cache dependencies
        if: steps.check_backend.outputs.should_run == 'true'
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        if: steps.check_backend.outputs.should_run == 'true'
        run: cargo build --verbose

      - name: Build examples
        if: steps.check_backend.outputs.should_run == 'true'
        run: cargo build --examples

      - name: Test Audio Capture
        if: steps.check_backend.outputs.should_run == 'true'
        run: |
          echo "=== Starting Audio Test ==="

          # Verify audio system is ready
          if ! pactl info; then
            echo "Audio system is not ready"
            exit 1
          fi

          # Start test tone in background with logging
          echo "Starting test tone..."
          cargo run --example test_tone > test_tone.log 2>&1 &
          PLAYER_PID=$!

          # Start Firefox playing audio (for application-specific capture test)
          echo "Starting Firefox with test audio..."
          firefox --headless "file://$(pwd)/test_audio/sample.mp3" &
          FIREFOX_PID=$!

          # Ensure cleanup on exit
          cleanup() {
            echo "Cleaning up processes..."
            if [ -n "$PLAYER_PID" ] && kill -0 $PLAYER_PID 2>/dev/null; then
              echo "Stopping test tone (PID: $PLAYER_PID)"
              kill $PLAYER_PID
              wait $PLAYER_PID 2>/dev/null || true
            fi
            if [ -n "$FIREFOX_PID" ] && kill -0 $FIREFOX_PID 2>/dev/null; then
              echo "Stopping Firefox (PID: $FIREFOX_PID)"
              kill $FIREFOX_PID
              wait $FIREFOX_PID 2>/dev/null || true
            fi
            # Collect audio debug info
            echo "=== Final Audio State ==="
            pactl info || true
            pactl list short sinks || true
            echo "=== Test Tone Log ==="
            cat test_tone.log || true
          }
          trap cleanup EXIT

          # Wait for processes to initialize
          sleep 5

          # Test system-wide capture
          echo "Testing system-wide capture..."
          cargo run --example test_capture -- --duration 5 --output system_capture.wav

          # Test application-specific capture (Firefox)
          echo "Testing application-specific capture..."
          cargo run --example test_capture -- --duration 5 --output firefox_capture.wav --application firefox

          # Test concurrent capture
          echo "Testing concurrent capture..."
          cargo run --example test_capture -- --duration 5 --output concurrent_system.wav &
          CONCURRENT_SYS_PID=$!
          cargo run --example test_capture -- --duration 5 --output concurrent_app.wav --application firefox &
          CONCURRENT_APP_PID=$!

          wait $CONCURRENT_SYS_PID
          wait $CONCURRENT_APP_PID

          # Verify captures
          for file in system_capture.wav firefox_capture.wav concurrent_system.wav concurrent_app.wav; do
            if [ ! -f "$file" ]; then
              echo "Capture failed - $file not created"
              exit 1
            fi
            FILESIZE=$(stat -f%z "$file")
            if [ "$FILESIZE" -eq 0 ]; then
              echo "Capture failed - $file is empty"
              exit 1
            fi
            echo "Successfully captured $FILESIZE bytes of audio in $file"
          done

      - name: Upload Linux test artifacts
        if: steps.check_backend.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.audio_system }}-audio-test-results
          path: |
            system_capture.wav
            firefox_capture.wav
            concurrent_system.wav
            concurrent_app.wav
            test_tone.log
            test_audio/sample.mp3
