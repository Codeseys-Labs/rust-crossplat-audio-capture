# Tag-triggered release workflow for rsac.
# Mirrors the procedure in docs/RELEASE_PROCESS.md:
#   1. verify        — run the unit test suite on Linux / Windows / macOS
#   1b. semver-checks — cargo-semver-checks API gate vs the previous release tag
#   2. publish       — cargo publish --dry-run, then cargo publish to crates.io
#   3. github-release — create a GH Release with the matching CHANGELOG section
#
# Triggered only by semver-shaped tags (vMAJOR.MINOR.PATCH) to avoid firing
# on loose tags (rc, test-*, etc.). Bump Cargo.toml + CHANGELOG first, then
# `git tag -a vX.Y.Z -m "rsac X.Y.Z" && git push origin vX.Y.Z` kicks this off.
#
# Required GitHub secret:
#   CARGO_REGISTRY_TOKEN — crates.io API token with publish-update scope for `rsac`
#
# Scope: this workflow publishes ONLY the Rust crate to crates.io. The
# bindings are released by their own tag-triggered workflows (they now have
# real manifests, so the old "placeholder dirs without package.json/
# pyproject.toml" note no longer applies):
#   • rsac-napi  → npm  via .github/workflows/release-npm.yml
#                  (bindings/rsac-napi/package.json; needs NPM_TOKEN)
#   • rsac-python → PyPI via .github/workflows/release-pypi.yml
#                  (bindings/rsac-python/pyproject.toml; PyPI Trusted
#                  Publishing / OIDC — no long-lived token)
# All three fire on the same semver tag; bump every manifest in lockstep.

name: Release

on:
  push:
    tags:
      # Stable semver tags only. The '!v*-*' exclude blocks pre-release
      # shapes like v0.2.0-rc.1 / v0.2.0-beta.2 — those must not trigger
      # irrevocable crates.io publishes. See docs/RELEASE_PROCESS.md.
      - 'v*.*.*'
      - '!v*-*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run cargo publish --dry-run instead of a real publish'
        type: boolean
        required: false
        default: true
      version:
        description: 'Expected X.Y.Z version — REQUIRED for a real publish (dry_run=false); must match Cargo.toml [package].version. Optional for dry runs.'
        type: string
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  # ── Verify: rerun per-platform unit tests on the tagged commit ──────
  verify:
    name: Verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-4vcpu-ubuntu-2404
            # rsac-0a1f: `,compose` mirrors ci.yml's per-OS unit-test legs so
            # the platform-independent compose unit tests also gate a release.
            features: feat_linux,compose
            install_deps: true
            # device_test_filter is empty on platforms whose unit tests are
            # fully runnable in CI — the whole --lib suite hard-fails.
            device_test_filter: ''
          - os: blacksmith-4vcpu-windows-2025
            features: feat_windows,compose
            install_deps: false
            # Blacksmith Windows runners lack an audio subsystem (see
            # AGENTS.md §6). Only the WASAPI tests that actually open an
            # audio client/device need a device; those are isolated below
            # into a SEPARATE tolerated step. Everything else hard-fails.
            # Space-separated substrings matching the device-dependent unit
            # tests that open a real WASAPI client / default endpoint /
            # IMMNotificationClient (need Audiosrv + an endpoint, ABSENT on the
            # Blacksmith Windows runner — they fail RPC-unavailable 0x800706BA /
            # service-not-installed 0x80070424). MUST stay in lockstep with
            # ci.yml's test-windows DEVICE_SKIPS. Everything not listed here is
            # pure logic and hard-fails.
            device_test_filter: 'enumerate default_device device_enumeration device_id device_supported_formats audio_device_ create_stream find_device watch_ create_audio_client'
          - os: blacksmith-6vcpu-macos-15
            features: feat_macos,compose
            install_deps: false
            device_test_filter: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: useblacksmith/rust-cache@81d053bdb0871dcd3f10763c8cc60d0adc41762b # v1 branch head (no v1 tag exists upstream)

      - name: Install PipeWire dev libraries (Linux)
        if: matrix.install_deps
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      # rsac-0a1f: mirror ci.yml's per-OS "Build all targets" coverage. The
      # `cli` feature gates the rsac/standardized_test bins and several
      # examples via required-features, so the --lib runs below never compile
      # them — without this step a release could regress the cli/compose
      # target surface unnoticed. (matrix.features already carries `compose`.)
      - name: Build all targets (compose + cli surface)
        run: cargo build --all-targets --no-default-features --features ${{ matrix.features }},cli

      # Hard-fail the platform-independent + non-audio --lib tests. When a
      # device_test_filter is set (Windows), the device-touching subset is
      # excluded here via --skip and re-run as a tolerated step below, so
      # the two steps partition the full --lib suite. A genuine unit-test
      # regression now blocks publish instead of being silently swallowed.
      - name: Cargo test (unit tests, hard-fail)
        shell: bash
        run: |
          if [ -n "${{ matrix.device_test_filter }}" ]; then
            # Build a --skip arg per device-test substring so the device-
            # dependent families are EXCLUDED from this hard-fail partition.
            SKIPS=""
            for f in ${{ matrix.device_test_filter }}; do SKIPS="$SKIPS --skip $f"; done
            cargo test --lib --no-default-features --features ${{ matrix.features }} -- --test-threads=1 $SKIPS
          else
            cargo test --lib --no-default-features --features ${{ matrix.features }} -- --test-threads=1
          fi

      # Device-dependent subset only. Tolerated because the Blacksmith
      # Windows runner has no audio endpoints (AGENTS.md §6). Runs ONLY the
      # filtered families (one cargo invocation each, union), so it never
      # masks the hard-fail partition above.
      - name: Cargo test (device-dependent tests, tolerated)
        if: matrix.device_test_filter != ''
        continue-on-error: true
        shell: bash
        run: |
          for f in ${{ matrix.device_test_filter }}; do
            cargo test --lib --no-default-features --features ${{ matrix.features }} -- --test-threads=1 "$f" || true
          done

  # ── Semver gate: cargo-semver-checks vs the previous release ────────
  # Pre-publish API-compatibility gate: diffs the public API of the crate
  # being released against the previous stable release tag and fails when the
  # version bump does not permit the detected change (e.g. a breaking change
  # on a minor/patch bump). Runs alongside `verify`; `publish` needs both.
  # The FIRST release has no baseline — the check skips with a warning rather
  # than failing. Override procedure (bump the appropriate semver component;
  # never delete/skip the gate) is documented in docs/RELEASE_PROCESS.md
  # §"Semver gate (cargo-semver-checks)".
  semver-checks:
    name: Semver Gate (cargo-semver-checks)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          # Full history + tags: the baseline is resolved from the previous
          # v*.*.* tag, which the default shallow clone cannot see.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: useblacksmith/rust-cache@81d053bdb0871dcd3f10763c8cc60d0adc41762b # v1 branch head (no v1 tag exists upstream)

      - name: Install PipeWire dev libraries
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@0fd46367812ee04360509b4169d9f659d6892bb2 # v2
        with:
          tool: cargo-semver-checks

      - name: Resolve baseline (previous stable release tag)
        id: baseline
        shell: bash
        run: |
          # On a tag push HEAD is the tagged commit, so the baseline is the
          # newest stable v*.*.* tag reachable from HEAD^ (this excludes the
          # tag being released). Pre-release shapes (v*-*) are excluded to
          # match the workflow trigger. The first release has no previous
          # tag: emit a warning and let the check step skip — there is
          # nothing to diff against, and failing would block the initial
          # publish.
          if PREV_TAG="$(git describe --tags --abbrev=0 --match 'v*.*.*' --exclude 'v*-*' HEAD^ 2>/dev/null)"; then
            echo "baseline release tag: ${PREV_TAG}"
            echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::no previous stable v*.*.* tag found — skipping cargo-semver-checks (first release has no baseline)"
            echo "prev_tag=" >> "$GITHUB_OUTPUT"
          fi

      # Scoped to the root crate: this workflow publishes ONLY `rsac` (the
      # bindings release via their own workflows — see the header).
      - name: cargo semver-checks (vs previous release)
        if: steps.baseline.outputs.prev_tag != ''
        env:
          PREV_TAG: ${{ steps.baseline.outputs.prev_tag }}
        run: cargo semver-checks check-release -p rsac --baseline-rev "$PREV_TAG"

  # ── Publish: cargo publish to crates.io ─────────────────────────────
  publish:
    name: Publish to crates.io
    needs: [verify, semver-checks]
    # Guard against forks running the irreversible crates.io publish.
    if: github.repository == 'Codeseys-Labs/rust-crossplat-audio-capture'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: useblacksmith/rust-cache@81d053bdb0871dcd3f10763c8cc60d0adc41762b # v1 branch head (no v1 tag exists upstream)

      - name: Install PipeWire dev libraries
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev pkg-config

      # Tag/dispatch↔manifest version guard: the version being published must
      # be explicitly asserted, otherwise we'd publish a mismatched crate.
      #   • Tag push — the tag itself is the assertion; it must match
      #     Cargo.toml.
      #   • workflow_dispatch with dry_run=false — a REAL publish from a
      #     manual run previously had NO guard at all (this step used to be
      #     tag-only), so a dispatch from any branch could cargo-publish that
      #     branch's manifest. Now a real dispatch publish REQUIRES the
      #     `version` input and it must match Cargo.toml.
      #   • workflow_dispatch with dry_run=true — stays flexible: the version
      #     input is optional (checked when provided), so packaging rehearsals
      #     on any branch keep working.
      # The extraction is [package]-scoped awk (mirrors ci.yml's
      # version-lockstep + release-tag.yml) — the previous
      # `grep -m1 '^version'` would match the first version-shaped line in
      # ANY section if the manifest were ever reordered.
      - name: Verify requested version matches Cargo.toml
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DRY_RUN: ${{ inputs.dry_run }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          MANIFEST="$(awk '
            /^\[package\][[:space:]]*$/ { in_sec = 1; next }
            /^\[/ { if ($0 !~ /^\[package\][[:space:]]*$/) in_sec = 0 }
            in_sec && /^[[:space:]]*version[[:space:]]*=[[:space:]]*"[^"]+"[[:space:]]*$/ {
              match($0, /"[^"]+"/); print substr($0, RSTART + 1, RLENGTH - 2); exit
            }
          ' Cargo.toml)"
          if [ -z "${MANIFEST}" ]; then
            echo "::error::could not extract [package].version from Cargo.toml"
            exit 1
          fi
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ -z "${INPUT_VERSION}" ]; then
              if [ "${DRY_RUN}" = "true" ]; then
                echo "dry-run dispatch without a version input — packaging rehearsal only; the real publish step is skipped, so no version gate applies."
                exit 0
              fi
              echo "::error::a REAL publish (dry_run=false) via workflow_dispatch requires the 'version' input, and it must match Cargo.toml (currently ${MANIFEST}). Without it any branch's manifest could be published by accident."
              exit 1
            fi
            VERSION="${INPUT_VERSION}"
            if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Requested version '${VERSION}' is not a stable X.Y.Z semver version"
              exit 1
            fi
          else
            echo "::error::unexpected event '${EVENT_NAME}' on non-tag ref '${GITHUB_REF:-}' — refusing to publish"
            exit 1
          fi
          echo "requested version: ${VERSION}  manifest version: ${MANIFEST}"
          if [ "${VERSION}" != "${MANIFEST}" ]; then
            echo "::error::Requested version (${VERSION}) does not match Cargo.toml version (${MANIFEST})"
            exit 1
          fi

      - name: Cargo publish (dry run)
        run: cargo publish --dry-run

      - name: Cargo publish
        # Skip the real publish on manual workflow_dispatch runs with
        # dry_run=true — that path exists for on-demand validation only.
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  # ── GitHub Release: surface the CHANGELOG section on the tag ────────
  github-release:
    name: Create GitHub Release
    needs: publish
    if: github.repository == 'Codeseys-Labs/rust-crossplat-audio-capture'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Extract version from tag
        id: version
        env:
          GITHUB_REF_NAME_SAFE: ${{ github.ref_name }}
        run: |
          TAG="$GITHUB_REF_NAME_SAFE"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract CHANGELOG section for this release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Awk the block between "## [VERSION]" and the next "## [" heading.
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { in_section = 1; print; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md > release_body.md
          if [ ! -s release_body.md ]; then
            echo "No CHANGELOG section found for version ${VERSION}; using fallback body." >&2
            echo "Release ${VERSION}. See CHANGELOG.md for details." > release_body.md
          fi
          echo "---- release_body.md ----"
          cat release_body.md

      - name: Create GitHub Release
        # Pinned in lockstep with release-tag.yml (the primary release path) so
        # both Release-creating workflows run the identical action commit (#33).
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.0.8
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: rsac ${{ steps.version.outputs.version }}
          body_path: release_body.md
          draft: false
          prerelease: false
