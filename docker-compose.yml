version: '3'

services:
  # Unified Linux test service with PipeWire
  rsac-linux-pipewire:
    build:
      context: .
      dockerfile: docker/linux/Dockerfile.unified
      target: rsac-pipewire
    volumes:
      - .:/app
      - ./test-results:/test-results
    # Give necessary permissions for audio
    privileged: true
    devices:
      - /dev/snd:/dev/snd
    environment:
      - XDG_RUNTIME_DIR=/run/user/0
      - PIPEWIRE_RUNTIME_DIR=/run/user/0
      - RUST_BACKTRACE=1
      - RUST_LOG=debug
    # Keep the container running for debugging if needed
    tty: true
    stdin_open: true
    command: ["/app/scripts/run_audio_tests.sh", "--backend", "pipewire", "--type", "all", "--output-dir", "/test-results"]

  # Unified Linux test service with PulseAudio
  rsac-linux-pulseaudio:
    build:
      context: .
      dockerfile: docker/linux/Dockerfile.unified
      target: rsac-pulseaudio
    volumes:
      - .:/app
      - ./test-results:/test-results
    # Give necessary permissions for audio
    privileged: true
    devices:
      - /dev/snd:/dev/snd
    environment:
      - RUST_BACKTRACE=1
      - RUST_LOG=debug
    # Keep the container running for debugging if needed
    tty: true
    stdin_open: true
    command: bash -c "/app/scripts/run_audio_tests.sh --backend pulseaudio --type all --output-dir /test-results"

  # Keeping other platforms for reference
  rsac-windows:
    image: dockurr/windows
    container_name: windows-audio-test
    environment:
      - VERSION=11
      - RAM_SIZE=4G
      - CPU_CORES=2
      - DISK_SIZE=32G
      - USERNAME=RustDev
      - PASSWORD=AudioTest123
      - LANGUAGE=English
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - "8006:8006"  # Web interface
      - "3389:3389"  # RDP
    volumes:
      - ./windows-storage:/storage  # Windows disk storage
      - .:/data  # Project files accessible as \\host.lan\Data
    restart: unless-stopped
    stop_grace_period: 2m

  rsac-macos:
    build:
      context: .
      dockerfile: docker/macos/Dockerfile
    volumes:
      - .:/app
      - test_audio:/test_audio
    privileged: true
    devices:
      - /dev/snd:/dev/snd
    command: bash -c "/app/scripts/run_audio_tests.sh --backend coreaudio --type all --output-dir /test-results"

  # Generate HTML report from all test results
  rsac-report:
    build:
      context: .
      dockerfile: docker/linux/Dockerfile.unified
      target: rsac-test-base
    volumes:
      - .:/app
      - ./test-results:/test-results
    command: bash -c "cargo run --bin test-report-generator -- --input-dir /test-results --output-file /test-results/test_report.html"
    depends_on:
      - rsac-linux-pipewire
      - rsac-linux-pulseaudio

volumes:
  test_results:
  test_audio:
