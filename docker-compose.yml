version: '3.8'

services:
  linux-pipewire:
    build:
      context: .
      dockerfile: .docker/linux.Dockerfile
    environment:
      - AUDIO_BACKEND=pipewire
      - RUST_BACKTRACE=1
    volumes:
      - .:/home/testuser/app
    command: cargo test --verbose

  linux-pulseaudio:
    build:
      context: .
      dockerfile: .docker/linux.Dockerfile
    environment:
      - AUDIO_BACKEND=pulseaudio
      - RUST_BACKTRACE=1
    volumes:
      - .:/home/testuser/app
    command: cargo test --verbose

  macos:
    build:
      context: .
      dockerfile: .docker/macos.Dockerfile
    environment:
      - RUST_BACKTRACE=1
    volumes:
      - .:/home/testuser/app
    command: cargo test --verbose

  windows:
    build:
      context: .
      dockerfile: .docker/windows.Dockerfile
    environment:
      - RUST_BACKTRACE=1
    volumes:
      - .:/app
    command: cargo test --verbose